<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海南清补凉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background-color: #fdf6e3;
            height: 100vh;
        }
        
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        .background-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .container {
            width: 100%;
            height: 100vh;
            position: relative;
            z-index: 2;
        }
        
        #loading-page {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.8s;
            z-index: 10;
        }
        
        .loading-content {
            width: 90%;
            max-width: 800px;
            background: white;
            padding: 25px 20px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
        }
        
        .title {
            font-size: 2.8rem;
            color: #d35400;
            margin-bottom: 25px;
            font-weight: bold;
        }
        
        .ingredients-container {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .ingredient {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            opacity: 0;
            transform: translateY(20px);
            transition: 0.5s;
            overflow: hidden;
        }
        
        .ingredient-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .loading-bar-container {
            width: 100%;
            height: 18px;
            background: #f5f5f5;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        
        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #e74c3c, #f39c12, #2ecc71);
            border-radius: 10px;
            transition: 0.4s;
        }
        
        .loading-text {
            font-size: 1.2rem;
            color: #d35400;
            margin-bottom: 20px;
        }
        
        .enter-btn {
            padding: 16px 45px;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 35px;
            font-size: 1.3rem;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.5s;
            font-weight: bold;
        }
        
        /* 手机适配 */
        @media (max-width: 480px) {
            .title { font-size: 2.2rem; }
            .ingredient { width: 55px; height: 55px; }
            .enter-btn { padding: 14px 35px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="background-container">
        <img src="assets/images/加载.png" class="background-image">
    </div>
    
    <div class="container">
        <div id="loading-page">
            <div class="loading-content">
                <h1 class="title">海南清补凉</h1>
                
                <div class="ingredients-container">
                    <div class="ingredient"><img src="assets/images/椰子.png" class="ingredient-img"></div>
                    <div class="ingredient"><img src="assets/images/芒果.png" class="ingredient-img"></div>
                    <div class="ingredient"><img src="assets/images/绿豆.png" class="ingredient-img"></div>
                    <div class="ingredient"><img src="assets/images/通心粉.png" class="ingredient-img"></div>
                    <div class="ingredient"><img src="assets/images/芋圆.png" class="ingredient-img"></div>
                </div>
                
                <div class="loading-bar-container">
                    <div class="loading-bar"></div>
                </div>
                
                <div class="loading-text">加载中...</div>
                <button class="enter-btn" id="enter-btn">品尝海南清补凉</button>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loadingPage = document.getElementById('loading-page');
            const enterBtn = document.getElementById('enter-btn');
            const loadingBar = document.querySelector('.loading-bar');
            const loadingText = document.querySelector('.loading-text');
            const ingredients = document.querySelectorAll('.ingredient');
            
            let progress = 0;
            
            // 加载进度动画
            let timer = setInterval(() => {
                progress += 10;
                if(progress >= 100){
                    progress = 100;
                    clearInterval(timer);
                    
                    setTimeout(() => {
                        loadingText.innerText = "加载完成！准备品尝美味...";
                        enterBtn.style.opacity = "1";
                        enterBtn.style.transform = "translateY(0)";
                    }, 500);
                }
                
                loadingBar.style.width = progress + "%";
                
                // 食材依次显示
                ingredients.forEach((item, index) => {
                    if(progress >= 20 * (index+1)){
                        item.style.opacity = "1";
                        item.style.transform = "translateY(0)";
                    }
                });
            }, 200);
            
            // 点击进入下一页
            enterBtn.onclick = function(){
                loadingPage.style.opacity = "0";
                setTimeout(() => {
                    window.location.href = 'page/page01.html';
                }, 800);
            }
        });
    </script>
</body>
</html>
