<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>恭喜您，成为清补凉文化传播使者！</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            touch-action: manipulation;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 12px;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../assets/images/11.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
            pointer-events: none;
        }

        .container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 245, 235, 0.15);
            z-index: 0;
            pointer-events: none;
        }

        .title {
            position: relative;
            width: 100%;
            text-align: center;
            color: #8B4513;
            z-index: 10;
            text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.8);
            padding: 10px 0;
            margin-top: 10px;
        }

        .title h1 {
            font-size: 1.45rem;
            font-weight: 700;
            line-height: 1.3;
        }

        .certificate {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.18);
            border: 3px solid #D2691E;
            padding: 24px 18px;
            margin: 10px 0 24px 0;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.6s ease-out;
            background-image: 
                linear-gradient(45deg, rgba(210, 105, 30, 0.05) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(210, 105, 30, 0.05) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(210, 105, 30, 0.05) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(210, 105, 30, 0.05) 75%);
            background-size: 20px 20px;
        }

        .certificate::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 1px dashed #8B4513;
            border-radius: 10px;
            z-index: 1;
            pointer-events: none;
        }

        .certificate-header {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #D2691E;
        }

        .certificate-header .cert-no {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 6px;
        }

        .certificate-header h2 {
            font-size: 1.25rem;
            color: #8B4513;
            font-weight: 700;
        }

        .certificate-content {
            position: relative;
            z-index: 2;
            padding: 12px 8px;
        }

        .recipient {
            text-align: center;
            margin-bottom: 18px;
        }

        .recipient .name-label {
            font-size: 0.95rem;
            color: #555;
            margin-bottom: 6px;
        }

        .recipient .name-value {
            font-size: 1.35rem;
            color: #8B4513;
            font-weight: 700;
            letter-spacing: 1.5px;
            background: rgba(210, 105, 30, 0.1);
            padding: 6px 18px;
            border-radius: 10px;
            display: inline-block;
            min-width: 120px;
        }

        .title-awarded {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.15rem;
            color: #8B4513;
            font-weight: 600;
            padding: 10px 0;
            background: rgba(210, 105, 30, 0.08);
            border-radius: 10px;
        }

        .certificate-desc {
            font-size: 0.92rem;
            color: #555;
            line-height: 1.6;
            margin-bottom: 18px;
            text-align: center;
        }

        .completed-list {
            margin-bottom: 22px;
            padding: 0 8px;
        }

        .completed-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #555;
            line-height: 1.5;
        }

        .completed-item i {
            color: #28a745;
            font-size: 1rem;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .issuer-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-top: 15px;
            border-top: 1px solid #eee;
            margin-top: 10px;
        }

        .issuer, .date-info {
            flex: 1;
        }

        .issuer-label, .date-label {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 4px;
        }

        .issuer-value, .date-value {
            font-size: 0.9rem;
            color: #8B4513;
            font-weight: 600;
        }

        .date-info {
            text-align: right;
        }

        .encouragement {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 480px;
            text-align: center;
            font-size: 0.95rem;
            color: #555;
            line-height: 1.6;
            padding: 16px 14px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            margin-bottom: 80px;
        }

        .fab-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 100;
        }

        .fab-main {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.4);
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .fab-main.active {
            transform: rotate(45deg);
        }

        .fab-menu {
            position: absolute;
            bottom: 70px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .fab-menu.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .fab-item {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: white;
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .title h1 {
                font-size: 1.3rem;
            }
            .certificate {
                padding: 20px 15px;
            }
            .issuer-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .date-info {
                text-align: left;
            }
            .encouragement {
                font-size: 0.9rem;
                padding: 14px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>恭喜您，成为清补凉文化传播使者！</h1>
        </div>

        <div class="certificate">
            <div class="certificate-header">
                <div class="cert-no" id="certNo">证书编号：HNL-2025-XXXX</div>
                <h2>清补凉文化传播使者证书</h2>
            </div>

            <div class="certificate-content">
                <div class="recipient">
                    <div class="name-label">颁发给</div>
                    <div class="name-value" id="userName">[用户昵称]</div>
                </div>

                <div class="title-awarded">授予称号：清补凉文化传播使者</div>

                <div class="certificate-desc">
                    感谢您积极参与清补凉文化的学习、体验与分享，为传统美食的数字化传承贡献了一份力量。您已成功：
                </div>

                <div class="completed-list">
                    <div class="completed-item">
                        <i class="fas fa-check-circle"></i>
                        <span>完成清补凉历史文化学习</span>
                    </div>
                    <div class="completed-item">
                        <i class="fas fa-check-circle"></i>
                        <span>掌握食材功效与搭配知识</span>
                    </div>
                    <div class="completed-item">
                        <i class="fas fa-check-circle"></i>
                        <span>体验沉浸式制作与3D交互</span>
                    </div>
                    <div class="completed-item">
                        <i class="fas fa-check-circle"></i>
                        <span>将清补凉文化分享给更多朋友</span>
                    </div>
                </div>

                <div class="issuer-info">
                    <div class="issuer">
                        <div class="issuer-label">颁发单位</div>
                        <div class="issuer-value">海南清补凉文化数字传播项目组</div>
                    </div>
                    <div class="date-info">
                        <div class="date-label">日期</div>
                        <div class="date-value" id="certDate">[系统自动生成当前日期]</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="encouragement">
            每一份传播，都是文化的延续。期待您继续探索、体验并分享更多中华传统美好。
        </div>
    </div>

    <div class="fab-container">
        <button class="fab-main" id="fabMain">
            <i class="fas fa-exchange-alt"></i>
        </button>
        <div class="fab-menu" id="fabMenu">
            <a href="page0.html" class="fab-item">菜单</a>
        </div>
    </div>

    <script>
        function generateCertNo() {
            const prefix = "HNL-2025-";
            const randomNum = Math.floor(1000 + Math.random() * 9000);
            return prefix + randomNum;
        }

        function getCurrentDate() {
            const date = new Date();
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}年${month}月${day}日`;
        }

        function getUserName() {
            const defaultName = "清补凉文化爱好者";
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('username') || defaultName;
        }

        window.addEventListener('load', function() {
            document.getElementById('certNo').textContent = `证书编号：${generateCertNo()}`;
            document.getElementById('userName').textContent = getUserName();
            document.getElementById('certDate').textContent = getCurrentDate();
            
            const cert = document.querySelector('.certificate');
            setTimeout(() => {
                cert.style.opacity = '1';
                cert.style.transform = 'scale(1)';
            }, 200);
        });

        const fabMain = document.getElementById('fabMain');
        const fabMenu = document.getElementById('fabMenu');
        
        fabMain.addEventListener('click', (e) => {
            e.stopPropagation();
            fabMenu.classList.toggle('open');
            fabMain.classList.toggle('active');
        });

        document.addEventListener('click', () => {
            fabMenu.classList.remove('open');
            fabMain.classList.remove('active');
        });
    </script>
</body>
</html>
