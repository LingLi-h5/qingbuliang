<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恭喜您，成为清补凉文化传播使者！</title>
	<script src="../js/bj-music.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
			-webkit-tap-highlight-color: transparent; /* 移动端触摸高亮 */
			outline: none; /* 清除焦点边框 */
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 12px;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../assets/images/水果背景.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
        }

        .container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 245, 235, 0.15);
            z-index: 0;
        }

        .title {
            position: relative;
            width: 100%;
            text-align: center;
            color: #8B4513;
            z-index: 10;
            padding: 10px 0;
            margin-top: 10px;
        }

        .title h1 {
            font-size: 22px;
            font-weight: bold;
        }

        /* 证书 —— 纯白色、无任何花纹 */
        .certificate {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 480px;
            background: #ffffff;    /* 纯白底色 */
            border-radius: 18px;
            border: 3px solid #D2691E;
            padding: 24px 18px;
            margin: 10px 0 24px 0;
        }

        .certificate::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 1px dashed #8B4513;
            border-radius: 10px;
            z-index: 1;
        }

        .certificate-header {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #D2691E;
        }

        .cert-no {
            font-size: 14px;
            color: #777;
            margin-bottom: 6px;
        }

        .certificate-header h2 {
            font-size: 20px;
            color: #8B4513;
            font-weight: bold;
        }

        .certificate-content {
            position: relative;
            z-index: 2;
            padding: 12px 8px;
        }

        .recipient {
            text-align: center;
            margin-bottom: 18px;
        }

        .name-label {
            font-size: 16px;
            color: #666;
            margin-bottom: 6px;
        }

        .name-value {
            font-size: 22px;
            color: #8B4513;
            font-weight: bold;
            background: rgba(210, 105, 30, 0.12);
            padding: 6px 18px;
            border-radius: 10px;
            display: inline-block;
        }

        .title-awarded {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            color: #8B4513;
            font-weight: bold;
            padding: 10px 0;
            background: rgba(210, 105, 30, 0.1);
            border-radius: 10px;
        }

        .certificate-desc {
            font-size: 15px;
            color: #555;
            line-height: 1.7;
            margin-bottom: 18px;
            text-align: center;
        }

        .completed-list {
            margin-bottom: 22px;
        }

        .completed-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 15px;
            color: #444;
            line-height: 1.6;
        }

        .completed-item i {
            color: #28a745;
            font-size: 16px;
            margin-top: 2px;
        }

        .issuer-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-top: 15px;
            border-top: 1px solid #eee;
            margin-top: 10px;
        }

        .issuer-label, .date-label {
            font-size: 13px;
            color: #777;
            margin-bottom: 4px;
        }

        .issuer-value, .date-value {
            font-size: 14px;
            color: #8B4513;
            font-weight: bold;
        }

        .fab-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 100;
        }

        .fab-main {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        .fab-main.active {
            transform: rotate(45deg);
        }

        .fab-menu {
            position: absolute;
            bottom: 70px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
            opacity: 0;
            pointer-events: none;
        }

        .fab-menu.open {
            opacity: 1;
            pointer-events: all;
        }

        .fab-item {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: white;
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            .title h1 {
                font-size: 20px;
            }
            .issuer-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .date-info {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>恭喜您，成为清补凉文化传播使者！</h1>
        </div>

        <div class="certificate">
            <div class="certificate-header">
                <div class="cert-no" id="certNo">证书编号：HNL-2025-XXXX</div>
                <h2>清补凉文化传播使者证书</h2>
            </div>

            <div class="certificate-content">
                <div class="recipient">
                    <div class="name-label">颁发给</div>
                    <div class="name-value" id="userName">[用户昵称]</div>
                </div>

                <div class="title-awarded">授予称号：清补凉文化传播使者</div>

                <div class="certificate-desc">
                    感谢您积极参与清补凉文化的学习、体验与分享，为传统美食的数字化传承贡献了一份力量。您已成功：
                </div>

                <div class="completed-list">
                    <div class="completed-item">
                        <i class="fas fa-check-circle"></i>
                        <span>完成清补凉历史文化学习</span>
                    </div>
                    <div class="completed-item">
                        <i class="fas fa-check-circle"></i>
                        <span>掌握食材功效与搭配知识</span>
                    </div>
                    <div class="completed-item">
                        <i class="fas fa-check-circle"></i>
                        <span>体验沉浸式制作与3D交互</span>
                    </div>
                    <div class="completed-item">
                        <i class="fas fa-check-circle"></i>
                        <span>将清补凉文化分享给更多朋友</span>
                    </div>
                </div>

                <div class="issuer-info">
                    <div class="issuer">
                        <div class="issuer-label">颁发单位</div>
                        <div class="issuer-value">海南清补凉文化数字传播项目组</div>
                    </div>
                    <div class="date-info">
                        <div class="date-label">日期</div>
                        <div class="date-value" id="certDate">[系统自动生成当前日期]</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="fab-container">
        <button class="fab-main" id="fabMain">
            <i class="fas fa-exchange-alt"></i>
        </button>
        <div class="fab-menu" id="fabMenu">
            <a href="page0.html" class="fab-item">菜单</a>
        </div>
    </div>

    <script>
        function generateCertNo() {
            var prefix = "HNL-2025-";
            var randomNum = Math.floor(1000 + Math.random() * 9000);
            return prefix + randomNum;
        }

        function getCurrentDate() {
            var date = new Date();
            var year = date.getFullYear();
            var month = (date.getMonth() + 1).toString().padStart(2, '0');
            var day = date.getDate().toString().padStart(2, '0');
            return year + "年" + month + "月" + day + "日";
        }

        function getUserName() {
            var defaultName = "清补凉文化爱好者";
            var params = new URLSearchParams(window.location.search);
            return params.get('username') || defaultName;
        }

        window.onload = function() {
            document.getElementById('certNo').innerText = "证书编号：" + generateCertNo();
            document.getElementById('userName').innerText = getUserName();
            document.getElementById('certDate').innerText = getCurrentDate();
        }

        var fabMain = document.getElementById('fabMain');
        var fabMenu = document.getElementById('fabMenu');

        fabMain.onclick = function(e) {
            e.stopPropagation();
            fabMenu.classList.toggle('open');
            fabMain.classList.toggle('active');
        }

        document.onclick = function() {
            fabMenu.classList.remove('open');
            fabMain.classList.remove('active');
        }
    </script>
</body>
</html>
