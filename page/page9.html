<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>3D模型展示 - 移动端优化</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            touch-action: manipulation;
            position: relative;
            z-index: 0;
        }

        /* ✅ 已按要求调整：宽度 93% */
        .page1-white-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            max-width: 400px;
            height: 97vh;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.15);
            border: 1px solid #e0e0e0;
            z-index: 1;
            pointer-events: none;
        }
        .page1-white-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            padding: 0;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 5px 0;
            position: relative;
            z-index: 2;
        }
        
        header {
            padding: 8px 0;
            width: 100%;
            flex-shrink: 0;
        }
        
        h1 {
            color: #8B4513;
            font-size: 1.4rem;
            margin-bottom: 4px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
            font-weight: 600;
        }
        
        .subtitle {
            color: #654321;
            font-size: 0.85rem;
            opacity: 0.9;
            max-width: 100%;
            margin: 0 auto;
            line-height: 1.3;
        }
        
        .mobile-warning {
            display: block;
            background-color: #ffffff;
            padding: 25px 20px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            margin-bottom: 15px;
            color: #8B4513;
            font-size: 0.9rem;
            width: 100%;
            border: 1px solid #e0e0e0;
            flex-shrink: 0;
            font-weight: 500;
            line-height: 1.5;
        }
        
        .gesture-hints {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 15px 0;
            background-color: #ffffff;
            padding: 25px 20px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            width: 100%;
            flex-shrink: 0;
            border: 1px solid #e0e0e0;
        }
        
        .gesture-item {
            text-align: center;
            font-size: 0.85rem;
            color: #654321;
            flex: 1;
            padding: 0 10px;
        }
        
        .gesture-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #d35400;
        }
        
        .model-container {
            position: relative;
            width: 100%;
            height: 60vh;
            background-color: #ffffff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin: 10px 0;
            border: 2px solid #8B4513;
            touch-action: none;
        }
        
        #model-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 16px;
            border-radius: 6px;
            color: #8B4513;
            z-index: 10;
            backdrop-filter: blur(10px);
        }
        
        .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 16px;
            border-radius: 8px;
            color: #8B0000;
            text-align: center;
            max-width: 90%;
            z-index: 10;
            backdrop-filter: blur(10px);
            border: 1px solid #ffcccc;
            display: none;
        }
        
        .warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.85rem;
            background: rgba(255, 243, 205, 0.95);
            padding: 12px 16px;
            border-radius: 8px;
            color: #856404;
            text-align: center;
            max-width: 90%;
            z-index: 10;
            border: 1px solid #ffeaa7;
            display: none;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 8px 0;
            width: 100%;
            max-width: 300px;
            padding: 0 10px;
            flex-shrink: 0;
        }
        
        .control-btn {
            background: linear-gradient(to right, #8B4513, #A0522D);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(139, 69, 19, 0.4);
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            min-width: 0;
        }
        
        .control-btn:active {
            background: linear-gradient(to right, #A0522D, #8B4513);
            transform: scale(0.98);
        }

        .fab-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
        }

        .fab-main {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 25px rgba(139, 69, 19, 0.5);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: none;
            font-size: 26px;
            position: relative;
            z-index: 101;
        }

        .fab-main:active {
            transform: scale(0.95) rotate(90deg);
            box-shadow: 0 4px 20px rgba(139, 69, 19, 0.7);
        }

        .fab-menu {
            position: absolute;
            bottom: 75px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 18px;
            opacity: 0;
            transform: translateY(25px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            pointer-events: none;
        }

        .fab-menu.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .fab-item {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: white;
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            position: relative;
            text-align: center;
            padding: 5px;
        }

        .fab-item:active {
            transform: scale(0.95);
            background: #f5e3d4;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 768px) {
            .model-container {
                height: 50vh;
            }
            
            .mobile-warning {
                padding: 20px 15px;
                font-size: 0.85rem;
                margin-bottom: 12px;
            }
            
            .gesture-hints {
                padding: 20px 15px;
                margin: 12px 0;
            }
            
            .gesture-icon {
                font-size: 1.6rem;
            }
            
            .gesture-item {
                font-size: 0.8rem;
            }
            
            .fab-container {
                bottom: 20px;
                right: 20px;
            }
            
            .fab-main {
                width: 56px;
                height: 56px;
                font-size: 24px;
            }
            
            .fab-item {
                width: 60px;
                height: 60px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .model-container {
                height: 55vh;
            }
            
            .mobile-warning {
                padding: 18px 12px;
                font-size: 0.8rem;
                margin-bottom: 10px;
            }
            
            .gesture-hints {
                padding: 18px 12px;
                margin: 10px 0;
            }
            
            .gesture-icon {
                font-size: 1.4rem;
            }
            
            .gesture-item {
                font-size: 0.75rem;
                padding: 0 5px;
            }
            
            .fab-main {
                width: 50px;
                height: 50px;
                font-size: 22px;
            }
            
            .fab-item {
                width: 55px;
                height: 55px;
                font-size: 13px;
            }
        }
        
        @media (orientation: landscape) {
            .model-container {
                height: 70vh;
            }
            
            .container {
                padding: 5px 0;
            }
            
            header {
                padding: 4px 0;
            }
            
            h1 {
                font-size: 1.2rem;
                margin-bottom: 2px;
            }
            
            .subtitle {
                font-size: 0.75rem;
            }
            
            .mobile-warning {
                padding: 15px 10px;
                margin-bottom: 4px;
                font-size: 0.75rem;
            }
            
            .gesture-hints {
                margin: 3px 0;
                padding: 15px 10px;
            }
            
            .gesture-item {
                font-size: 0.65rem;
            }
            
            .gesture-icon {
                font-size: 1.3rem;
            }
            
            .controls {
                margin: 4px 0;
                gap: 8px;
            }
            
            .control-btn {
                padding: 8px 12px;
                font-size: 0.8rem;
                min-height: 36px;
            }
        }
        
        @media (max-width: 320px) {
            h1 {
                font-size: 1.2rem;
            }
            
            .subtitle {
                font-size: 0.8rem;
            }
            
            .control-btn {
                padding: 8px 12px;
                font-size: 0.8rem;
                min-height: 36px;
            }
            
            .controls {
                max-width: 280px;
                gap: 8px;
            }
            
            .model-container {
                height: 50vh;
            }
            
            .mobile-warning {
                padding: 15px 10px;
                font-size: 0.75rem;
            }
            
            .gesture-hints {
                padding: 15px 10px;
            }
            
            .gesture-icon {
                font-size: 1.2rem;
            }
        }

        @media (min-width: 768px) and (min-height: 800px) {
            .container {
                padding: 10px 0;
            }
            
            header {
                padding: 10px 0;
            }
            
            h1 {
                font-size: 1.6rem;
            }
            
            .subtitle {
                font-size: 0.9rem;
            }
            
            .mobile-warning {
                padding: 25px 20px;
                font-size: 0.85rem;
            }
            
            .gesture-hints {
                padding: 25px 20px;
            }
            
            .gesture-item {
                font-size: 0.75rem;
            }
            
            .gesture-icon {
                font-size: 1.8rem;
            }
            
            .controls {
                max-width: 320px;
            }
            
            .control-btn {
                padding: 12px 18px;
                font-size: 0.9rem;
                min-height: 44px;
            }
            
            .model-container {
                height: 50vh;
            }
        }
    </style>
</head>
<body>

    <div class="page1-white-box">
        <img src="../assets/images/111.png" alt="背景图">
    </div>

    <div class="container">
        <header>
            <h1>3D模型交互展示</h1>
            <p class="subtitle">使用手指触摸即可360°旋转查看模型</p>
        </header>
        
        <div class="mobile-warning">
            💡 提示：使用手指触摸屏幕来旋转、缩放和移动模型
        </div>
        
        <div class="gesture-hints">
            <div class="gesture-item">
                <div class="gesture-icon">👆</div>
                <div>单指旋转</div>
            </div>
            <div class="gesture-item">
                <div class="gesture-icon">🤏</div>
                <div>双指缩放</div>
            </div>
            <div class="gesture-item">
                <div class="gesture-icon">✌️</div>
                <div>双指移动</div>
            </div>
        </div>
        
        <div class="model-container">
            <div class="loading" id="loading">正在初始化3D环境...</div>
            <div class="error" id="error"></div>
            <div class="warning" id="warning"></div>
            <canvas id="model-canvas"></canvas>
        </div>
        
        <div class="controls">
            <button class="control-btn" id="auto-rotate-btn">自动旋转</button>
            <button class="control-btn" id="quality-toggle-btn">高清模式</button>
        </div>
    </div>

    <div class="fab-container">
        <button class="fab-main" id="fabMain">
            <i class="fas fa-exchange-alt"></i>
        </button>
        <div class="fab-menu" id="fabMenu">
            <a href="page0.html" class="fab-item">
                <span class="fab-label">菜单</span>
            </a>
        </div>
    </div>

    <script src="../js/three.min.js"></script>
    <script src="../js/OrbitControls.js"></script>
    <script src="../js/GLTFLoader.js"></script>
    <script>
document.addEventListener('DOMContentLoaded', function() {
    console.log('Three.js版本:', THREE.REVISION);
    console.log('开始初始化3D场景...');
    
    const loadingElement = document.getElementById('loading');
    const errorElement = document.getElementById('error');
    const warningElement = document.getElementById('warning');
    
    if (!isWebGLAvailable()) {
        showError('您的设备或浏览器不支持WebGL，无法显示3D模型。<br>请尝试：<br>1. 更新浏览器到最新版本<br>2. 检查浏览器设置中是否启用了WebGL<br>3. 使用其他设备（如智能手机）');
        return;
    }
    
    loadingElement.textContent = '正在设置3D场景...';
    
    const container = document.querySelector('.model-container');
    
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffecd2);
    
    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.z = 5;
    
    let renderer;
    try {
        renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('model-canvas'),
            antialias: false,
            powerPreference: "default",
            alpha: true,
            preserveDrawingBuffer: false
        });
        
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        console.log('渲染器创建成功');
    } catch (error) {
        showError(`WebGL渲染器创建失败: ${error.message}<br>请尝试更新浏览器或使用其他设备。`);
        return;
    }
    
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 10, 5);
    scene.add(directionalLight);
    
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.rotateSpeed = 0.7;
    controls.zoomSpeed = 0.8;
    controls.panSpeed = 0.5;
    
    if (controls.touches) {
        controls.touches = {
            ONE: THREE.TOUCH.ROTATE,
            TWO: THREE.TOUCH.DOLLY_PAN
        };
    }
    
    let loadedModel = null;
    const originalMaterials = new Map();
    let performanceMode = true;
    
    loadingElement.textContent = '正在加载3D模型...';
    
    const manager = new THREE.LoadingManager();
    manager.onProgress = function(url, loaded, total) {
        const percent = Math.round((loaded / total) * 100);
        loadingElement.textContent = `正在加载模型资源... ${percent}%`;
    };
    
    manager.onError = function(url) {
        console.warn('资源加载失败:', url);
    };
    
    const loader = new THREE.GLTFLoader(manager);
    
    const modelPaths = [
        '../assets/models/立方体.glb',
        '../assets/立方体.glb',
        './立方体.glb',
        '../assets/images/立方体.glb'
    ];
    
    let currentPathIndex = 0;
    
    function tryLoadModel() {
        if (currentPathIndex >= modelPaths.length) {
            showWarning('无法找到模型文件，已创建替代模型。<br>请确保模型文件存在且路径正确。');
            createFallbackModel();
            return;
        }
        
        const modelPath = modelPaths[currentPathIndex];
        console.log(`尝试加载模型: ${modelPath} (尝试 ${currentPathIndex + 1}/${modelPaths.length})`);
        
        loader.load(
            modelPath,
            function(gltf) {
                console.log('模型加载成功:', modelPath);
                
                if (!validateModel(gltf)
                ) {
                    currentPathIndex++;
                    setTimeout(tryLoadModel, 500);
                    return;
                }
                
                if (loadedModel) {
                    scene.remove(loadedModel);
                }
                
                loadedModel = gltf.scene;
                scene.add(loadedModel);
                
                saveOriginalMaterials(loadedModel);
                
                if (performanceMode) {
                    enablePerformanceMode();
                }
                
                fitCameraToObject(camera, controls, loadedModel, 1.5);
                
                loadingElement.style.display = 'none';
                console.log('3D场景初始化完成');
            },
            function(xhr) {
                const percent = Math.round(xhr.loaded / xhr.total * 100);
                loadingElement.textContent = `正在加载模型... ${percent}%`;
            },
            function(error) {
                console.error('模型加载失败:', error, '路径:', modelPath);
                currentPathIndex++;
                setTimeout(tryLoadModel, 500);
            }
        );
    }
    
    function validateModel(gltf) {
        if (!gltf.scene) {
            console.error('模型文件不包含场景数据');
            return false;
        }
        
        let hasMeshes = false;
        gltf.scene.traverse(function(child) {
            if (child.isMesh) {
                hasMeshes = true;
            }
        });
        
        if (!hasMeshes) {
            console.error('模型文件不包含网格对象');
            return false;
        }
        
        return true;
    }
    
    function saveOriginalMaterials(object) {
        originalMaterials.clear();
        
        object.traverse(function(child) {
            if (child.isMesh && child.material) {
                originalMaterials.set(child, {
                    material: child.material,
                    uuid: child.material.uuid,
                    type: child.material.type
                });
            }
        });
        
        console.log(`保存了 ${originalMaterials.size} 个材质`);
    }
    
    function enablePerformanceMode() {
        if (!loadedModel) return;
        
        console.log('启用性能模式');
        performanceMode = true;
        
        loadedModel.traverse(function(child) {
            if (child.isMesh) {
                const original = originalMaterials.get(child);
                if (original && child.material) {
                    child.userData.originalMaterial = child.material;
                    
                    const basicMaterial = new THREE.MeshBasicMaterial({
                        color: getMaterialColor(child.material),
                        map: child.material.map,
                        transparent: child.material.transparent,
                        opacity: child.material.opacity
                    });
                    
                    child.material = basicMaterial;
                }
            }
        });
        
        updatePixelRatio();
        document.getElementById('quality-toggle-btn').textContent = '高清模式';
    }
    
    function getMaterialColor(material) {
        if (material.color) return material.color;
        if (material.emissive) return material.emissive;
        return 0x888888;
    }
    
    function disablePerformanceMode() {
        if (!loadedModel) return;
        
        console.log('禁用性能模式（高清模式）');
        performanceMode = false;
        
        loadedModel.traverse(function(child) {
            if (child.isMesh && child.userData.originalMaterial) {
                child.material = child.userData.originalMaterial;
                delete child.userData.originalMaterial;
            }
        });
        
        updatePixelRatio();
        document.getElementById('quality-toggle-btn').textContent = '性能模式';
    }
    
    function updatePixelRatio() {
        const pixelRatio = performanceMode ? 
            Math.min(window.devicePixelRatio, 1) : 
            Math.min(window.devicePixelRatio, 2);
        renderer.setPixelRatio(pixelRatio);
        console.log(`设置像素比: ${pixelRatio} (性能模式: ${performanceMode})`);
    }
    
    function createFallbackModel() {
        try {
            console.log('创建替代模型');
            
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshNormalMaterial();
            const cube = new THREE.Mesh(geometry, material);
            
            scene.add(cube);
            loadedModel = cube;
            
            saveOriginalMaterials(loadedModel);
            
            fitCameraToObject(camera, controls, loadedModel, 2);
            
            loadingElement.style.display = 'none';
            
        } catch (error) {
            console.error('创建替代模型失败:', error);
            showError('无法创建3D模型，请检查控制台获取详细信息。');
        }
    }
    
    function fitCameraToObject(camera, controls, object, offset = 1.5) {
        try {
            const box = new THREE.Box3().setFromObject(object);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            
            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            let cameraZ = Math.abs(maxDim / Math.sin(fov / 2));
            
            cameraZ *= offset;
            camera.position.z = cameraZ;
            camera.lookAt(center);
            
            controls.target.copy(center);
            controls.update();
        } catch (error) {
            console.warn('调整相机位置失败:', error);
            camera.position.z = 5;
            controls.target.set(0, 0, 0);
            controls.update();
        }
    }
    
    function showError(message) {
        loadingElement.style.display = 'none';
        warningElement.style.display = 'none';
        errorElement.innerHTML = message;
        errorElement.style.display = 'block';
        console.error('显示错误:', message);
    }
    
    function showWarning(message) {
        loadingElement.style.display = 'none';
        errorElement.style.display = 'none';
        warningElement.innerHTML = message;
        warningElement.style.display = 'block';
        console.warn('显示警告:', message);
    }
    
    function isWebGLAvailable() {
        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            return !!(window.WebGLRenderingContext && gl);
        } catch (e) {
            console.error('WebGL检测失败:', e);
            return false;
        }
    }
    
    function detectLowEndDevice() {
        const ua = navigator.userAgent;
        const isLowEndCPU = navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4;
        const isLowEndMemory = navigator.deviceMemory && navigator.deviceMemory <= 4;
        const isOldDevice = /Android [1-6]|iPhone OS [1-9]/.test(ua);
        
        return isLowEndCPU || isLowEndMemory || isOldDevice;
    }
    
    console.log('开始加载模型...');
    tryLoadModel();
    
    let autoRotate = false;
    document.getElementById('auto-rotate-btn').addEventListener('click', function() {
        autoRotate = !autoRotate;
        controls.autoRotate = autoRotate;
        controls.autoRotateSpeed = 2.0;
        this.textContent = autoRotate ? '停止旋转' : '自动旋转';
        console.log('自动旋转:', autoRotate ? '开启' : '关闭');
    });
    
    document.getElementById('quality-toggle-btn').addEventListener('click', function() {
        if (performanceMode) {
            disablePerformanceMode();
        } else {
            enablePerformanceMode();
        }
    });
    
    window.addEventListener('resize', function() {
        console.log('窗口大小调整');
        const container = document.querySelector('.model-container');
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });
    
    const fabMain = document.getElementById('fabMain');
    const fabMenu = document.getElementById('fabMenu');
    
    fabMain.addEventListener('click', function(e) {
        e.stopPropagation();
        fabMenu.classList.toggle('open');
    });
    
    document.addEventListener('click', function(e) {
        if (!fabMain.contains(e.target) && !fabMenu.contains(e.target)) {
            fabMenu.classList.remove('open');
        }
    });
    
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    
    console.log('启动动画循环');
    animate();
    
    console.log('设备信息:', {
        userAgent: navigator.userAgent,
        hardwareConcurrency: navigator.hardwareConcurrency,
        deviceMemory: navigator.deviceMemory,
        pixelRatio: window.devicePixelRatio,
        isLowEndDevice: detectLowEndDevice()
    });
});
    </script>
</body>
</html>
