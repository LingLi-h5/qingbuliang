<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D模型交互展示</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            position: relative;
        }

        .page1-white-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            max-width: 400px;
            height: 97vh;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.15);
            border: 1px solid #e0e0e0;
            z-index: 1;
            pointer-events: none;
        }
        .page1-white-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 5px 0;
            position: relative;
            z-index: 2;
        }
        
        header {
            padding: 8px 0;
            width: 100%;
        }
        
        h1 {
            color: #8B4513;
            font-size: 1.4rem;
            margin-bottom: 4px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
            font-weight: 600;
        }
        
        .subtitle {
            color: #654321;
            font-size: 0.85rem;
            opacity: 0.9;
            line-height: 1.3;
        }
        
        .mobile-warning {
            background: #fff;
            padding: 20px 15px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            margin: 10px 0;
            color: #8B4513;
            font-size: 0.9rem;
            width: 100%;
            border: 1px solid #e0e0e0;
            font-weight: 500;
            line-height: 1.5;
        }
        
        .gesture-hints {
            display: flex;
            justify-content: space-around;
            margin: 10px 0;
            background: #fff;
            padding: 20px 15px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            width: 100%;
            border: 1px solid #e0e0e0;
        }
        
        .gesture-item {
            text-align: center;
            font-size: 0.85rem;
            color: #654321;
            flex: 1;
        }
        
        .gesture-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #d35400;
        }
        
        .model-container {
            position: relative;
            width: 100%;
            height: 55vh;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: 10px 0;
            border: 2px solid #8B4513;
            touch-action: none;
        }
        
        #model-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .loading, .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 10px 15px;
            border-radius: 8px;
            z-index: 10;
            text-align: center;
            max-width: 90%;
            backdrop-filter: blur(10px);
        }
        .loading { background: rgba(255,255,255,0.9); color: #8B4513; }
        .error { background: rgba(255,255,255,0.9); color: #8B0000; border: 1px solid #ffcccc; display: none; }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 8px 0;
            width: 100%;
            max-width: 300px;
        }
        
        .control-btn {
            background: linear-gradient(to right, #8B4513, #A0522D);
            border: none;
            color: #fff;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(139,69,19,0.4);
            flex: 1;
        }
        .control-btn:active { transform: scale(0.98); }

        .fab-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }
        .fab-main {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 25px rgba(139,69,19,0.5);
            border: none;
            font-size: 24px;
        }
        .fab-main:active { transform: scale(0.95); }
        .fab-menu {
            position: absolute;
            bottom: 70px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 18px;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.3s;
            pointer-events: none;
        }
        .fab-menu.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }
        .fab-item {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #fff;
            color: #8B4513;
            display: grid;
            place-items: center;
            box-shadow: 0 4px 18px rgba(0,0,0,0.25);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="page1-white-box">
    <img src="../assets/images/111.png" alt="背景">
</div>

<div class="container">
    <header>
        <h1>3D模型交互展示</h1>
        <p class="subtitle">使用手指触摸即可360°旋转查看模型</p>
    </header>
    
    <div class="mobile-warning">
        💡 提示：使用手指触摸屏幕来旋转、缩放和移动模型
    </div>
    
    <div class="gesture-hints">
        <div class="gesture-item">
            <div class="gesture-icon">👆</div>
            <div>单指旋转</div>
        </div>
        <div class="gesture-item">
            <div class="gesture-icon">🤏</div>
            <div>双指缩放</div>
        </div>
        <div class="gesture-item">
            <div class="gesture-icon">✌️</div>
            <div>双指移动</div>
        </div>
    </div>
    
    <div class="model-container">
        <div class="loading" id="loading">正在初始化3D环境...</div>
        <div class="error" id="error"></div>
        <canvas id="model-canvas"></canvas>
    </div>
    
    <div class="controls">
        <button class="control-btn" id="auto-rotate-btn">自动旋转</button>
        <button class="control-btn" id="reset-btn">重置视角</button>
    </div>
</div>

<div class="fab-container">
    <button class="fab-main" id="fabMain">
        <i class="fas fa-exchange-alt"></i>
    </button>
    <div class="fab-menu" id="fabMenu">
        <a href="page0.html" class="fab-item">菜单</a>
    </div>
</div>

<script src="../js/three.min.js"></script>
<script src="../js/OrbitControls.js"></script>
<script src="../js/GLTFLoader.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const container = document.querySelector('.model-container');
    const autoRotateBtn = document.getElementById('auto-rotate-btn');
    const resetBtn = document.getElementById('reset-btn');

    if (!window.WebGLRenderingContext) {
        error.textContent = "您的设备不支持WebGL";
        error.style.display = "block";
        loading.style.display = "none";
        return;
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffecd2);

    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.z = 3;

    const renderer = new THREE.WebGLRenderer({
        canvas: document.getElementById('model-canvas'),
        antialias: true
    });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dirLight.position.set(10, 10, 5);
    scene.add(dirLight);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.rotateSpeed = 0.7;

    const loader = new THREE.GLTFLoader();
    loader.load('../assets/images/3.glb', (gltf) => {
        const model = gltf.scene;
        scene.add(model);
        loading.style.display = 'none';

        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        camera.position.z = Math.max(size.x, size.y, size.z) * 2;
        controls.target.copy(center);
    }, undefined, (err) => {
        console.error(err);
        const cube = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshNormalMaterial());
        scene.add(cube);
        loading.style.display = 'none';
    });

    let autoRotate = false;
    autoRotateBtn.onclick = () => {
        autoRotate = !autoRotate;
        controls.autoRotate = autoRotate;
        autoRotateBtn.textContent = autoRotate ? '停止旋转' : '自动旋转';
    };

    resetBtn.onclick = () => controls.reset();

    const fabMain = document.getElementById('fabMain');
    const fabMenu = document.getElementById('fabMenu');
    fabMain.onclick = (e) => {
        e.stopPropagation();
        fabMenu.classList.toggle('open');
    };
    document.onclick = () => fabMenu.classList.remove('open');

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
});
</script>
</body>
</html>
