<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海南清补凉美食地图</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            color: #5a3921;
            position: relative;
            
            /* 开场镜头模糊变清晰 */
            filter: blur(6px);
            opacity: 0;
            animation: pageCameraIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes pageCameraIn {
            to {
                filter: blur(0);
                opacity: 1;
            }
        }

        .page-bg-container {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 96%;
            max-width: 800px;
            height: calc(100vh - 20px);
            border-radius: 10px;
            overflow: hidden;
            z-index: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .page-bg-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../assets/images/2111.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
        }

        /* 夏日微风光斑流动 */
        .page-bg-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255,255,255,0.15) 50%,
                transparent 100%
            );
            animation: windLight 8s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes windLight {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }

        .container {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 2;
            transform: scale(0.9) translateY(20px);
            opacity: 0;
            animation: containerBounceIn 1s 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes containerBounceIn {
            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .header {
            margin-bottom: 12px;
            padding: 10px 5px;
            text-align: center;
        }

        .header h1 {
            color: #8B4513;
            font-size: 1.5rem;
            margin-bottom: 6px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
            font-weight: 600;
            transform: translateY(-10px);
            opacity: 0;
            animation: titlePop 0.8s 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .header p {
            color: #654321;
            font-size: 0.85rem;
            line-height: 1.4;
            opacity: 0;
            animation: fadeIn 0.8s 0.9s forwards;
        }

        @keyframes titlePop {
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .map-container {
            position: relative;
            width: 100%;
            height: 46vh;
            min-height: 320px;
            background: url("../assets/images/地图.png") no-repeat center center;
            background-size: cover;
            border-radius: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.12);
            overflow: visible;
            margin-bottom: 16px;
            z-index: 3;
            
            transform: scale(0.85);
            opacity: 0;
            animation: mapPopBounce 1.1s 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes mapPopBounce {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .hainan-map {
            position: relative;
            width: 100%;
            height: 100%;
            animation: mapBreathe 4s ease-in-out infinite alternate;
        }

        /* Q弹呼吸感 */
        @keyframes mapBreathe {
            0% { transform: scale(1); }
            50% { transform: scale(1.01); }
            100% { transform: scale(1); }
        }

        .location {
            position: absolute;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B4513, #A0522D);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(139, 69, 19, 0.4);
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
            transform: translate(-50%, -50%);
            
            /* 标记掉落动画 */
            opacity: 0;
            transform: translate(-50%, -100px);
            animation: markerDrop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* 每个标记错开时间掉下来 */
        .location:nth-child(1)  { animation-delay: 1.2s; }
        .location:nth-child(3)  { animation-delay: 1.3s; }
        .location:nth-child(5)  { animation-delay: 1.4s; }
        .location:nth-child(7)  { animation-delay: 1.5s; }
        .location:nth-child(9)  { animation-delay: 1.6s; }
        .location:nth-child(11) { animation-delay: 1.7s; }

        @keyframes markerDrop {
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        /* 点击波纹 */
        .location::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: scale(0);
            opacity: 0;
        }
        .location:active::after {
            animation: ripple 0.4s linear forwards;
        }
        @keyframes ripple {
            to {
                transform: scale(1.8);
                opacity: 0;
            }
        }

        .location:hover {
            transform: translate(-50%, -50%) scale(1.08);
        }
        .location:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        .location i {
            color: white;
            font-size: 1rem;
        }

        .location-info {
            position: absolute;
            background: #fff;
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            width: 85vw;
            max-width: 330px;
            z-index: 999;
            display: none;
            border: 1px solid rgba(139, 69, 19, 0.2);
            left: 50%;
            bottom: 10px;
            transform: translateX(-50%) scale(0.8);
            transform-origin: bottom center;
        }

        .location-info.active {
            display: block;
            animation: infoPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* 弹窗嘭一下弹出 */
        @keyframes infoPop {
            to { transform: translateX(-50%) scale(1); }
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
        }
        .shop-name { font-size: 1.05rem; color: #8B4513; font-weight: bold; }
        .rating {
            background: #ffd700;
            padding: 3px 6px;
            border-radius: 15px;
            color: #8B4513;
            font-weight: bold;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
        }
        .rating i { margin-right: 3px; font-size: 0.7rem; }

        .detail-item {
            margin-bottom: 7px;
            display: flex;
            align-items: flex-start;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        .detail-item i {
            color: #8B4513;
            margin-right: 8px;
            margin-top: 2px;
            width: 14px;
        }
        .detail-label { font-weight: bold; color: #654321; margin-right: 4px; }
        .specialty {
            background: rgba(255,236,210,0.5);
            padding: 6px 10px;
            border-radius: 6px;
            margin-top: 4px;
            font-size: 0.8rem;
        }

        .instructions {
            background: #fff;
            border-radius: 22px;
            padding: 20px 16px;
            margin-bottom: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.18);
            border: 1px solid #e0e0e0;
            position: relative;
            z-index: 2;
            
            transform: translateY(30px) scale(0.9);
            opacity: 0;
            animation: guideCardIn 0.8s 1.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes guideCardIn {
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .instructions h2 {
            color: #d35400;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 16px;
            position: relative;
        }
        .instructions h2::after {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #e74c3c, #f39c12, #2ecc71);
            border-radius: 2px;
        }
        .instructions ul { padding-left: 20px; }
        .instructions li {
            margin-bottom: 10px;
            line-height: 1.5;
            font-size: 0.9rem;
            color: #5a3921;
            opacity: 0;
            animation: liSlideIn 0.5s ease forwards;
        }
        .instructions li:nth-child(1) { animation-delay: 2.0s; }
        .instructions li:nth-child(2) { animation-delay: 2.1s; }
        .instructions li:nth-child(3) { animation-delay: 2.2s; }
        @keyframes liSlideIn { to { opacity: 1; } }

        /* 悬浮按钮 */
        .fab-container {
            position: fixed;
            bottom: 22px;
            right: 20px;
            z-index: 1000;
            opacity: 0;
            animation: fabJumpIn 0.7s 2.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes fabJumpIn {
            to { opacity: 1; transform: scale(1); }
            from { opacity: 0; transform: scale(0.5); }
        }

        .fab-main {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(139,69,19,0.4);
            border: none;
            font-size: 22px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }
        .fab-main:active { transform: scale(0.93); }

        .fab-menu {
            position: absolute;
            bottom: 68px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
            opacity: 0;
            transform: translateY(10px) scale(0.9);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }
        .fab-menu.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .fab-item {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: white;
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s ease;
        }
        .fab-item:active { transform: scale(0.95); background: #f5e3d4; }

        /* 适配 */
        @media (max-width: 480px) {
            .map-container { min-height: 290px; }
            .location { width: 34px; height: 34px; }
            .instructions { padding: 18px 14px; border-radius: 20px; }
            .location-info { width: 88vw; }
        }
        @media (max-width: 360px) {
            .map-container { min-height: 260px; }
            .location { width: 30px; height: 30px; }
        }
    </style>
</head>
<body>

<div class="page-bg-container"></div>

<div class="container">
    <div class="header">
        <h1>海南清补凉美食地图</h1>
        <p>探索海南岛最地道的清补凉美味，点击地图标记发现美食店铺</p>
    </div>
    
    <div class="map-container">
        <div class="hainan-map" id="hainanMap"></div>
    </div>
    
    <div class="instructions">
        <h2>探索指南</h2>
        <ul>
            <li><strong>点击地图标记</strong> - 查看店铺详细信息，包括招牌推荐和用户评分</li>
            <li><strong>寻找最佳店铺</strong> - 金色标记表示评分4.7以上的高口碑店铺</li>
            <li><strong>探索全岛美味</strong> - 从海口到三亚，发现各地特色清补凉</li>
        </ul>
    </div>
</div>

<div class="fab-container">
    <button class="fab-main" id="fabMain">
        <i class="fas fa-exchange-alt"></i>
    </button>
    <div class="fab-menu" id="fabMenu">
        <a href="page0.html" class="fab-item">菜单</a>
        <a href="page9.html" class="fab-item">下页</a>
    </div>
</div>

<script>
const shops = [
    {id:1,name:"老彭记清补凉",position:{x:45,y:65},rating:4.8,price:"15-25元",address:"海口市美兰区海府路12号",specialty:["椰子水清补凉","椰奶清补凉","冰淇淋清补凉"],description:"海口老字号，传承三代人的手艺，椰子水清甜爽口。"},
    {id:2,name:"旺溪清补凉",position:{x:60,y:40},rating:4.7,price:"12-20元",address:"文昌市文城镇东风路88号",specialty:["芋圆清补凉","红豆沙清补凉","传统椰奶清补凉"],description:"文昌人气店铺，芋圆Q弹有嚼劲，深受当地人喜爱。"},
    {id:3,name:"甜蜜蜜清补凉",position:{x:30,y:50},rating:4.5,price:"10-18元",address:"琼海市嘉积镇人民路56号",specialty:["芒果清补凉","百香果清补凉","招牌椰奶清补凉"],description:"创新口味清补凉，水果系列特别受年轻人欢迎。"},
    {id:4,name:"老街清补凉",position:{x:40,y:30},rating:4.6,price:"8-15元",address:"万宁市万城镇解放路102号",specialty:["传统红糖清补凉","绿豆清补凉","桂圆红枣清补凉"],description:"坚持传统制作工艺，红糖清补凉甜而不腻。"},
    {id:5,name:"海风清补凉",position:{x:20,y:70},rating:4.9,price:"18-30元",address:"三亚市吉阳区滨海路205号",specialty:["豪华海鲜清补凉","椰皇清补凉","冰沙清补凉"],description:"高端清补凉体验，用料讲究，环境优雅。"},
    {id:6,name:"阿婆清补凉",position:{x:55,y:55},rating:4.4,price:"6-12元",address:"儋州市那大镇文化路34号",specialty:["传统清补凉","冬瓜薏清补凉","莲子清补凉"],description:"三十年老店，价格亲民，味道纯正。"}
];

document.addEventListener('DOMContentLoaded', function() {
    const mapContainer = document.getElementById('hainanMap');
    shops.forEach(shop => createShopMarker(shop, mapContainer));

    const fabMain = document.getElementById('fabMain');
    const fabMenu = document.getElementById('fabMenu');
    
    fabMain.addEventListener('click', e => {
        e.stopPropagation();
        fabMenu.classList.toggle('open');
    });

    document.addEventListener('click', () => {
        fabMenu.classList.remove('open');
        document.querySelectorAll('.location-info').forEach(i => i.classList.remove('active'));
    });
});

function createShopMarker(shop, container) {
    const marker = document.createElement('div');
    marker.className = 'location';
    marker.style.left = shop.position.x + '%';
    marker.style.top = shop.position.y + '%';

    if (shop.rating >= 4.7) {
        marker.innerHTML = '<i class="fas fa-crown"></i>';
        marker.style.background = 'linear-gradient(135deg, #FFD700, #FFA500)';
    } else {
        marker.innerHTML = '<i class="fas fa-utensils"></i>';
    }

    const infoWindow = document.createElement('div');
    infoWindow.className = 'location-info';
    infoWindow.innerHTML = `
        <div class="info-header">
            <div class="shop-name">${shop.name}</div>
            <div class="rating"><i class="fas fa-star"></i>${shop.rating}</div>
        </div>
        <div class="info-details">
            <div class="detail-item"><i class="fas fa-tag"></i><span class="detail-label">人均:</span>${shop.price}</div>
            <div class="detail-item"><i class="fas fa-map-marker-alt"></i><span class="detail-label">地址:</span>${shop.address}</div>
            <div class="detail-item"><i class="fas fa-utensil-spoon"></i><span class="detail-label">招牌推荐:</span></div>
            <div class="specialty">${shop.specialty.map(s=>`<div>• ${s}</div>`).join('')}</div>
            <div class="detail-item" style="margin-top:8px;"><i class="fas fa-info-circle"></i><span>${shop.description}</span></div>
        </div>`;

    marker.addEventListener('click', e => {
        e.stopPropagation();
        document.querySelectorAll('.location-info').forEach(i=>i.classList.remove('active'));
        infoWindow.classList.add('active');
    });

    container.appendChild(marker);
    container.appendChild(infoWindow);
}
</script>
</body>
</html>
