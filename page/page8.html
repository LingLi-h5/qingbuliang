<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海南清补凉美食地图</title>
	<script src="../js/bj-music.js"></script>	
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
			-webkit-tap-highlight-color: transparent;
			outline: none;
        }

        /* 整页入场动画核心 */
        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            color: #5a3921;
            position: relative;
            
            /* 入场动画 */
            opacity: 0;
            animation: pageIn 1s ease forwards;
        }

        /* 定义整页淡入 + 轻微上移动画 */
        @keyframes pageIn {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-bg-container {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 96%;
            max-width: 800px;
            height: calc(100vh - 20px);
            border-radius: 10px;
            overflow: hidden;
            z-index: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .page-bg-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../assets/images/图腾背景.png');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 2;
        }

        .header {
            margin-bottom: 12px;
            padding: 10px 5px;
            text-align: center;
        }

        .header h1 {
            color: #8B4513;
            font-size: 1.5rem;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .header p {
            color: #654321;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .map-container {
            position: relative;
            width: 100%;
            height: 46vh;
            min-height: 320px;
            background: url("../assets/images/地图.png") no-repeat center center;
            background-size: cover;
            border-radius: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.12);
            margin-bottom: 16px;
            z-index: 3;
        }

        .hainan-map {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .location {
            position: absolute;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B4513, #A0522D);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(139, 69, 19, 0.4);
            z-index: 10;
            transform: translate(-50%, -50%);
        }

        .location i {
            color: white;
            font-size: 1rem;
        }

        .location-info {
            position: absolute;
            background: #fff;
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            width: 85vw;
            max-width: 330px;
            z-index: 999;
            display: none;
            border: 1px solid rgba(139, 69, 19, 0.2);
            left: 50%;
            bottom: 10px;
            transform: translateX(-50%);
        }

        .location-info.active {
            display: block;
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
        }
        .shop-name { 
            font-size: 1.05rem; 
            color: #8B4513; 
            font-weight: bold; 
        }
        .rating {
            background: #ffd700;
            padding: 3px 6px;
            border-radius: 15px;
            color: #8B4513;
            font-weight: bold;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
        }
        .rating i { 
            margin-right: 3px; 
            font-size: 0.7rem; 
        }

        .detail-item {
            margin-bottom: 7px;
            display: flex;
            align-items: flex-start;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        .detail-item i {
            color: #8B4513;
            margin-right: 8px;
            margin-top: 2px;
            width: 14px;
        }
        .detail-label { 
            font-weight: bold; 
            color: #654321; 
            margin-right: 4px; 
        }
        .specialty {
            background: rgba(255,236,210,0.5);
            padding: 6px 10px;
            border-radius: 6px;
            margin-top: 4px;
            font-size: 0.8rem;
        }

        .instructions {
            background: #fff;
            border-radius: 22px;
            padding: 20px 16px;
            margin-bottom: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.18);
            border: 1px solid #e0e0e0;
            position: relative;
            z-index: 2;
        }

        .instructions h2 {
            color: #d35400;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 16px;
            position: relative;
        }
        .instructions h2::after {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #e74c3c, #f39c12, #2ecc71);
            border-radius: 2px;
        }
        .instructions ul { 
            padding-left: 20px; 
        }
        .instructions li {
            margin-bottom: 10px;
            line-height: 1.5;
            font-size: 0.9rem;
            color: #5a3921;
        }

        .fab-container {
            position: fixed;
            bottom: 22px;
            right: 20px;
            z-index: 1000;
        }

        .fab-main {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(139,69,19,0.4);
            border: none;
            font-size: 22px;
            cursor: pointer;
        }

        .fab-menu {
            position: absolute;
            bottom: 68px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
        }
        .fab-menu.open {
            opacity: 1;
            pointer-events: all;
        }

        .fab-item {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: white;
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .map-container { min-height: 290px; }
            .location { width: 34px; height: 34px; }
            .instructions { padding: 18px 14px; border-radius: 20px; }
            .location-info { width: 88vw; }
        }
        @media (max-width: 360px) {
            .map-container { min-height: 260px; }
            .location { width: 30px; height: 30px; }
        }
    </style>
</head>
<body>

<div class="page-bg-container"></div>

<div class="container">
    <div class="header">
        <h1>海南清补凉美食地图</h1>
        <p>探索海南岛最地道的清补凉美味，点击地图标记发现美食店铺</p>
    </div>
    
    <div class="map-container">
        <div class="hainan-map" id="hainanMap"></div>
    </div>
    
    <div class="instructions">
        <h2>探索指南</h2>
        <ul>
            <li><strong>点击地图标记</strong> - 查看店铺详细信息，包括招牌推荐和用户评分</li>
            <li><strong>寻找最佳店铺</strong> - 金色标记表示评分4.7以上的高口碑店铺</li>
            <li><strong>探索全岛美味</strong> - 从海口到三亚，发现各地特色清补凉</li>
        </ul>
    </div>
</div>

<div class="fab-container">
    <button class="fab-main" id="fabMain">
        <i class="fas fa-exchange-alt"></i>
    </button>
    <div class="fab-menu" id="fabMenu">
        <a href="page0.html" class="fab-item">菜单</a>
        <a href="page9.html" class="fab-item">下页</a>
    </div>
</div>

<script>
const shops = [
    {id:1,name:"椰语堂.海南清补凉",position:{x:45,y:65},rating:4.1,price:"24元/人",address:"海口市龙华区中山路骑楼老街50—2号",specialty:["椰奶冰淇淋清补凉","椰奶桃胶清补凉","原汁椰奶椰皇冻"],description:"有停车场，不可吸烟，露天位"},
    {id:2,name:"清爽清补凉",position:{x:60,y:40},rating:4.3,price:"11元/人",address:"文昌市新兴路106号",specialty:["椰奶清补凉","椰子水清补凉","炒冰清补凉"],description:"免费停车"},
    {id:3,name:"琼海胜记清补凉",position:{x:30,y:50},rating:4.2,price:"20元/人",address:"琼海市富康街143号",specialty:["椰奶斑斓冻清补凉","水果椰奶清补凉","芋圆清补凉"],description:"免费停车，不可吸烟，室外可携带宠物"},
    {id:4,name:"正宗琼海清补凉",position:{x:40,y:30},rating:4.3,price:"14元/人",address:"万宁市万东街605号",specialty:["清补凉","炒冰","椰子冻"],description:"椰奶配料丰富"},
    {id:5,name:"三姐椰奶清补凉.水果炒冰",position:{x:20,y:70},rating:4.8,price:"18元/人",address:"三亚市吉阳区渔村路295号二层-1号铺面",specialty:["招牌椰奶清补凉","芒果炒冰","招牌冰淇淋清补凉"],description:"安心吃，免费停车，室外可携带宠物"},
    {id:6,name:"椰乡清补凉",position:{x:55,y:55},rating:4.7,price:"12元/人",address:"儋州市南司人民大道农业银行对面",specialty:["招牌冰沙清补凉","斑斓清补凉","招牌椰奶清补凉"],description:"小料种类丰富"}
];

document.addEventListener('DOMContentLoaded', function() {
    const mapContainer = document.getElementById('hainanMap');
    shops.forEach(shop => createShopMarker(shop, mapContainer));

    const fabMain = document.getElementById('fabMain');
    const fabMenu = document.getElementById('fabMenu');
    
    fabMain.addEventListener('click', function(e) {
        e.stopPropagation();
        fabMenu.classList.toggle('open');
    });

    document.addEventListener('click', function() {
        fabMenu.classList.remove('open');
        document.querySelectorAll('.location-info').forEach(item => item.classList.remove('active'));
    });
});

function createShopMarker(shop, container) {
    const marker = document.createElement('div');
    marker.className = 'location';
    marker.style.left = shop.position.x + '%';
    marker.style.top = shop.position.y + '%';

    if (shop.rating >= 4.7) {
        marker.innerHTML = '<i class="fas fa-crown"></i>';
        marker.style.background = 'linear-gradient(135deg, #FFD700, #FFA500)';
    } else {
        marker.innerHTML = '<i class="fas fa-utensils"></i>';
    }

    const infoWindow = document.createElement('div');
    infoWindow.className = 'location-info';
    infoWindow.innerHTML = `
        <div class="info-header">
            <div class="shop-name">${shop.name}</div>
            <div class="rating"><i class="fas fa-star"></i>${shop.rating}</div>
        </div>
        <div class="info-details">
            <div class="detail-item"><i class="fas fa-tag"></i><span class="detail-label">人均:</span>${shop.price}</div>
            <div class="detail-item"><i class="fas fa-map-marker-alt"></i><span class="detail-label">地址:</span>${shop.address}</div>
            <div class="detail-item"><i class="fas fa-utensil-spoon"></i><span class="detail-label">招牌推荐:</span></div>
            <div class="specialty">${shop.specialty.map(s=>`<div>• ${s}</div>`).join('')}</div>
            <div class="detail-item" style="margin-top:8px;"><i class="fas fa-info-circle"></i><span>${shop.description}</span></div>
        </div>`;

    marker.addEventListener('click', function(e) {
        e.stopPropagation();
        document.querySelectorAll('.location-info').forEach(item=>item.classList.remove('active'));
        infoWindow.classList.add('active');
    });

    container.appendChild(marker);
    container.appendChild(infoWindow);
}
</script>
</body>
</html>
