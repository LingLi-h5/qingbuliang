<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>轻松分享，传递美味与文化</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 12px;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../assets/images/99.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
            pointer-events: none;
        }

        .title {
            position: relative;
            width: 100%;
            text-align: center;
            color: #333;
            z-index: 10;
            text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.8);
            padding: 10px;
            margin: 20px 0 24px;
            opacity: 0;
            animation: bounceIn 0.75s ease forwards;
            animation-delay: 0.1s;
        }

        .title h1 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .title p {
            font-size: 0.92rem;
            color: #666;
            line-height: 1.5;
            max-width: 90%;
            margin: 0 auto;
        }

        .share-cards {
            position: relative;
            z-index: 10;
            width: 94%;
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 26px;
            opacity: 0;
            animation: bounceIn 0.75s ease forwards;
            animation-delay: 0.25s;
        }

        .share-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 18px 16px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.06);
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .share-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 0;
            height: 0;
            border-top: 20px solid #D2691E;
            border-left: 20px solid transparent;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .share-card:active {
            transform: scale(0.97);
            background: #fff9f5;
        }

        .share-card.active {
            border: 2px solid #8B4513;
            background: #fff9f5;
            box-shadow: 0 4px 18px rgba(139, 69, 19, 0.15);
        }

        .share-card.active::after {
            opacity: 1;
        }

        .share-card h3 {
            font-size: 1.05rem;
            color: #8B4513;
            margin-bottom: 8px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .share-card h3 i {
            font-size: 1.1rem;
        }

        .share-card p {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.5;
        }

        .share-channels {
            position: relative;
            z-index: 10;
            width: 94%;
            margin-bottom: 28px;
            opacity: 0;
            animation: bounceIn 0.75s ease forwards;
            animation-delay: 0.4s;
        }

        .share-channels h3 {
            font-size: 1rem;
            color: #333;
            margin-bottom: 16px;
            text-align: center;
            font-weight: 600;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            justify-items: center;
        }

        .channel-item {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.12);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .channel-item:active {
            transform: scale(0.9);
        }

        .channel-item i {
            font-size: 22px;
            color: #8B4513;
        }

        .channel-item span {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.72rem;
            color: #555;
            white-space: nowrap;
        }

        .main-share-btn {
            position: relative;
            z-index: 10;
            width: 90%;
            height: 50px;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.28);
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            opacity: 0;
            animation: bounceIn 0.75s ease forwards;
            animation-delay: 0.55s;
        }

        .main-share-btn:active {
            transform: scale(0.96);
        }

        .main-share-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .main-share-btn i {
            font-size: 1.15rem;
        }

        .fab-container {
            position: fixed;
            bottom: 20px;
            right: 15px;
            z-index: 100;
        }

        .fab-main {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B451E, #D2691E);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.35);
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 22px;
            position: relative;
            z-index: 101;
        }

        .fab-main.active {
            transform: rotate(45deg);
        }

        .fab-menu {
            position: absolute;
            bottom: 68px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .fab-menu.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .fab-item {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: white;
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.18);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
        }

        .fab-item:active {
            transform: scale(0.9);
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.4) translateY(30px);
            }
            60% {
                opacity: 1;
                transform: scale(1.1) translateY(-6px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>轻松分享，传递美味与文化</h1>
            <p>选择您想分享的内容，一键发送至社交平台，邀请好友一起探索清补凉的世界。</p>
        </div>

        <div class="share-cards">
            <div class="share-card" id="card1">
                <h3><i class="fas fa-scroll"></i> 清补凉历史长卷</h3>
                <p>“从秦汉药食到现代甜品，一碗清补凉穿越千年时光。点击探索完整时间轴 →”</p>
            </div>

            <div class="share-card" id="card2">
                <h3><i class="fas fa-bowl-food"></i> 我的清补凉制作成果</h3>
                <p>“亲手制作了一碗地道海南清补凉！你也来试试这个沉浸式制作教程吧 →”</p>
            </div>

            <div class="share-card" id="card3">
                <h3><i class="fas fa-trophy"></i> 食材功效闯关成绩单</h3>
                <p>“在清补凉功效匹配游戏中获得XX分！你能挑战更高分吗？快来试试 →”</p>
            </div>
        </div>

        <div class="share-channels">
            <h3>选择分享平台</h3>
            <div class="channels-grid">
                <div class="channel-item" id="wechat">
                    <i class="fab fa-weixin"></i>
                    <span>微信</span>
                </div>
                <div class="channel-item" id="weibo">
                    <i class="fab fa-weibo"></i>
                    <span>微博</span>
                </div>
                <div class="channel-item" id="qq">
                    <i class="fab fa-qq"></i>
                    <span>QQ</span>
                </div>
                <div class="channel-item" id="xiaohongshu">
                    <i class="fas fa-book-open"></i>
                    <span>小红书</span>
                </div>
            </div>
        </div>

        <button class="main-share-btn" id="shareBtn" disabled>
            <i class="fas fa-paper-plane"></i> 复制链接并分享
        </button>
    </div>

    <div class="fab-container">
        <button class="fab-main" id="fabMain">
            <i class="fas fa-exchange-alt"></i>
        </button>
        <div class="fab-menu" id="fabMenu">
            <a href="page0.html" class="fab-item">菜单</a>
            <a href="page12.html" class="fab-item">下页</a>
        </div>
    </div>

    <script>
        const shareCards = document.querySelectorAll('.share-card');
        const shareBtn = document.getElementById('shareBtn');
        const channelItems = document.querySelectorAll('.channel-item');
        const fabMain = document.getElementById('fabMain');
        const fabMenu = document.getElementById('fabMenu');
        let selectedCard = null;

        const SHARE_LINK = "https://lingli-h5.github.io/qingbuliang/";
        const shareTexts = {
            card1: "清补凉历史长卷：从秦汉药食到现代甜品，一碗清补凉穿越千年时光，快来一起探索！",
            card2: "我亲手做了一碗地道海南清补凉！超详细沉浸式教程，你也来试试～",
            card3: "在清补凉食材功效闯关游戏中拿到高分啦！你敢来挑战我的记录吗？"
        };

        shareCards.forEach(card => {
            card.addEventListener('click', () => {
                shareCards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                selectedCard = card.id;
                shareBtn.disabled = false;
            });
        });

        function copyToShare() {
            const text = shareTexts[selectedCard];
            const fullContent = `${text}\n\n${SHARE_LINK}`;

            const textarea = document.createElement('textarea');
            textarea.value = fullContent;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);

            alert("✅ 分享内容已复制！\n\n打开微信/微博/QQ/小红书，粘贴给好友即可～\n好友点击链接就能直接打开页面！");
        }

        shareBtn.addEventListener('click', copyToShare);

        channelItems.forEach(item => {
            item.addEventListener('click', () => {
                if (!selectedCard) {
                    alert("请先选择要分享的内容哦～");
                    return;
                }
                copyToShare();
            });
        });

        fabMain.addEventListener('click', (e) => {
            e.stopPropagation();
            fabMenu.classList.toggle('open');
            fabMain.classList.toggle('active');
        });

        document.addEventListener('click', () => {
            fabMenu.classList.remove('open');
            fabMain.classList.remove('active');
        });
    </script>
</body>
</html>
