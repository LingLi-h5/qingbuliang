<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>轻松分享，传递美味与文化</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            touch-action: manipulation;
            /* 禁止滚动 */
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 10px;
            /* 完全禁止滚动 */
            overflow: hidden !important;
            overflow-y: hidden !important;
            overflow-x: hidden !important;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../assets/images/99.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
            pointer-events: none;

        }

        .title {
            position: relative;
            width: 100%;
            text-align: center;
            color: #333;
            z-index: 10;
            text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.8);
            padding: 10px;
            margin: 15px 0 20px;
        }

        .title h1 {
            font-size: 1.3rem;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .title p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.4;
            max-width: 90%;
            margin: 0 auto;
        }

        .share-cards {
            position: relative;
            z-index: 10;
            width: 92%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .share-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 16px 14px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.12);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .share-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 0;
            height: 0;
            border-top: 20px solid #D2691E;
            border-left: 20px solid transparent;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .share-card:active {
            transform: scale(0.97);
            background: #fff9f5;
        }

        .share-card.active {
            border: 2px solid #8B4513;
            background: #fff9f5;
        }

        .share-card.active::after {
            opacity: 1;
        }

        .share-card h3 {
            font-size: 1rem;
            color: #8B4513;
            margin-bottom: 6px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .share-card h3 i {
            font-size: 1rem;
        }

        .share-card p {
            font-size: 0.85rem;
            color: #555;
            line-height: 1.4;
        }

        .share-channels {
            position: relative;
            z-index: 10;
            width: 92%;
            margin-bottom: 20px;
        }

        .share-channels h3 {
            font-size: 1rem;
            color: #333;
            margin-bottom: 12px;
            text-align: center;
            font-weight: 600;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            justify-items: center;
        }

        .channel-item {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .channel-item:active {
            transform: scale(0.9);
        }

        .channel-item i {
            font-size: 20px;
            color: #8B4513;
        }

        .channel-item span {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: #555;
            white-space: nowrap;
        }

        .main-share-btn {
            position: relative;
            z-index: 10;
            width: 88%;
            height: 46px;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: white;
            border: none;
            border-radius: 23px;
            font-size: 0.95rem;
            font-weight: 600;
            box-shadow: 0 5px 18px rgba(139, 69, 19, 0.35);
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .main-share-btn:active {
            transform: scale(0.96);
        }

        .main-share-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .main-share-btn i {
            font-size: 1.1rem;
        }

        .fab-container {
            position: fixed;
            bottom: 20px;
            right: 15px;
            z-index: 100;
        }

        .fab-main {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B451E, #D2691E);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 22px;
            position: relative;
            z-index: 101;
        }

        .fab-main.active {
            transform: rotate(45deg);
        }

        .fab-menu {
            position: absolute;
            bottom: 65px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .fab-menu.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .fab-item {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: white;
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
        }

        .fab-item:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>轻松分享，传递美味与文化</h1>
            <p>选择您想分享的内容，一键发送至社交平台，邀请好友一起探索清补凉的世界。</p>
        </div>

        <div class="share-cards">
            <div class="share-card" id="card1">
                <h3><i class="fas fa-scroll"></i> 清补凉历史长卷</h3>
                <p>“从秦汉药食到现代甜品，一碗清补凉穿越千年时光。点击探索完整时间轴 →”</p>
            </div>

            <div class="share-card" id="card2">
                <h3><i class="fas fa-bowl-food"></i> 我的清补凉制作成果</h3>
                <p>“亲手制作了一碗地道海南清补凉！你也来试试这个沉浸式制作教程吧 →”</p>
            </div>

            <div class="share-card" id="card3">
                <h3><i class="fas fa-trophy"></i> 食材功效闯关成绩单</h3>
                <p>“在清补凉功效匹配游戏中获得XX分！你能挑战更高分吗？快来试试 →”</p>
            </div>
        </div>

        <div class="share-channels">
            <h3>选择分享平台</h3>
            <div class="channels-grid">
                <div class="channel-item" id="wechat">
                    <i class="fab fa-weixin"></i>
                    <span>微信</span>
                </div>
                <div class="channel-item" id="weibo">
                    <i class="fab fa-weibo"></i>
                    <span>微博</span>
                </div>
                <div class="channel-item" id="qq">
                    <i class="fab fa-qq"></i>
                    <span>QQ</span>
                </div>
                <div class="channel-item" id="xiaohongshu">
                    <i class="fas fa-book-open"></i>
                    <span>小红书</span>
                </div>
                <div class="channel-item" id="save">
                    <i class="fas fa-download"></i>
                    <span>保存相册</span>
                </div>
            </div>
        </div>

        <button class="main-share-btn" id="shareBtn" disabled>
            <i class="fas fa-paper-plane"></i> 生成并分享
        </button>
    </div>

    <div class="fab-container">
        <button class="fab-main" id="fabMain">
            <i class="fas fa-exchange-alt"></i>
        </button>
        <div class="fab-menu" id="fabMenu">
            <a href="page0.html" class="fab-item">菜单</a>
            <a href="page12.html" class="fab-item">下页</a>
        </div>
    </div>

    <script>
        const shareCards = document.querySelectorAll('.share-card');
        const shareBtn = document.getElementById('shareBtn');
        const channelItems = document.querySelectorAll('.channel-item');
        const fabMain = document.getElementById('fabMain');
        const fabMenu = document.getElementById('fabMenu');
        let selectedCard = null;

        shareCards.forEach(card => {
            card.addEventListener('click', () => {
                shareCards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                selectedCard = card.id;
                shareBtn.disabled = false;
            });
        });

        shareBtn.addEventListener('click', () => {
            if (!selectedCard) return;
            let content = '';
            switch(selectedCard){
                case 'card1': content = '清补凉历史长卷'; break;
                case 'card2': content = '清补凉制作成果'; break;
                case 'card3': content = '食材功效闯关成绩单'; break;
            }
            alert(`已选择：${content}\n正在生成分享内容…`);
        });

        channelItems.forEach(item => {
            item.addEventListener('click', () => {
                if (!selectedCard) {
                    alert('请先选择要分享的内容！');
                    return;
                }
                const name = item.querySelector('span').textContent;
                alert(`即将分享至【${name}】`);
            });
        });

        fabMain.addEventListener('click', (e) => {
            e.stopPropagation();
            fabMenu.classList.toggle('open');
            fabMain.classList.toggle('active');
        });

        document.addEventListener('click', () => {
            fabMenu.classList.remove('open');
            fabMain.classList.remove('active');
        });
    </script>
</body>
</html>
