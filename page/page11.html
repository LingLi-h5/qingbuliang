<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>轻松分享，传递美味与文化</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            opacity: 0;
            animation: pageIn 1s ease-out forwards;
        }

        @keyframes pageIn {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 12px;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../assets/images/三角梅背景.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
            pointer-events: none;
        }

        .title {
            position: relative;
            width: 100%;
            text-align: center;
            color: #333;
            z-index: 10;
            padding: 10px;
            margin: 20px 0 24px;
        }

        .title h1 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .title p {
            font-size: 0.92rem;
            color: #666;
            line-height: 1.5;
            max-width: 90%;
            margin: 0 auto;
        }

        .share-cards {
            position: relative;
            z-index: 10;
            width: 94%;
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 26px;
        }

        .share-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 18px 16px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: 0.2s;
        }

        .share-card.active {
            border: 2px solid #8B4513;
            background: #fff9f5;
        }

        .share-card h3 {
            font-size: 1.05rem;
            color: #8B4513;
            margin-bottom: 8px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .share-card p {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.5;
        }

        .share-channels {
            position: relative;
            z-index: 10;
            width: 94%;
            margin-bottom: 28px;
        }

        .share-channels h3 {
            font-size: 1rem;
            color: #333;
            margin-bottom: 16px;
            text-align: center;
        }

        /* 关键修改：缩小微信QQ间距 */
        .channels-grid {
            display: flex;
            justify-content: center;
            gap: 30px; /* 间距从10px改成30px，紧凑好看 */
        }

        .channel-item {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.12);
            cursor: pointer;
            position: relative;
            transition: 0.2s;
        }

        .channel-item i {
            font-size: 22px;
            color: #8B4513;
        }

        .channel-item span {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.72rem;
            color: #555;
        }

        .main-share-btn {
            position: relative;
            z-index: 10;
            width: 90%;
            height: 50px;
            background: #8B4513;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        .main-share-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .fab-container {
            position: fixed;
            bottom: 20px;
            right: 15px;
            z-index: 100;
        }

        .fab-main {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: #8B4513;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.35);
            cursor: pointer;
            border: none;
            font-size: 22px;
        }

        .fab-menu {
            position: absolute;
            bottom: 68px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .fab-menu.open {
            opacity: 1;
            pointer-events: all;
        }

        .fab-item {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: white;
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.18);
            cursor: pointer;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
        }

        /* 二维码模态框 - 已优化 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px 20px;
            border-radius: 18px;
            text-align: center;
            width: 85%;
            max-width: 340px;
        }

        .modal-content img {
            width: 100%;
            max-width: 260px;
            height: auto;
            object-fit: contain;
            margin: 15px auto;
            display: block;
        }

        .close-btn {
            margin-top: 15px;
            padding: 8px 25px;
            background: #8B4513;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- 二维码弹窗（已删除标题） -->
<div class="modal" id="qrcodeModal">
    <div class="modal-content">
        <img src="../assets/images/二维码.png" alt="二维码">
        <p>扫描二维码打开清补凉页面</p>
        <button class="close-btn" onclick="closeModal()">关闭</button>
    </div>
</div>

<div class="container">
    <div class="title">
        <h1>轻松分享，传递美味与文化</h1>
        <p>选择您想分享的内容，一键发送至社交平台，邀请好友一起探索清补凉的世界。</p>
    </div>

    <div class="share-cards">
        <div class="share-card" id="card1">
            <h3><i class="fas fa-scroll"></i> 清补凉历史</h3>
            <p>“从秦汉药食到现代甜品，一碗清补凉穿越千年时光。点击探索完整时间轴 →”</p>
        </div>

        <div class="share-card" id="card2">
            <h3><i class="fas fa-bowl-food"></i> 清补凉制作</h3>
            <p>“亲手制作了一碗地道海南清补凉！你也来试试这个沉浸式制作教程吧 →”</p>
        </div>

        <!-- 第三个卡片：扫码分享 -->
        <div class="share-card" id="card3">
            <h3><i class="fas fa-qrcode"></i> 扫码分享</h3>
            <p>“扫描二维码，快速访问页面并分享给好友 →”</p>
        </div>
    </div>

    <div class="share-channels">
        <h3>分享平台</h3>
        <div class="channels-grid">
            <!-- 只保留：微信 + QQ -->
            <div class="channel-item" id="wechat">
                <i class="fab fa-weixin"></i>
                <span>微信</span>
            </div>
            <div class="channel-item" id="qq">
                <i class="fab fa-qq"></i>
                <span>QQ</span>
            </div>
        </div>
    </div>

    <button class="main-share-btn" id="shareBtn" disabled>
        <i class="fas fa-paper-plane"></i> 复制链接并分享
    </button>
</div>

<div class="fab-container">
    <button class="fab-main" id="fabMain">
        <i class="fas fa-exchange-alt"></i>
    </button>
    <div class="fab-menu" id="fabMenu">
        <a href="page0.html" class="fab-item">菜单</a> 
        <a href="page12.html" class="fab-item">下页</a>
    </div>
</div>

<script>
    const shareCards = document.querySelectorAll('.share-card');
    const shareBtn = document.getElementById('shareBtn');
    const channelItems = document.querySelectorAll('.channel-item');
    const fabMain = document.getElementById('fabMain');
    const fabMenu = document.getElementById('fabMenu');
    const qrcodeModal = document.getElementById('qrcodeModal');
    let selectedCard = null;

    const SHARE_LINK = "https://lingli-h5.github.io/qingbuliang/";
    const shareTexts = {
        card1: "清补凉历史长卷：从秦汉药食到现代甜品，一碗清补凉穿越千年时光，快来一起探索！",
        card2: "我亲手做了一碗地道海南清补凉！超详细沉浸式教程，你也来试试～",
        card3: ""
    };

    shareCards.forEach(card => {
        card.addEventListener('click', () => {
            shareCards.forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            selectedCard = card.id;

            if (selectedCard === 'card3') {
                // 扫码：弹出二维码，禁用分享按钮
                openModal();
                shareBtn.disabled = true;
            } else {
                // 正常分享：启用按钮
                shareBtn.disabled = false;
            }
        });
    });

    function openModal() {
        qrcodeModal.style.display = "flex";
    }

    function closeModal() {
        qrcodeModal.style.display = "none";
    }

    function copyToShare() {
        if (!selectedCard || selectedCard === 'card3') return;
        const text = shareTexts[selectedCard];
        const fullContent = text + "\n\n" + SHARE_LINK;
        const textarea = document.createElement('textarea');
        textarea.value = fullContent;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        alert("✅ 分享内容已复制！");
    }

    shareBtn.addEventListener('click', copyToShare);

    channelItems.forEach(item => {
        item.addEventListener('click', () => {
            if (!selectedCard || selectedCard === 'card3') {
                alert("请选择分享内容");
                return;
            }
            copyToShare();
        });
    });

    fabMain.addEventListener('click', (e) => {
        e.stopPropagation();
        fabMenu.classList.toggle('open');
    });

    document.addEventListener('click', () => {
        fabMenu.classList.remove('open');
    });
</script>
</body>
</html>
