<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苏东坡与清补凉</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
			-webkit-tap-highlight-color: transparent; /* 移动端触摸高亮 */
			outline: none; /* 清除焦点边框 */
        }

        /* 整页入场动画核心样式 */
        body {
            background-image: url('../assets/images/苏东坡背景.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 10px;
            color: #5a3921;
            /* 入场动画 */
            opacity: 0;
            animation: pageFadeIn 1.2s ease forwards;
        }

        /* 定义整页淡入 + 轻微上浮动画 */
        @keyframes pageFadeIn {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            width: 100%;
            max-width: 500px;
            /* 容器延迟动画，更有层次感 */
            opacity: 0;
            animation: containerSlide 0.8s ease 0.5s forwards;
        }

        @keyframes containerSlide {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .header h1 {
            color: #8B4513;
            font-size: 20px;
            margin-bottom: 5px;
        }

        .header p {
            color: #654321;
            font-size: 14px;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background: #f5f5f5;
            border-radius: 3px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: linear-gradient(to right, #8B4513, #A0522D);
            width: 0%;
            transition: width 0.5s;
        }

        .scene-indicator {
            text-align: center;
            color: #654321;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 14px;
        }

        .dialogue-container {
            background: #fcf7f2;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            min-height: 350px;
            display: flex;
            flex-direction: column;
        }

        .dialogue-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            max-height: 280px;
            margin-bottom: 15px;
        }

        .dialogue-bubble {
            max-width: 85%;
            padding: 12px 14px;
            border-radius: 15px;
            line-height: 1.5;
            font-size: 14px;
            border: 2px solid;
        }

        .character {
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .character-avatar {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
        }

        .sufang {
            align-self: flex-start;
            background: #e8f4f8;
            border-color: #4a90a4;
        }

        .dongpo {
            align-self: flex-end;
            background: #fff0e0;
            border-color: #d4a574;
        }

        .choice-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .choice-btn {
            background: #8B4513;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 25px;
            font-size: 14px;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .choice-btn:active {
            opacity: 0.8;
        }

        .thinking-indicator {
            text-align: center;
            padding: 10px;
            color: #8B4513;
            font-style: italic;
        }

        .completion-message {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: none;
        }

        .completion-message h2 {
            color: #8B4513;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .restart-btn {
            background: #8B4513;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            margin-top: 15px;
            cursor: pointer;
        }

        .fab-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
        }

        .fab-main {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #8B4513;
            color: white;
            border: none;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .fab-menu {
            position: absolute;
            bottom: 60px;
            right: 0;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .fab-menu.open {
            opacity: 1;
            pointer-events: all;
        }

        .fab-item {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>苏东坡与清补凉</h1>
            <p>扮演苏东坡的书童“苏方”，体验美食奇缘</p>
        </div>

        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>

        <div class="scene-indicator" id="sceneIndicator">第一幕：初到岭南</div>

        <div class="dialogue-container">
            <div class="dialogue-content" id="dialogueContent"></div>
            <div class="choice-container" id="choiceContainer"></div>
        </div>

        <div class="completion-message" id="completionMessage">
            <h2>对话完成！</h2>
            <p>恭喜你完成了与苏东坡的对话体验！<br>通过互动了解清补凉的养生智慧。</p>
            <button class="restart-btn" id="restartBtn">
                <i class="fas fa-redo"></i> 重新开始
            </button>
        </div>
    </div>

    <div class="fab-container">
        <button class="fab-main" id="fabMain">
            <i class="fas fa-exchange-alt"></i>
        </button>
        <div class="fab-menu" id="fabMenu">
            <a href="page0.html" class="fab-item">菜单</a>
        </div>
    </div>

    <script>
        let currentIndex = 0;
        let isLock = false;

        const avatar = {
            dongpo: '../assets/images/苏东坡.png',
            sufang: '../assets/images/书童.png'
        };

        const dialogueList = [
            {
                scene: "初到海南",
                progress: 10,
                speaker: "苏东坡",
                type: "dongpo",
                msg: "苏方，海南暑热难耐，可有解暑良方？",
                choices: [
                    { text: "问当地人消暑食饮", next: 2, res: "我这就去打听。" },
                    { text: "建议吃冰镇瓜果", next: 1, res: "大人，冰镇瓜果最是解暑。" }
                ]
            },
            {
                scene: "初到海南",
                progress: 20,
                speaker: "苏东坡",
                type: "dongpo",
                msg: "冰镇之物伤脾胃，非长久之计，你去问问当地人有什么良方。",
                choices: [{ text: "遵命，去寻民间良方", next: 2, res: "是，大人。" }]
            },
            {
                scene: "偶遇清补凉",
                progress: 30,
                speaker: "苏方",
                type: "sufang",
                msg: "大人，此地有椰奶清补凉，乃海南消暑佳品。",
                choices: [{ text: "取一碗来品尝", next: 3, res: "这就为您取来。" }]
            },
            {
                scene: "品尝白玉香",
                progress: 60,
                speaker: "苏东坡",
                type: "dongpo",
                msg: "椰树之上采琼浆，捧来一碗白玉香！温润甘美，暑气全消！",
                choices: [{ text: "赞叹美味", next: 4, res: "果然是人间至味！" }]
            },
            {
                scene: "东坡最爱",
                progress: 80,
                speaker: "苏东坡",
                type: "dongpo",
                msg: "此后在琼，吾每日必食一碗，此乃我在海南最爱之物！",
                choices: [{ text: "记下这段佳话", next: 5, res: "我定将此事记下。" }]
            },
            {
                scene: "美食传世",
                progress: 100,
                speaker: "苏东坡",
                type: "dongpo",
                msg: "海韵南风如在沐，应无何处话炎凉。有清补凉相伴，天涯亦不觉苦。",
                choices: [{ text: "完成对话", next: -1, res: "是，大人！" }]
            }
        ];

        window.onload = function () {
            const content = document.getElementById('dialogueContent');
            const choiceBox = document.getElementById('choiceContainer');
            const progress = document.getElementById('progress');
            const scene = document.getElementById('sceneIndicator');
            const finish = document.getElementById('completionMessage');
            const restart = document.getElementById('restartBtn');
            const fabMain = document.getElementById('fabMain');
            const fabMenu = document.getElementById('fabMenu');

            showDialogue(0);

            restart.onclick = function () {
                currentIndex = 0;
                finish.style.display = 'none';
                content.innerHTML = '';
                showDialogue(0);
            };

            fabMain.onclick = function () {
                fabMenu.classList.toggle('open');
            };

            document.onclick = function (e) {
                if (!fabMain.contains(e.target) && !fabMenu.contains(e.target)) {
                    fabMenu.classList.remove('open');
                }
            };

            function showDialogue(index) {
                isLock = false;
                if (index === -1) {
                    finish.style.display = 'block';
                    content.innerHTML = '';
                    choiceBox.innerHTML = '';
                    return;
                }

                const data = dialogueList[index];
                progress.style.width = data.progress + '%';
                scene.innerText = data.scene;
                choiceBox.innerHTML = '';

                const bubble = document.createElement('div');
                bubble.className = `dialogue-bubble ${data.type}`;
                bubble.innerHTML = `
                    <div class="character">
                        <img src="${avatar[data.type]}" class="character-avatar"> ${data.speaker}
                    </div>
                    <div>${data.msg}</div>
                `;
                content.appendChild(bubble);
                content.scrollTop = content.scrollHeight;

                data.choices.forEach((item, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.innerHTML = `<i class="fas fa-comment"></i>${item.text}`;
                    btn.onclick = function () {
                        if (isLock) return;
                        isLock = true;
                        btn.disabled = true;

                        if (item.res) {
                            const userBubble = document.createElement('div');
                            userBubble.className = 'dialogue-bubble sufang';
                            userBubble.innerHTML = `
                                <div class="character">
                                    <img src="${avatar.sufang}" class="character-avatar"> 苏方
                                </div>
                                <div>${item.res}</div>
                            `;
                            content.appendChild(userBubble);
                            content.scrollTop = content.scrollHeight;
                        }

                        const tip = document.createElement('div');
                        tip.className = 'thinking-indicator';
                        tip.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 思考中...';
                        choiceBox.appendChild(tip);

                        setTimeout(() => {
                            currentIndex = item.next;
                            showDialogue(currentIndex);
                        }, 600);
                    };
                    choiceBox.appendChild(btn);
                });
            }
        };
    </script>
</body>
</html>
