<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清补凉主题页</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        font-family: Arial, sans-serif;
        /* 整页入场动画：淡入+上滑 0.8秒 */
        animation: pageIn 0.8s ease forwards;
    }

    /* 入场动画关键帧 */
    @keyframes pageIn {
        0% {
            opacity: 0;
            transform: translateY(30px);
        }
        100% {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
    }

    .background img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .container {
        position: relative;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 2;
        transform: translateY(5%);
        transition: all 0.3s ease; /* 让点击淡出缩小更流畅 */
    }

    .title {
        position: fixed;
        top: 0.5vh;
        left: 50%;
        transform: translateX(-50%);
        white-space: nowrap;
        color: #e67e22;
        font-size: 12vw;
        font-weight: bold;
        -webkit-text-stroke: 0.5px #663300;
        text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
    }

    .enter {
        color: #fff;
        font-size: 7vw;
        padding: 16px 48px;
        background: #e67e22;
        border-radius: 50px;
        border: 2px solid #fff;
        cursor: pointer;
        box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        white-space: nowrap;
        outline: none;
        -webkit-tap-highlight-color: transparent;
    }

    .enter:active {
        transform: scale(0.92);
        background: #d35400;
    }
</style>
</head>

<body>

<div class="background">
    <img src="../assets/images/主题页.png">
</div>

<div class="container">
    <h1 class="title">清补凉主题</h1>
    <div class="enter" id="enter">点击进入</div>
</div>

<script>
    var enter = document.getElementById("enter");
    var container = document.querySelector(".container");

    enter.onclick = function() {
        // 点击后：缩小 + 淡出
        container.style.opacity = "0";
        container.style.transform = "translateY(5%) scale(0.9)";
        
        setTimeout(function() {
            window.location.href = "page0.html";
        }, 300);
    };
</script>

</body>
</html>
