<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 手机端核心：禁止用户缩放，保证显示效果 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>清补凉主题页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 全屏容器，适配手机 */
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent; /* 消除手机端点击高亮 */
        }

        /* 全屏背景 */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .background-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 内容居中 */
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            padding: 0 20px; /* 手机边距，防止文字贴边 */
        }

        /* 标题 - 手机端专用大小 */
        .title {
            color: #fff;
            font-size: 12vw; /* 手机端用相对单位，自适应 */
            text-align: center;
            margin-bottom: 60px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
            font-weight: bold;
            animation: fadeInDown 1s ease-out;
        }

        /* 进入按钮 - 手机端手感最佳 */
        .enter-prompt {
            color: #fff;
            font-size: 7vw;
            padding: 16px 48px;
            background: #e67e22;
            border-radius: 50px;
            border: 2px solid #fff;
            cursor: pointer;
            text-align: center;
            transition: all 0.25s ease;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            animation: fadeInUp 1s ease-out 0.5s both;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 手机触摸反馈（比hover更重要） */
        .enter-prompt:active {
            transform: scale(0.94);
            background: #d35400;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        /* 动画 */
        @keyframes fadeInDown {
            from { opacity:0; transform: translateY(-30px); }
            to { opacity:1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity:0; transform: translateY(30px); }
            to { opacity:1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="background-container">
    <img src="../assets/images/222.png" alt="背景" class="background-image">
</div>

<div class="container">
    <h1 class="title">清补凉主题页</h1>
    <div class="enter-prompt" id="enterPrompt">点击进入</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const enter = document.getElementById('enterPrompt');

    // 点击跳转
    enter.addEventListener('click', () => {
        document.querySelector('.container').style.opacity = '0';
        setTimeout(() => {
            window.location.href = 'page0.html';
        }, 250);
    });

    // 手机端：禁止双击放大
    let lastTouch = 0;
    document.addEventListener('touchend', e => {
        const now = Date.now();
        if (now - lastTouch <= 200) e.preventDefault();
        lastTouch = now;
    }, false);
});
</script>

</body>
</html>
