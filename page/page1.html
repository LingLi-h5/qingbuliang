<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清补凉文化溯源</title>
	<script src="../js/bj-music.js"></script>	
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #5a3921;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            animation: pageEnter 0.8s ease-out forwards;
        }

        @keyframes pageEnter {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-bg-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            height: calc(100vh - 30px);
            border-radius: 8px;
            z-index: 0;
        }

        .page-bg-container::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('../assets/images/天涯海角背景.png');
            background-size: cover;
            background-position: center;
            opacity: 1;
        }

        .header {
            text-align: center;
            margin: 10px 0 15px;
            width: 100%;
            max-width: 340px;
            padding: 0 10px;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            color: #8B4513;
            font-size: 1.4rem;
            background: white;
            padding: 8px 16px;
            border-radius: 16px;
            display: inline-block;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }

        .header p {
            font-size: 0.9rem;
            background: white;
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            line-height: 1.6;
        }

        .timeline-container {
            width: 100%;
            max-width: 360px;
            background: white;
            border-radius: 16px;
            padding: 15px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: relative;
            z-index: 1;
            margin-bottom: 20px;
        }

        .timeline {
            display: flex;
            overflow-x: auto;
            padding: 50px 20px 20px;
            gap: 25px;
        }

        .timeline-line {
            position: absolute;
            top: 62px;
            left: 20px;
            right: 20px;
            height: 3px;
            background: #8B4513;
            z-index: 1;
        }

        .timeline-node {
            flex: 0 0 auto;
            width: 90px;
            text-align: center;
            cursor: pointer;
            border: 2px solid #E4A97E;
            border-radius: 16px;
            padding: 10px 5px;
            z-index: 2;
        }

        .timeline-node.active {
            background: #fff;
            border-color: #D2691E;
        }

        .node-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #D2691E;
        }

        .node-icon-content {
            font-size: 13px;
            font-weight: bold;
            color: white;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .qinhan { background: #8B4513; }
        .tang { background: #D2691E; }
        .minguo { background: #DEB887; }
        .modern { background: #F5DEB3; color: #8B4513; }

        .node-year {
            font-weight: bold;
            color: #8B4513;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .node-title {
            font-size: 0.8rem;
            color: #654321;
        }

        .scroll-hint {
            text-align: center;
            color: #8B4513;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            max-width: 92%;
            width: 380px;
            border-radius: 24px;
            overflow: hidden;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            background: #8B4513;
            color: white;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
        }

        .modal-body {
            padding: 22px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .modal-text {
            line-height: 1.7;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        /* 🔥 已修改：和你第二段代码完全一致的照片样式 */
        .photo-container {
            width: 100%;
            height: 260px;
            border: 2px solid #D2691E;
            border-radius: 16px;
            overflow: hidden;
            background: #f9f5f0;
            position: relative;
        }
        .history-photo {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 铺满容器 */
            display: block;
        }
        .photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #8B4513;
            font-size: 1rem;
        }

        .fab-container {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 100;
        }

        .fab-main {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #8B4513;
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .fab-menu {
            position: absolute;
            bottom: 70px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .fab-menu.open {
            opacity: 1;
            pointer-events: all;
        }

        .fab-item {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="page-bg-container"></div>

<div class="header">
    <h1>清补凉文化溯源</h1>
    <p>清补凉是海南最具代表性的传统甜品，始于秦汉药膳，兴于唐宋，民国普及，现代成为海南饮食文化名片。</p>
</div>

<div class="timeline-container">
    <div class="timeline-line"></div>
    <div class="timeline">
        <div class="timeline-node active" data-year="秦汉时期">
            <div class="node-icon">
                <div class="node-icon-content qinhan">秦汉</div>
            </div>
            <div class="node-year">秦汉时期</div>
            <div class="node-title">药食同源起源</div>
        </div>

        <div class="timeline-node" data-year="唐宋时期">
            <div class="node-icon">
                <div class="node-icon-content tang">唐宋</div>
            </div>
            <div class="node-year">唐宋时期</div>
            <div class="node-title">文人盛赞定型</div>
        </div>

        <div class="timeline-node" data-year="民国时期">
            <div class="node-icon">
                <div class="node-icon-content minguo">民国</div>
            </div>
            <div class="node-year">民国时期</div>
            <div class="node-title">街头市井普及</div>
        </div>

        <div class="timeline-node" data-year="现代">
            <div class="node-icon">
                <div class="node-icon-content modern">现代</div>
            </div>
            <div class="node-year">现代</div>
            <div class="node-title">文旅非遗名片</div>
        </div>
    </div>
    <div class="scroll-hint">左右滑动查看更多</div>
</div>

<div class="modal" id="historyModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">清补凉文化溯源</h2>
            <button class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="modal-text" id="modalText">
                <p>请点击时间轴节点查看详情</p>
            </div>
            <div class="photo-container" id="photoContainer">
                <div class="photo-placeholder">
                    <i class="fas fa-image"></i><br>
                    <span>点击查看历史照片</span>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="fab-container">
    <button class="fab-main" id="fabMain">
        <i class="fas fa-exchange-alt"></i>
    </button>
    <div class="fab-menu" id="fabMenu">
        <a href="page0.html" class="fab-item">菜单</a>
        <a href="page2.html" class="fab-item">下页</a>
    </div>
</div>

<script>
    const historyData = {
        "秦汉时期": {
            title: "药食同源起源",
            content: `<p>清补凉雏形可追溯至公元前219年，秦始皇南征百越时，随军大夫以莲子、百合、沙参等药材熬制药膳粥，用于清热祛湿、抵御暑湿，这便是清补凉的最早形态。</p>
                      <p>核心理念为“清热、补气、祛湿”，是岭南药食同源文化的早期体现。</p>`
        },
        "唐宋时期": {
            title: "文人盛赞定型",
            content: `<p>北宋文学家苏轼被贬海南期间，品尝椰奶清补凉后留下名句：<strong>“椰树之上采琼浆，捧来一碗白玉香”</strong>。</p>
                      <p>清补凉由此从药膳走向民间，成为海南特色甜品，奠定椰香清甜的风格。</p>`
        },
        "民国时期": {
            title: "街头市井普及",
            content: `<p>1920年代，清补凉开始在海南街头小摊普及，三五个铜板即可购买。</p>
                      <p>1953年，海口第二饮食公司将清补凉引入门店经营，成为夏季消暑主流甜品，形成三大经典品类。</p>`
        },
        "现代": {
            title: "文旅非遗名片",
            content: `<p>随着海南国际旅游岛建设，清补凉成为海内外游客必尝的海南标志性美食。</p>
                      <p>在传统基础上创新口味，成为海南饮食文化与非遗文化的重要代表。</p>`
        }
    };

    const photoPaths = {
        "秦汉时期": "../assets/images/图1.png",
        "唐宋时期": "../assets/images/图2.png",
        "民国时期": "../assets/images/图4.png",
        "现代": "../assets/images/图5.png"
    };

    const modal = document.getElementById('historyModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalText = document.getElementById('modalText');
    const closeBtn = document.querySelector('.close-btn');
    const photoContainer = document.getElementById('photoContainer');
    const fabMain = document.getElementById('fabMain');
    const fabMenu = document.getElementById('fabMenu');
    const nodes = document.querySelectorAll('.timeline-node');

    fabMain.onclick = function(){
        fabMenu.classList.toggle('open');
    }

    document.onclick = function(e){
        if(!fabMain.contains(e.target) && !fabMenu.contains(e.target)){
            fabMenu.classList.remove('open');
        }
    }

    nodes.forEach(node => {
        node.onclick = function(){
            nodes.forEach(n => n.classList.remove('active'));
            this.classList.add('active');
            
            let year = this.dataset.year;
            let data = historyData[year];
            
            modalTitle.innerText = year + " - " + data.title;
            modalText.innerHTML = data.content;
            
            // 🔥 图片渲染保持不变
            photoContainer.innerHTML = `<img src="${photoPaths[year]}" class="history-photo">`;
            
            modal.style.display = "flex";
            document.body.style.overflow = "hidden";
        }
    });

    closeBtn.onclick = function(){
        modal.style.display = "none";
        document.body.style.overflow = "auto";
    }

    window.onclick = function(e){
        if(e.target == modal){
            modal.style.display = "none";
            document.body.style.overflow = "auto";
        }
    }
</script>
</body>
</html>
