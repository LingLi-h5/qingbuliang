<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>清补凉文化溯源</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS变量定义保持不变 */
        :root {
            --primary-brown: #8B4513;
            --secondary-brown: #D2691E;
            --light-brown: #CD853F;
            --cream: #DEB887;
            --light-cream: #F5DEB3;
            --dark-text: #5a3921;
            --medium-text: #654321;
            --background-start: #ffecd2;
            --background-end: #fcb69f;
            --white: #fff;
            --shadow-light: rgba(0, 0, 0, 0.1);
            --shadow-medium: rgba(0, 0, 0, 0.15);
            --shadow-dark: rgba(0, 0, 0, 0.25);
            
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --radius-circle: 50%;
            
            --transition-fast: all 0.3s ease;
            --transition-medium: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-slow: all 0.5s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            color: var(--dark-text);
            position: relative;
        }

        /* 工具类 */
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 头部样式 - 仅缩小宽度、居中 */
        .header {
            text-align: center;
            margin: 8px 0 12px;
            width: 100%;
            max-width: 340px; /* 只改这里：缩小、居中 */
            padding: 0 8px;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            color: var(--primary-brown);
            font-size: 1.4rem; /* 缩小 */
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px var(--shadow-light);
            font-weight: 700;
            position: relative;
            display: inline-block;
            background: #ffffff; 
            padding: 8px 16px; /* 缩小内边距 */
            border-radius: var(--radius-md);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
            border: 1px solid #e0e0e0; 
        }

        .header h1::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: linear-gradient(to right, var(--primary-brown), var(--secondary-brown), var(--light-brown));
            border-radius: 2px;
        }

        .header p {
            color: var(--medium-text);
            font-size: 0.9rem; /* 缩小 */
            max-width: 320px; /* 缩小 */
            margin: 0 auto;
            line-height: 1.6;
            background-color: #ffffff;
            padding: 12px 14px; /* 缩小 */
            border-radius: 20px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
            border: 1px solid #e0e0e0;
            opacity: 1;
        }

        /* 🔥 背景图 100% 完全不动、不改 【完全还原你原版】 */
        .page-bg-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 800px;
            height: calc(100vh - 30px);
            border-radius: 8px;
            overflow: hidden;
            z-index: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .page-bg-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../assets/images/000.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
            pointer-events: none;
        }

        /* 时间轴容器 - 仅缩小、居中 */
        .timeline-container {
            width: 100%;
            max-width: 360px; /* 只改这里：缩小、居中 */
            margin: 0 auto 20px;
            position: relative;
            padding: 15px 0;
            background: #ffffff; 
            border-radius: var(--radius-md);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.14);
            border: 1px solid #e0e0e0; 
            position: relative;
            z-index: 1;
        }

        .timeline {
            display: flex;
            overflow-x: auto;
            padding: 50px 18px 20px;
            gap: 28px;
            scroll-behavior: smooth;
            position: relative;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .timeline::-webkit-scrollbar {
            display: none;
        }

        .timeline-line {
            position: absolute;
            top: 62px;
            left: 18px;
            right: 18px;
            height: 3px;
            background: linear-gradient(to right, var(--primary-brown), var(--secondary-brown), var(--light-brown));
            border-radius: 2px;
            z-index: 1;
            box-shadow: 0 2px 6px rgba(139, 69, 19, 0.25);
        }

        /* 时间轴节点 - 缩小 */
        .timeline-node {
            flex: 0 0 auto;
            width: 90px; /* 缩小 */
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: var(--transition-medium);
            padding: 10px 6px;
            border-radius: var(--radius-md);
            position: relative;
            z-index: 2;
        }

        .timeline-node:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.08);
        }

        .timeline-node:active {
            transform: scale(0.95);
        }

        .timeline-node.active {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.12);
        }

        .node-icon {
            width: 50px; /* 缩小 */
            height: 50px; /* 缩小 */
            border-radius: var(--radius-circle);
            background: linear-gradient(135deg, var(--white), #f9f9f9);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            box-shadow: 0 4px 12px var(--shadow-medium);
            position: relative;
            z-index: 2;
            border: 2px solid var(--secondary-brown);
            transition: var(--transition-medium);
            overflow: hidden;
        }

        .node-icon::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, var(--primary-brown), var(--secondary-brown), var(--light-brown));
            border-radius: var(--radius-circle);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .timeline-node.active .node-icon {
            transform: scale(1.1);
            box-shadow: 0 6px 18px rgba(210, 105, 30, 0.4);
        }

        .timeline-node.active .node-icon::before {
            opacity: 1;
        }

        .node-icon-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
        }

        .qinhan { background: linear-gradient(135deg, var(--primary-brown), var(--secondary-brown)); color: white; }
        .tang { background: linear-gradient(135deg, var(--light-brown), var(--secondary-brown)); color: white; }
        .ming { background: linear-gradient(135deg, var(--secondary-brown), var(--light-brown)); color: white; }
        .minguo { background: linear-gradient(135deg, var(--light-brown), var(--cream)); color: white; }
        .modern { background: linear-gradient(135deg, var(--cream), var(--light-cream)); color: var(--primary-brown); }

        .node-year {
            font-weight: 700;
            color: var(--primary-brown);
            font-size: 0.9rem; /* 缩小 */
            margin-bottom: 5px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
        }

        .node-title {
            color: var(--medium-text);
            text-align: center;
            font-size: 0.8rem; /* 缩小 */
            line-height: 1.3;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
        }

        /* 滚动提示 */
        .scroll-hint {
            text-align: center;
            color: var(--primary-brown);
            margin-top: 8px;
            font-size: 0.82rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            opacity: 0.8;
            background: #ffffff; 
            padding: 6px 14px;
            border-radius: 16px;
            margin: 8px auto;
            width: fit-content;
            border: 1px solid #e0e0e0; 
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
        }

        .scroll-hint i {
            font-size: 0.95rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-4px); }
        }

        /* 🔥 模态框 - 彻底变小、手机专用 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.4s ease;
            padding: 15px;
        }

        .modal-content {
            background-color: #ffffff;
            width: 100%;
            max-width: 320px; /* 彻底缩小 */
            padding: 18px 16px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            border: 1px solid #e0e0e0;
            opacity: 1;
            animation: slideUp 0.5s ease;
            max-height: 80vh; /* 不占满屏幕 */
            overflow-y: auto;
        }

        .modal-header {
            background: linear-gradient(to right, var(--primary-brown), var(--secondary-brown));
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            border-radius: 16px 16px 0 0;
            margin: -18px -16px 18px -16px;
        }

        .modal-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, var(--light-brown), var(--cream));
        }

        .modal-header h2 {
            font-size: 1.15rem; /* 缩小 */
            font-weight: 600;
        }

        .close-btn {
            background: rgba(255, 255, 250, 0.2);
            border: none;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-circle);
            transition: var(--transition-fast);
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .modal-text {
            line-height: 1.6;
            color: #333;
            font-size: 0.9rem; /* 缩小 */
        }

        .modal-text p {
            margin-bottom: 12px;
        }

        .modal-map {
            width: 100%;
            border-radius: var(--radius-sm);
            overflow: hidden;
            box-shadow: 0 4px 10px var(--shadow-light);
            background: #f9f5f0;
            padding: 12px;
            text-align: center;
        }

        .photo-container {
            width: 100%;
            height: 200px; /* 缩小图片高度 */
            border-radius: var(--radius-sm);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--primary-brown);
            border: 2px solid var(--secondary-brown);
            background: linear-gradient(135deg, #fff9f0 0%, #f5e9d8 100%);
            box-shadow: inset 0 0 15px rgba(139, 69, 19, 0.1);
            position: relative;
        }

        .photo-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 249, 240, 0.8) 0%, rgba(245, 233, 216, 0.8) 100%);
            z-index: 1;
        }

        .history-photo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: relative;
            z-index: 2;
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f5e3d4 0%, #e9d0b8 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--primary-brown);
            font-weight: bold;
            font-size: 1rem;
            text-align: center;
            padding: 15px;
            position: relative;
            z-index: 3;
        }

        .photo-placeholder i {
            font-size: 2.8rem;
            margin-bottom: 12px;
            opacity: 0.7;
        }

        /* 食材标签 */
        .ingredients {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            justify-content: center;
        }

        .ingredient {
            background: #f5e3d4;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.82rem;
            color: var(--primary-brown);
            font-weight: 500;
            box-shadow: 0 2px 6px rgba(139, 69, 19, 0.1);
            transition: var(--transition-fast);
        }

        .ingredient:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 8px rgba(139, 69, 19, 0.15);
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(40px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 浮动操作按钮 */
        .fab-container {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 100;
        }

        .fab-main {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-circle);
            background: linear-gradient(135deg, var(--primary-brown), var(--secondary-brown));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(139, 69, 19, 0.4);
            cursor: pointer;
            transition: var(--transition-medium);
            border: none;
            font-size: 22px;
            position: relative;
            z-index: 101;
        }

        .fab-main:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 6px 24px rgba(139, 69, 19, 0.6);
        }

        .fab-menu {
            position: absolute;
            bottom: 65px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
            opacity: 0;
            transform: translateY(20px) scale(0.9);
            transition: var(--transition-medium);
            pointer-events: none;
        }

        .fab-menu.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .fab-item {
            width: 54px;
            height: 54px;
            border-radius: var(--radius-circle);
            background: var(--white);
            color: var(--primary-brown);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 15px var(--shadow-dark);
            cursor: pointer;
            transition: var(--transition-fast);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            position: relative;
            text-align: center;
            padding: 4px;
        }

        .fab-item:hover {
            transform: scale(1.12);
            background: #f5e3d4;
            box-shadow: 0 5px 18px rgba(0, 0, 0, 0.25);
        }

        .fab-label {
            position: absolute;
            right: 65px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            font-weight: 500;
        }

        .fab-item:hover .fab-label {
            opacity: 1;
        }

        /* 移除原有媒体查询，避免冲突 */
    </style>
</head>
<body>
    <div class="page-bg-container"></div>

    <div class="header">
        <h1>清补凉文化溯源</h1>
        <p>清补凉，源自岭南地区的传统糖水，历经千年演变，融合多元文化，成为海南最具代表性的夏日甜品。</p>
    </div>

    <div class="timeline-container">
        <div class="timeline-line"></div>
        <div class="timeline">
            <div class="timeline-node" data-year="秦汉时期" data-title="药食同源起源">
                <div class="node-icon">
                    <div class="node-icon-content qinhan">秦汉</div>
                </div>
                <div class="node-year">秦汉时期</div>
                <div class="node-title">药食同源起源</div>
            </div>

            <div class="timeline-node" data-year="唐宋时期" data-title="中原文化传入">
                <div class="node-icon">
                    <div class="node-icon-content tang">唐宋</div>
                </div>
                <div class="node-year">唐宋时期</div>
                <div class="node-title">中原文化传入</div>
            </div>

            <div class="timeline-node" data-year="明清时期" data-title="岭南特色形成">
                <div class="node-icon">
                    <div class="node-icon-content ming">明清</div>
                </div>
                <div class="node-year">明清时期</div>
                <div class="node-title">岭南特色形成</div>
            </div>

            <div class="timeline-node" data-year="民国时期" data-title="海南本土化">
                <div class="node-icon">
                    <div class="node-icon-content minguo">民国</div>
                </div>
                <div class="node-year">民国时期</div>
                <div class="node-title">海南本土化</div>
            </div>

            <div class="timeline-node" data-year="现代" data-title="文化传承与创新">
                <div class="node-icon">
                    <div class="node-icon-content modern">现代</div>
                </div>
                <div class="node-year">现代</div>
                <div class="node-title">文化传承与创新</div>
            </div>
        </div>
        <div class="scroll-hint">
            <i class="fas fa-chevron-left"></i>
            <span>左右滑动查看更多</span>
            <i class="fas fa-chevron-right"></i>
        </div>
    </div>

    <div class="modal" id="historyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">清补凉文化溯源</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-text" id="modalText">
                    <p>请点击时间轴节点查看详情</p>
                </div>
                <div class="modal-map">
                    <div class="photo-container" id="photoContainer">
                        <div class="photo-placeholder">
                            <i class="fas fa-image"></i>
                            <span>点击时间轴节点查看历史照片</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 浮动操作按钮 -->
    <div class="fab-container">
        <button class="fab-main" id="fabMain">
            <i class="fas fa-exchange-alt"></i>
        </button>
        <div class="fab-menu" id="fabMenu">
            <a href="page0.html" class="fab-item" id="menuBtn">菜单</a>
            <a href="page2.html" class="fab-item">下页</a>
        </div>
    </div>

    <script>
        // 历史数据
        const historyData = {
            "秦汉时期": {
                title: "药食同源起源",
                content: `
                    <p>秦汉时期，岭南地区开始形成独特的饮食文化。清补凉的前身可以追溯到这一时期的中医"药食同源"理念。</p>
                    <p>当时人们发现，将多种具有药用价值的食材组合食用，不仅能够解暑降温，还能调理身体。这些食材包括绿豆、薏米、百合等，奠定了清补凉的基本配方。</p>
                    <div class="ingredients">
                        <div class="ingredient">绿豆</div>
                        <div class="ingredient">薏米</div>
                        <div class="ingredient">百合</div>
                        <div class="ingredient">莲子</div>
                    </div>
                `,
            },
            "唐宋时期": {
                title: "中原文化传入",
                content: `
                    <p>唐宋时期，随着中原文化与岭南地区的交流日益频繁，清补凉的配方和制作工艺得到了丰富和发展。</p>
                    <p>这一时期，丝绸之路的繁荣带来了更多食材和香料，如红枣、桂圆等，这些食材逐渐融入清补凉的配方中。</p>
                    <div class="ingredients">
                        <div class="ingredient">红枣</div>
                        <div class="ingredient">桂圆</div>
                        <div class="ingredient">枸杞</div>
                        <div class="ingredient">银耳</div>
                    </div>
                `,
            },
            "明清时期": {
                title: "岭南特色形成",
                content: `
                    <p>明清时期，清补凉在岭南地区形成了独特的地方特色，成为夏季消暑的必备饮品。</p>
                    <p>随着海上贸易的发展，东南亚的椰浆、西米等食材传入，进一步丰富了清补凉的配料和口感。</p>
                    <div class="ingredients">
                        <div class="ingredient">椰浆</div>
                        <div class="ingredient">西米</div>
                        <div class="ingredient">芋头</div>
                        <div class="ingredient">红豆</div>
                    </div>
                `,
            },
            "民国时期": {
                title: "海南本土化",
                content: `
                    <p>民国时期，随着海南岛的开发，清补凉在当地实现了进一步的本土化，形成了独特的海南风味。</p>
                    <p>海南丰富的热带水果资源，如芒果、菠萝、木瓜等，被加入清补凉中，创造了更加多样化的口味。</p>
                    <div class="ingredients">
                        <div class="ingredient">芒果</div>
                        <div class="ingredient">菠萝</div>
                        <div class="ingredient">木瓜</div>
                        <div class="ingredient">西瓜</div>
                    </div>
                `,
            },
            "现代": {
                title: "文化传承与创新",
                content: `
                    <p>现代社会中，清补凉不仅保留了传统配方和制作工艺，还不断创新，适应现代人的口味需求。</p>
                    <p>随着健康饮食理念的普及，清补凉的低糖、天然、养生特点受到越来越多消费者的青睐。</p>
                    <div class="ingredients">
                        <div class="ingredient">仙草</div>
                        <div class="ingredient">芋圆</div>
                        <div class="ingredient">布丁</div>
                        <div class="ingredient">椰果</div>
                    </div>
                `,
            }
        };

        // DOM元素
        const modal = document.getElementById('historyModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalText = document.getElementById('modalText');
        const closeBtn = document.querySelector('.close-btn');
        const fabMain = document.getElementById('fabMain');
        const fabMenu = document.getElementById('fabMenu');
        const timeline = document.querySelector('.timeline');
        const photoContainer = document.getElementById('photoContainer');
        let activeNode = document.querySelector('.timeline-node:first-child');

        // 照片路径
        const photoPaths = {
            "秦汉时期": '../assets/images/图1.png',
            "唐宋时期": '../assets/images/图2.png',
            "明清时期": '../assets/images/图3.png',
            "民国时期": '../assets/images/图4.png',
            "现代": '../assets/images/图5.png'
        };

        const photoDescriptions = {
            "秦汉时期": "秦汉时期的清补凉食材展示",
            "唐宋时期": "唐宋时期的清补凉制作工艺",
            "明清时期": "明清时期的清补凉特色配料",
            "民国时期": "民国时期的海南清补凉摊点",
            "现代": "现代清补凉的多样化创新"
        };

        function createPhotoElement(photoPath, altText) {
            const img = document.createElement('img');
            img.src = photoPath;
            img.alt = altText;
            img.className = 'history-photo';
            img.onerror = function() {
                this.parentElement.innerHTML = `
                    <div class="photo-placeholder">
                        <i class="fas fa-image"></i>
                        <span>照片加载失败<br>请检查路径: ${photoPath}</span>
                    </div>
                `;
            };
            return img;
        }

        // 浮动按钮
        fabMain.addEventListener('click', function() {
            fabMenu.classList.toggle('open');
        });

        document.addEventListener('click', function(e) {
            if (!fabMain.contains(e.target) && !fabMenu.contains(e.target)) {
                fabMenu.classList.remove('open');
            }
        });

        // 时间轴点击
        timeline.addEventListener('click', (e) => {
            const node = e.target.closest('.timeline-node');
            if (!node) return;

            const year = node.dataset.year;
            const data = historyData[year];
            
            if (data) {
                modalTitle.textContent = `${year} - ${data.title}`;
                modalText.innerHTML = data.content;
                
                if (photoPaths[year]) {
                    photoContainer.innerHTML = '';
                    const photoAlt = photoDescriptions[year] || `${year}清补凉历史照片`;
                    const photoElement = createPhotoElement(photoPaths[year], photoAlt);
                    photoContainer.appendChild(photoElement);
                } else {
                    photoContainer.innerHTML = `
                        <div class="photo-placeholder">
                            <i class="fas fa-image"></i>
                            <span>暂无${year}的照片</span>
                        </div>
                    `;
                }
                
                if (activeNode) activeNode.classList.remove('active');
                node.classList.add('active');
                activeNode = node;
                
                modal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            }
        });

        // 关闭模态框
        closeBtn.addEventListener('click', closeModal);
        window.addEventListener('click', (e) => e.target === modal && closeModal());

        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            activeNode.classList.add('active');
            const initialYear = activeNode.dataset.year;
            if (photoPaths[initialYear]) {
                photoContainer.innerHTML = '';
                const photoAlt = photoDescriptions[initialYear] || `${initialYear}清补凉历史照片`;
                const photoElement = createPhotoElement(photoPaths[initialYear], photoAlt);
                photoContainer.appendChild(photoElement);
            }
        });
    </script>
</body>
</html>
