<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>恭喜您，成为清补凉文化传播使者！</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 基础样式 - 保持与前序页面完全一致 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            touch-action: manipulation;
        }
        
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 10px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* 背景图片 - 已放置，使用清补凉相关素材 */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 使用免费的清补凉风格图片（椰子/热带甜品氛围） */
            background-image: url('../assets/images/666.png');
            /* 如需使用本地图片，请替换为: url('../assets/images/your-background.jpg') */
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            z-index: 0;
            pointer-events: none;
            opacity: 0.7;
        }

        /* 极浅的暖色遮罩，增强文字可读性 */
        .container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 245, 235, 0.15);
            z-index: 0;
            pointer-events: none;
        }

        /* 标题区域 - 适配证书页面风格 */
        .title {
            position: relative;
            top: 10px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #8B4513;
            z-index: 10;
            text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.8);
            padding: 0 10px;
            margin-bottom: 20px;
        }

        .title h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        /* 证书主体样式 - 核心视觉区域 */
        .certificate {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            border: 3px solid #D2691E;
            padding: 30px 20px;
            margin-bottom: 30px;
            background-image: 
                linear-gradient(45deg, rgba(210, 105, 30, 0.05) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(210, 105, 30, 0.05) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(210, 105, 30, 0.05) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(210, 105, 30, 0.05) 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        /* 证书装饰元素 */
        .certificate::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 1px dashed #8B4513;
            border-radius: 8px;
            z-index: 1;
            pointer-events: none;
        }

        .certificate-header {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #D2691E;
        }

        .certificate-header .cert-no {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 8px;
        }

        .certificate-header h2 {
            font-size: 1.3rem;
            color: #8B4513;
            font-weight: 700;
        }

        /* 证书内容区域 */
        .certificate-content {
            position: relative;
            z-index: 2;
            padding: 20px 10px;
        }

        .recipient {
            text-align: center;
            margin-bottom: 20px;
        }

        .recipient .name-label {
            font-size: 1rem;
            color: #555;
            margin-bottom: 5px;
        }

        .recipient .name-value {
            font-size: 1.4rem;
            color: #8B4513;
            font-weight: 700;
            letter-spacing: 2px;
            background: rgba(210, 105, 30, 0.1);
            padding: 5px 20px;
            border-radius: 8px;
            display: inline-block;
        }

        .title-awarded {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.2rem;
            color: #8B4513;
            font-weight: 600;
            padding: 8px 0;
            background: rgba(210, 105, 30, 0.08);
            border-radius: 8px;
        }

        .certificate-desc {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        /* 完成事项列表 */
        .completed-list {
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .completed-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #555;
        }

        .completed-item i {
            color: #28a745;
            font-size: 1rem;
            margin-top: 2px;
        }

        /* 颁发信息区域 */
        .issuer-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-top: 15px;
            border-top: 1px solid #eee;
            margin-top: 15px;
        }

        .issuer {
            flex: 1;
        }

        .issuer-label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
        }

        .issuer-value {
            font-size: 0.95rem;
            color: #8B4513;
            font-weight: 600;
        }

        .date-info {
            text-align: right;
            flex: 1;
        }

        .date-label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
        }

        .date-value {
            font-size: 0.95rem;
            color: #8B4513;
            font-weight: 600;
        }

        /* 鼓励文案区域 - 单独存在，无返回按钮 */
        .encouragement {
            position: relative;
            z-index: 10;
            width: 90%;
            text-align: center;
            font-size: 1rem;
            color: #555;
            line-height: 1.6;
            margin-bottom: 40px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* 注意：返回首页按钮已完全移除，因此不再有 .home-btn 相关样式 */

        /* 浮动操作按钮 - 保持一致 */
        .fab-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
        }

        .fab-main {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 25px rgba(139, 69, 19, 0.5);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: none;
            font-size: 26px;
            position: relative;
            z-index: 101;
        }

        .fab-main.active {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 8px 30px rgba(139, 69, 19, 0.7);
        }

        .fab-menu {
            position: absolute;
            bottom: 75px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 18px;
            opacity: 0;
            transform: translateY(25px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            pointer-events: none;
        }

        .fab-menu.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .fab-item {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: white;
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            position: relative;
            text-align: center;
            padding: 5px;
        }

        .fab-item:hover {
            transform: scale(1.15);
            background: #f5e3d4;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .fab-container { bottom: 25px; right: 25px; }
            .fab-main { width: 58px; height: 58px; font-size: 24px; }
            .fab-item { width: 60px; height: 60px; font-size: 14px; }
            .title h1 { font-size: 1.4rem; }
            .certificate { padding: 25px 18px; }
            .certificate-header h2 { font-size: 1.2rem; }
            .recipient .name-value { font-size: 1.3rem; }
            .title-awarded { font-size: 1.1rem; }
            .completed-item { font-size: 0.85rem; }
            .encouragement { font-size: 0.95rem; }
        }

        @media (max-width: 480px) {
            .fab-container { bottom: 20px; right: 20px; }
            .fab-main { width: 52px; height: 52px; font-size: 22px; }
            .fab-item { width: 55px; height: 55px; font-size: 13px; }
            .title h1 { font-size: 1.3rem; }
            .certificate { padding: 20px 15px; }
            .certificate-header { margin-bottom: 20px; }
            .certificate-header h2 { font-size: 1.1rem; }
            .recipient .name-value { font-size: 1.2rem; padding: 4px 15px; }
            .title-awarded { font-size: 1rem; }
            .certificate-desc { font-size: 0.9rem; }
            .completed-item { font-size: 0.8rem; }
            .issuer-info { flex-direction: column; align-items: flex-start; gap: 15px; }
            .date-info { text-align: left; }
            .encouragement { font-size: 0.9rem; padding: 12px; margin-bottom: 30px; }
            /* 无按钮，无需调整 */
        }

        @media (min-width: 768px) and (min-height: 800px) {
            .title h1 { font-size: 1.7rem; }
            .certificate { padding: 35px 25px; }
            .certificate-header h2 { font-size: 1.4rem; }
            .recipient .name-value { font-size: 1.5rem; }
            .title-awarded { font-size: 1.3rem; }
            .certificate-desc { font-size: 1rem; }
            .completed-item { font-size: 1rem; }
            .encouragement { font-size: 1.05rem; padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题区域 -->
        <div class="title">
            <h1>恭喜您，成为清补凉文化传播使者！</h1>
        </div>

        <!-- 证书主体 -->
        <div class="certificate">
            <div class="certificate-header">
                <div class="cert-no" id="certNo">证书编号：HNL-2025-XXXX</div>
                <h2>清补凉文化传播使者证书</h2>
            </div>

            <div class="certificate-content">
                <div class="recipient">
                    <div class="name-label">颁发给</div>
                    <div class="name-value" id="userName">[用户昵称]</div>
                </div>

                <div class="title-awarded">授予称号：清补凉文化传播使者</div>

                <div class="certificate-desc">
                    感谢您积极参与清补凉文化的学习、体验与分享，为传统美食的数字化传承贡献了一份力量。您已成功：
                </div>

                <div class="completed-list">
                    <div class="completed-item">
                        <i class="fas fa-check-circle"></i>
                        <span>完成清补凉历史文化学习</span>
                    </div>
                    <div class="completed-item">
                        <i class="fas fa-check-circle"></i>
                        <span>掌握食材功效与搭配知识</span>
                    </div>
                    <div class="completed-item">
                        <i class="fas fa-check-circle"></i>
                        <span>体验沉浸式制作与3D交互</span>
                    </div>
                    <div class="completed-item">
                        <i class="fas fa-check-circle"></i>
                        <span>将清补凉文化分享给更多朋友</span>
                    </div>
                </div>

                <div class="issuer-info">
                    <div class="issuer">
                        <div class="issuer-label">颁发单位</div>
                        <div class="issuer-value">海南清补凉文化数字传播项目组</div>
                    </div>
                    <div class="date-info">
                        <div class="date-label">日期</div>
                        <div class="date-value" id="certDate">[系统自动生成当前日期]</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 鼓励文案（已移除返回首页按钮，仅保留鼓励语句） -->
        <div class="encouragement">
            每一份传播，都是文化的延续。期待您继续探索、体验并分享更多中华传统美好。
        </div>

        <!-- 注意：原先的“返回首页”按钮和对应链接已完全删除 -->
    </div>

    <!-- 浮动操作按钮 (保留原样，其中“菜单”链接仍指向 page0.html) -->
    <div class="fab-container">
        <button class="fab-main" id="fabMain">
            <i class="fas fa-exchange-alt"></i>
        </button>
        <div class="fab-menu" id="fabMenu">
            <a href="page0.html" class="fab-item">菜单</a>
        </div>
    </div>

    <script>
        // 生成随机证书编号
        function generateCertNo() {
            const prefix = "HNL-2025-";
            const randomNum = Math.floor(1000 + Math.random() * 9000); // 生成4位随机数
            return prefix + randomNum;
        }

        // 获取当前日期并格式化
        function getCurrentDate() {
            const date = new Date();
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}年${month}月${day}日`;
        }

        // 模拟获取用户昵称（实际项目中从登录态/缓存中获取）
        function getUserName() {
            // 这里可以替换为真实的用户昵称获取逻辑
            const defaultName = "清补凉文化爱好者";
            
            // 模拟从URL参数获取昵称
            const urlParams = new URLSearchParams(window.location.search);
            const userName = urlParams.get('username') || defaultName;
            
            return userName;
        }

        // 页面加载完成后初始化证书信息
        window.addEventListener('load', function() {
            // 设置证书编号
            document.getElementById('certNo').textContent = `证书编号：${generateCertNo()}`;
            
            // 设置用户昵称
            document.getElementById('userName').textContent = getUserName();
            
            // 设置当前日期
            document.getElementById('certDate').textContent = getCurrentDate();
            
            // 确保容器滚动到顶部
            const container = document.querySelector('.container');
            container.scrollTop = 0;

            // 可选：添加证书生成的动画效果
            setTimeout(() => {
                document.querySelector('.certificate').style.opacity = '1';
                document.querySelector('.certificate').style.transform = 'scale(1)';
            }, 300);
        });

        // 浮动按钮交互逻辑 - 完全保持您原来的代码，未做任何修改
        const fabMain = document.getElementById('fabMain');
        const fabMenu = document.getElementById('fabMenu');
        
        fabMain.addEventListener('click', (e) => {
            e.stopPropagation();
            fabMenu.classList.toggle('open');
            fabMain.classList.toggle('active');
        });

        document.addEventListener('click', () => {
            fabMenu.classList.remove('open');
            fabMain.classList.remove('active');
        });

        // 响应式调整
        window.addEventListener('resize', () => {
            fabMenu.classList.remove('open');
            fabMain.classList.remove('active');
        });

        // 注意：已完全移除返回首页按钮及其相关事件监听器，因此无对应代码
    </script>
</body>
</html>
