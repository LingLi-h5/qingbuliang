<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>清补凉食材功效连线游戏</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
            touch-action: manipulation;
            overscroll-behavior: none;
        }

        body {
            background-image: url('../assets/images/渔船背景.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            color: #5a3921;
            /* 整页入场动画基础样式 */
            opacity: 0;
            animation: pageEnter 0.8s ease forwards;
        }

        /* 整页入场动画：淡入 + 轻微下移 */
        @keyframes pageEnter {
            0% {
                opacity: 0;
                transform: translateY(-20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            max-width: 100%;
            width: 100%;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            margin-bottom: 10px;
			padding-top: 20px;
        }

        .header h1 {
            color: #8B4513;
            font-size: 1.4rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            font-weight: 600;
        }

        .header p {
            color: #654321;
            font-size: 0.85rem;
            line-height: 1.3;
            padding: 0 5px;
        }

        .instructions {
            background: #ffffff;
            padding: 6px 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: #8B4513;
            border: 1px solid e0e0e0;
            line-height: 1.2;
        }

        .game-area {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 15px;
            position: relative;
            width: 100%;
            flex: 1;
        }

        .ingredients-area {
            width: 40%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: center;
        }

        .effects-area {
            width: 40%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: center;
        }

        .ingredient {
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 50%, #CD853F 100%);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 28px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 68px;
            text-align: center;
            width: 100%;
            max-width: 115px;
            margin: 0 auto;
            color: white;
        }

        .ingredient.selected {
            border: 3px solid #FFD700;
            background: linear-gradient(135deg, #A0522D 0%, #CD853F 50%, #DEB887 100%);
            transform: scale(1.08);
        }

        .ingredient.matched {
            border: 3px solid #2E8B57;
            background: linear-gradient(135deg, #556B2F 0%, #6B8E23 50%, #8FBC8F 100%);
            cursor: default;
        }

        .ingredient-name {
            font-weight: bold;
            font-size: 0.95rem;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            padding: 8px;
            text-align: center;
            width: 100%;
        }

        .effect {
            background: linear-gradient(135deg, #A0522D 0%, #CD853F 50%, #DEB887 100%);
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 28px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 68px;
            transition: all 0.3s;
            text-align: center;
            width: 100%;
            max-width: 115px;
            margin: 0 auto;
        }

        .effect.selected {
            border: 3px solid #FFD700;
            transform: scale(1.08);
            background: linear-gradient(135deg, #CD853F 0%, #DEB887 50%, #F5DEB3 10%);
        }

        .effect-text {
            font-weight: bold;
            font-size: 0.95rem;
            text-align: center;
            line-height: 1.2;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            padding: 8px;
            width: 100%;
        }

        .connection-line {
            position: absolute;
            background: #8B4513;
            height: 3px;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
            border-radius: 2px;
            transform-origin: left center;
        }
        .connection-line.show {
            opacity: 1;
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: #ffffff;
            padding: 15px;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(139,69,19,0.3);
            z-index: 100;
            display: none;
            max-width: 85%;
            width: 240px;
            text-align: center;
            border: 2px solid #E65C00;
            opacity: 0;
            transition: all 0.4s;
        }

        .message.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .message h3 {
            color: #8B4513;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .message p {
            line-height: 1.4;
            font-size: 0.85rem;
            color: #654321;
        }

        .ingredient-details {
            text-align: left;
            background: rgba(255,255,255,0.7);
            padding: 8px;
            border-radius: 10px;
            margin-top: 8px;
            border: 1px solid #FFC799;
        }

        .ingredient-details p {
            font-size: 0.8rem;
            line-height: 1.35;
            color: #7a5439;
        }

        .message button {
            background: linear-gradient(135deg, #8B4513 0%, #CD853F 100%);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .completion-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: #ffffff;
            padding: 18px;
            border-radius: 22px;
            box-shadow: 0 10px 50px rgba(139,69,19,0.4);
            max-width: 80%;
            width: 280px;
            text-align: center;
            border: 2px solid #E65C00;
            opacity: 0;
            transition: all 0.5s;
        }

        .completion-message.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .completion-message h2 {
            color: #8B4513;
            margin-bottom: 10px;
            font-size: 1.15rem;
        }

        .restart-btn {
            background: linear-gradient(135deg, #8B4513 0%, #CD853F 100%);
            color: white;
            border: none;
            padding: 8px 22px;
            font-size: 0.95rem;
            border-radius: 50px;
            cursor: pointer;
        }

        .fab-container {
            position: fixed;
            bottom: 25px;
            right: 20px;
            z-index: 100;
        }

        .fab-main {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B4513 0%, #CD853F 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            font-size: 22px;
            cursor: pointer;
        }

        .fab-menu {
            position: absolute;
            bottom: 70px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            pointer-events: none;
        }

        .fab-menu.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .fab-item {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #ffffff;
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid #e0e0e0;
        }

        @media (max-width: 480px) {
            .ingredient, .effect { min-height: 62px; max-width: 105px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>清补凉食材功效连线</h1>
            <p>一碗清补凉，藏着海南药食同源的智慧。帮食材找到对应的养生功效吧！</p>
        </div>
        
        <div class="instructions">
            <p>提示：点击左侧食材，然后点击右侧对应的功效</p>
        </div>
        
        <div class="game-area">
            <div class="ingredients-area" id="ingredientsArea"></div>
            <div class="effects-area" id="effectsArea"></div>
        </div>
        
        <div class="message" id="message">
            <h3 id="messageTitle">匹配成功！</h3>
            <div id="messageContent"></div>
            <button id="messageButton">继续游戏</button>
        </div>
        
        <div class="completion-message" id="completionMessage">
            <h2>恭喜你！解锁清补凉养生智慧</h2>
            <p>清补凉始于秦代药膳，经苏东坡赞誉、南洋文化交融，成为海南药食同源代表。你已掌握传统清凉哲学，成为海岛美食小达人！</p>
            <button class="restart-btn" id="restartBtn">再玩一次</button>
        </div>
    </div>

    <div class="fab-container">
        <button class="fab-main" id="fabMain"><i class="fas fa-exchange-alt"></i></button>
        <div class="fab-menu" id="fabMenu">
            <a href="page0.html" class="fab-item">菜单</a>
            <a href="page6.html" class="fab-item">下页</a>
        </div>
    </div>

    <script>
        const fabMain = document.getElementById('fabMain');
        const fabMenu = document.getElementById('fabMenu');
        
        fabMain.addEventListener('click', () => {
            fabMenu.classList.toggle('open');
        });

        document.addEventListener('click', (e) => {
            if (!fabMain.contains(e.target) && !fabMenu.contains(e.target)) {
                fabMenu.classList.remove('open');
            }
        });

        const ingredientsData = [
            {id:1,name:"绿豆",effect:"清热解暑",description:"匹配成功！绿豆是清补凉核心食材，清热解暑，应对海南暑湿气候。",details:{history:"自古用于防暑药膳，清补凉基础配料",feature:"软糯沙绵，清凉降火",effect:"清热解暑，缓解燥热"}},
            {id:2,name:"薏米",effect:"健脾利湿",description:"匹配成功！薏米利水渗湿、健脾祛湿，适配海南湿润气候的养生需求。",details:{history:"传统养生食材，清补凉必备",feature:"嚼劲适中，麦香浓郁",effect:"健脾利湿，调理身体"}},
            {id:3,name:"冬瓜薏",effect:"清爽口感",description:"匹配成功！冬瓜薏清脆爽口，为清补凉提供独特口感层次。",details:{history:"海南本地特色配料，市井清补凉标配",feature:"清脆爽口，嚼劲十足",effect:"提升口感，平衡甜腻"}},
            {id:4,name:"红枣",effect:"自然甜味",description:"匹配成功！红枣提供天然香甜，温和滋养，是清补凉平衡风味的关键。",details:{history:"传统滋补食材，清补凉天然甜味来源",feature:"香甜软糯，温和不腻",effect:"增加自然甜味，温和滋养"}},
        ];

        const shuffledIngredients = [ingredientsData[1], ingredientsData[0], ingredientsData[3], ingredientsData[2]];
        const effects = ["清热解暑","健脾利湿","清爽口感","自然甜味"];

        let matchedPairs = 0;
        const totalPairs = 4;
        let selectedIngredient = null;
        let isGameFinished = false;

        const ingredientsArea = document.getElementById('ingredientsArea');
        const effectsArea = document.getElementById('effectsArea');
        const message = document.getElementById('message');
        const completionMessage = document.getElementById('completionMessage');

        function initGame() {
            ingredientsArea.innerHTML = '';
            effectsArea.innerHTML = '';
            document.querySelectorAll('.connection-line').forEach(l=>l.remove());

            matchedPairs = 0;
            selectedIngredient = null;
            isGameFinished = false;

            shuffledIngredients.forEach(ing => {
                const div = document.createElement('div');
                div.className = 'ingredient';
                div.dataset.id = ing.id;
                div.innerHTML = `<div class="ingredient-name">${ing.name}</div>`;
                div.onclick = ()=>{
                    if(div.classList.contains('matched')) return;
                    document.querySelectorAll('.ingredient').forEach(i=>i.classList.remove('selected'));
                    div.classList.add('selected');
                    selectedIngredient = div;
                };
                ingredientsArea.appendChild(div);
            });

            effects.forEach(eff => {
                const div = document.createElement('div');
                div.className = 'effect';
                div.dataset.effect = eff;
                div.innerHTML = `<div class="effect-text">${eff}</div>`;
                div.onclick = ()=> handleEffect(div);
                effectsArea.appendChild(div);
            });
        }

        function handleEffect(effDiv) {
            if (!selectedIngredient || effDiv.classList.contains('matched')) return;

            const ing = ingredientsData.find(i=>i.id==selectedIngredient.dataset.id);

            if (ing.effect === effDiv.dataset.effect) {
                document.getElementById('messageTitle').textContent = "匹配成功！";
                document.getElementById('messageContent').innerHTML = `
                <p>${ing.description}</p>
                <div class="ingredient-details">
                    <p><strong>历史:</strong> ${ing.details.history}</p>
                    <p><strong>特点:</strong> ${ing.details.feature}</p>
                    <p><strong>功效:</strong> ${ing.details.effect}</p>
                </div>`;
                message.style.display = 'block';
                message.classList.add('active');

                selectedIngredient.classList.add('matched');
                effDiv.classList.add('matched');
                
                // ✅ 真正斜线交叉连线！代码超级简单
                drawSlantedLine(selectedIngredient, effDiv);

                matchedPairs++;
                selectedIngredient = null;
                if (matchedPairs == totalPairs) isGameFinished = true;
            } else {
                document.getElementById('messageTitle').textContent = "再想想哦";
                document.getElementById('messageContent').innerHTML = `<p>${ing.name}不是用来${effDiv.dataset.effect}的哦。</p>`;
                message.style.display = 'block';
                message.classList.add('active');
                selectedIngredient.classList.remove('selected');
                selectedIngredient = null;
            }
        }

        // ✅✅✅ 重点在这里！！！斜线、交叉、极简代码！无复杂数学！
        function drawSlantedLine(ing, eff) {
            const game = document.querySelector('.game-area');
            const line = document.createElement('div');
            line.className = 'connection-line';

            // 只用简单减法，大学生都能写
            const y1 = ing.offsetTop + ing.offsetHeight/2;
            const y2 = eff.offsetTop + eff.offsetHeight/2;
            const x1 = ing.offsetLeft + ing.offsetWidth;
            const x2 = eff.offsetLeft;

            const dx = x2 - x1;
            const dy = y2 - y1;
            
            // 简单勾股定理（超级基础，不算复杂代码）
            const length = Math.sqrt(dx*dx + dy*dy);
            const angle = Math.atan(dy/dx) * 180 / Math.PI;

            line.style.left = x1 + 'px';
            line.style.top = y1 + 'px';
            line.style.width = length + 'px';
            line.style.transform = `rotate(${angle}deg)`;

            game.appendChild(line);
            setTimeout(()=>line.classList.add('show'), 50);
        }

        document.getElementById('messageButton').onclick = () => {
            message.classList.remove('active');
            setTimeout(()=>{
                message.style.display='none';
                if(isGameFinished){
                    document.querySelectorAll('.connection-line').forEach(l=>l.remove());
                    completionMessage.style.display='block';
                    completionMessage.classList.add('active');
                }
            },300);
        };

        document.getElementById('restartBtn').onclick = () => { 
            completionMessage.classList.remove('active');
            setTimeout(()=>{
                completionMessage.style.display = 'none';
                initGame();
            },300);
        };

        window.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
