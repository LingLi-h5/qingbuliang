<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>沉浸式清补凉制作体验</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
			-webkit-tap-highlight-color: transparent;
			outline: none;
        }

        /* 整页入场动画 - 核心部分 */
        body {
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            opacity: 0;
            animation: pageEnter 1s ease forwards;
        }

        /* 入场动画关键帧 */
        @keyframes pageEnter {
            0% {
                opacity: 0;
                transform: translateY(-30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .container {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            opacity: 0;
            animation: containerFade 0.8s ease 0.3s forwards;
        }

        @keyframes containerFade {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        
        header {
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            color: #5a3e36;
            text-align: center;
            padding: 15px;
            border-bottom-left-radius: 40% 20%;
            border-bottom-right-radius: 40% 20%;
        }
        
        h1 {
            font-size: 1.4rem;
            margin-bottom: 5px;
        }
        
        .subtitle {
            font-size: 0.8rem;
        }
        
        .main-content {
            flex: 1;
            padding: 10px;
            background: url('../assets/images/鱼虾背景.png');
            background-size: cover;
            background-position: center;
            border-radius: 12px;
        }
        
        .progress-container {
            background: #fff;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }
        
        .progress-bar {
            height: 6px;
            background: #f5f5f5;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        
        .progress {
            height: 100%;
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            width: 0%;
            transition: width 0.5s;
        }
        
        .steps {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }
        
        .step {
            text-align: center;
            padding: 5px;
        }
        
        .step-icon {
            width: 30px;
            height: 30px;
            background: #fff;
            border-radius: 50%;
            margin: 0 auto 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #5a3e36;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        
        .step.completed .step-icon {
            background: #a8d8b9;
            color: #fff;
        }
        
        .step-title {
            font-weight: bold;
            font-size: 0.75rem;
            color: #5a3e36;
        }
        
        .demo-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .gif-container {
            flex: 1;
            background: #fff;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.15);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .step-gif {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            object-fit: cover;
            display: none;
        }
        
        .step-gif.active {
            display: block;
        }
        
        .button-group {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        
        .action-btn {
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            color: #5a3e36;
            padding: 12px 20px;
            font-size: 0.9rem;
            border-radius: 20px;
            border: none;
            font-weight: bold;
            flex: 1;
            max-width: 120px;
            box-shadow: 0 3px 8px rgba(252,182,159,0.4);
        }
        
        .action-btn:disabled {
            background: #e0d3c7;
            color: #a89a8e;
        }
        
        .complete-btn {
            background: linear-gradient(135deg, #a8d8b9, #c8e6c9);
            color: #2d5a3d;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            max-width: 280px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .modal-btn {
            background: linear-gradient(135deg, #a8d8b9, #c8e6c9);
            color: #2d5a3d;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
        }

        .fab-container {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 100;
        }

        .fab-main {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: none;
            box-shadow: 0 6px 20px rgba(139,69,19,0.4);
        }

        .fab-menu {
            position: absolute;
            bottom: 70px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.4s;
            pointer-events: none;
        }

        .fab-menu.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .fab-item {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>沉浸式清补凉制作</h1>
            <p class="subtitle">跟随步骤，亲手制作一碗地道的海南清补凉</p>
        </header>
        
        <div class="main-content">
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
                <div class="steps">
                    <div class="step active" data-step="1">
                        <div class="step-icon">1</div>
                        <div class="step-title">添加椰奶</div>
                    </div>
                    <div class="step" data-step="2">
                        <div class="step-icon">2</div>
                        <div class="step-title">添加红豆</div>
                    </div>
                    <div class="step" data-step="3">
                        <div class="step-icon">3</div>
                        <div class="step-title">加入绿豆</div>
                    </div>
                    <div class="step" data-step="4">
                        <div class="step-icon">4</div>
                        <div class="step-title">放入水果</div>
                    </div>
                    <div class="step" data-step="5">
                        <div class="step-icon">5</div>
                        <div class="step-title">添加配料</div>
                    </div>
                    <div class="step" data-step="6">
                        <div class="step-icon">6</div>
                        <div class="step-title">加入薄荷</div>
                    </div>
                    <div class="step" data-step="7">
                        <div class="step-icon">7</div>
                        <div class="step-title">薄荷点缀</div>
                    </div>
                    <div class="step" data-step="8">
                        <div class="step-icon">8</div>
                        <div class="step-title">完美呈现</div>
                    </div>
                </div>
            </div>
            
            <div class="demo-area">
                <div class="gif-container">
                    <img src="../assets/images/10.gif" class="step-gif" id="gif-0">
                    <img src="../assets/images/1.gif" class="step-gif" id="gif-1">
                    <img src="../assets/images/3.gif" class="step-gif" id="gif-2">
                    <img src="../assets/images/4.gif" class="step-gif" id="gif-3">
                    <img src="../assets/images/5.gif" class="step-gif" id="gif-4">
                    <img src="../assets/images/6.gif" class="step-gif" id="gif-5">
                    <img src="../assets/images/7.gif" class="step-gif" id="gif-6">
                    <img src="../assets/images/8.gif" class="step-gif" id="gif-7">
                    <img src="../assets/images/9.gif" class="step-gif" id="gif-8">
                </div>
                
                <div class="button-group">
                    <button class="action-btn" id="action-btn"></button>
                    <button class="action-btn complete-btn" id="complete-btn" style="display:none;">完成</button>
                </div>
            </div>
        </div>
    </div>

    <div class="fab-container">
        <button class="fab-main" id="fabMain">
            <i class="fas fa-exchange-alt"></i>
        </button>
        <div class="fab-menu" id="fabMenu">
            <a href="page0.html" class="fab-item">菜单</a>
            <a href="page8.html" class="fab-item">下页</a>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <h2>恭喜！制作完成！</h2>
            <p>一碗地道的海南清补凉已完成，享受这夏日清凉吧！</p>
            <button class="modal-btn" id="modal-close-btn">确定</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const steps = document.querySelectorAll('.step');
            const actionBtn = document.getElementById('action-btn');
            const completeBtn = document.getElementById('complete-btn');
            const progressBar = document.getElementById('progress');
            const gifs = document.querySelectorAll('.step-gif');
            const modal = document.getElementById('modal-overlay');
            const fabMain = document.getElementById('fabMain');
            const fabMenu = document.getElementById('fabMenu');
            
            let currentStep = 0;
            const totalSteps = 8;
            
            updatePage();
            
            steps.forEach(step => {
                step.addEventListener('click', function() {
                    let stepNum = parseInt(this.dataset.step);
                    if(stepNum <= currentStep + 1){
                        currentStep = stepNum - 1;
                        updatePage();
                    }
                });
            });
            
            actionBtn.addEventListener('click', function() {
                if(currentStep < totalSteps){
                    currentStep++;
                }else{
                    currentStep = 0;
                }
                updatePage();
            });
            
            completeBtn.addEventListener('click', function() {
                modal.style.display = 'flex';
            });
            
            document.getElementById('modal-close-btn').onclick = function() {
                modal.style.display = 'none';
            }
            
            fabMain.onclick = function() {
                fabMenu.classList.toggle('open');
            }
            
            document.onclick = function(e) {
                if(!fabMain.contains(e.target) && !fabMenu.contains(e.target)){
                    fabMenu.classList.remove('open');
                }
            }
            
            function updatePage() {
                let percent = (currentStep / totalSteps) * 100;
                progressBar.style.width = percent + '%';
                
                steps.forEach((item, index) => {
                    item.classList.remove('active', 'completed');
                    if(index + 1 < currentStep + 1) item.classList.add('completed');
                    if(index + 1 == currentStep + 1) item.classList.add('active');
                });
                
                gifs.forEach(g => g.classList.remove('active'));
                document.getElementById(`gif-${currentStep}`).classList.add('active');
                
                if(currentStep === 0){
                    actionBtn.innerText = '开始制作';
                    completeBtn.style.display = 'none';
                }else if(currentStep < totalSteps){
                    actionBtn.innerText = '下一步';
                    completeBtn.style.display = 'none';
                }else{
                    actionBtn.innerText = '重新开始';
                    completeBtn.style.display = 'block';
                }
            }
        });
    </script>
</body>
</html>
