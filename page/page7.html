<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>沉浸式清补凉制作体验</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            touch-action: manipulation;
        }
        
        .container {
            width: 100%;
            height: calc(100vh - 20px);
            max-height: calc(100vh - 20px);
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #e0e0e0;
        }
        
        header {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #5a3e36;
            text-align: center;
            padding: 15px 10px;
            border-bottom-left-radius: 40% 30%;
            border-bottom-right-radius: 40% 30%;
            flex-shrink: 0;
        }
        
        h1 {
            font-size: 1.4rem;
            margin-bottom: 5px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
            font-weight: 600;
        }
        
        .subtitle {
            font-size: 0.8rem;
            opacity: 0.9;
            line-height: 1.2;
        }
        
        .main-content {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            padding: 10px;
            background: url('../assets/images/8.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 12px;
        }
        
        .progress-container {
            margin: 10px 0;
            flex-shrink: 0;
            background-color: #ffffff;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border: 1px solid #e0e0e0;
        }
        
        .progress-bar {
            height: 6px;
            background-color: #f5f5f5;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
            border: 1px solid #e0e0e0;
        }
        
        .progress {
            height: 100%;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            width: 0%;
            transition: width 0.5s ease;
        }
        
        .steps {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-top: 8px;
        }
        
        .step {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            padding: 5px 2px;
        }
        
        .step:active {
            transform: translateY(-2px);
        }
        
        .step-icon {
            width: 30px;
            height: 30px;
            background-color: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 4px;
            font-size: 0.8rem;
            color: #5a3e36;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border: 1px solid #e0e0e0;
        }
        
        .step.active .step-icon {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #5a3e36;
            box-shadow: 0 2px 8px rgba(255, 154, 158, 0.4);
        }
        
        .step.completed .step-icon {
            background-color: #a8d8b9;
            color: white;
        }
        
        .step-title {
            font-weight: bold;
            font-size: 0.65rem;
            color: #5a3e36;
            line-height: 1.1;
        }
        
        .step-desc {
            font-size: 0.55rem;
            color: #8c7369;
            line-height: 1;
        }
        
        .demo-area {
            flex: 1;
            background-color: transparent;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            box-shadow: none;
            margin-top: 8px;
            border: none;
        }
        
        /* 核心：固定高度，彻底禁止自动占位 */
        .gif-container {
            flex: 1;
            max-height: 450px; /* 这个高度 = 原来GIF高度 + 被你删掉的文字高度 */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            min-height: 0;
            background-color: #ffffff;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 3px 15px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }
        
        .step-gif {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            object-fit: cover;
            object-position: center;
            display: none;
        }
        
        .step-gif.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .button-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .action-btn {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #5a3e36;
            border: none;
            padding: 12px 20px;
            font-size: 0.9rem;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(252, 182, 159, 0.4);
            transition: all 0.3s ease;
            font-weight: bold;
            flex: 1;
            max-width: 120px;
            border: 1px solid rgba(255, 236, 210, 0.5);
        }
        
        .action-btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 5px rgba(252, 182, 159, 0.6);
        }
        
        .action-btn:disabled {
            background: #e0d3c7;
            color: #a89a8e;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .complete-btn {
            background: linear-gradient(135deg, #a8d8b9 0%, #c8e6c9 100%);
            color: #2d5a3d;
            box-shadow: 0 3px 8px rgba(168, 216, 185, 0.4);
        }
        
        .complete-btn:active {
            box-shadow: 0 2px 5px rgba(168, 216, 185, 0.6);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #ffffff;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 280px;
            width: 80%;
            animation: modalFadeIn 0.3s ease;
            border: 1px solid #e0e0e0;
        }
        
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .modal-content h2 {
            color: #2d5a3d;
            margin-bottom: 12px;
            font-size: 1.2rem;
        }
        
        .modal-content p {
            color: #5a3e36;
            margin-bottom: 18px;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        .modal-btn {
            background: linear-gradient(135deg, #a8d8b9 0%, #c8e6c9 100%);
            color: #2d5a3d;
            border: none;
            padding: 10px 20px;
            font-size: 0.9rem;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(168, 216, 185, 0.4);
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .modal-btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 5px rgba(168, 216, 185, 0.6);
        }

        .fab-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
        }

        .fab-main {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 25px rgba(139, 69, 19, 0.5);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: none;
            font-size: 26px;
            position: relative;
            z-index: 101;
        }

        .fab-main:active {
            transform: scale(0.95);
        }

        .fab-menu {
            position: absolute;
            bottom: 75px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 18px;
            opacity: 0;
            transform: translateY(25px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            pointer-events: none;
        }

        .fab-menu.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .fab-item {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #ffffff;
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            position: relative;
            text-align: center;
            padding: 5px;
            border: 1px solid #e0e0e0;
        }

        .fab-item:active {
            transform: scale(0.95);
            background: #f5e3d4;
        }

        /* 响应式适配：不同屏幕高度下微调GIF容器高度 */
        @media (max-width: 768px) {
            .fab-container {
                bottom: 25px;
                right: 25px;
            }
            
            .fab-main {
                width: 58px;
                height: 58px;
                font-size: 24px;
            }
            
            .fab-item {
                width: 60px;
                height: 60px;
                font-size: 14px;
            }
            
            .gif-container {
                height: 240px;
            }
        }

        @media (max-width: 480px) {
            .fab-container {
                bottom: 20px;
                right: 20px;
            }
            
            .fab-main {
                width: 52px;
                height: 52px;
                font-size: 22px;
            }
            
            .fab-item {
                width: 55px;
                height: 55px;
                font-size: 13px;
            }
            
            .gif-container {
                height: 200px;
            }
        }

        @media (max-height: 600px) {
            header {
                padding: 12px 8px;
            }
            
            h1 {
                font-size: 1.2rem;
            }
            
            .subtitle {
                font-size: 0.7rem;
            }
            
            .step-icon {
                width: 28px;
                height: 28px;
                font-size: 0.75rem;
            }
            
            .step-title {
                font-size: 0.6rem;
            }
            
            .step-desc {
                font-size: 0.5rem;
            }
            
            .demo-area {
                padding: 12px;
            }
            
            .action-btn {
                padding: 10px 16px;
                font-size: 0.8rem;
            }
            
            .gif-container {
                height: 220px;
            }
        }

        @media (max-height: 500px) {
            .main-content {
                padding: 8px;
            }
            
            .action-btn {
                padding: 8px 14px;
                font-size: 0.75rem;
            }
            
            .gif-container {
                height: 180px;
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>沉浸式清补凉制作</h1>
            <p class="subtitle">跟随步骤，亲手制作一碗地道的海南清补凉</p>
        </header>
        
        <div class="main-content">
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
                <div class="steps">
                    <div class="step active" data-step="1">
                        <div class="step-icon">1</div>
                        <div class="step-title">准备基底</div>
                        <div class="step-desc">椰奶</div>
                    </div>
                    <div class="step" data-step="2">
                        <div class="step-icon">2</div>
                        <div class="step-title">添加红豆</div>
                        <div class="step-desc">丰富口感</div>
                    </div>
                    <div class="step" data-step="3">
                        <div class="step-icon">3</div>
                        <div class="step-title">加入绿豆</div>
                        <div class="step-desc">清凉解暑</div>
                    </div>
                    <div class="step" data-step="4">
                        <div class="step-icon">4</div>
                        <div class="step-title">放入薏米</div>
                        <div class="step-desc">健康养生</div>
                    </div>
                    <div class="step" data-step="5">
                        <div class="step-icon">5</div>
                        <div class="step-title">添加西米</div>
                        <div class="step-desc">Q弹口感</div>
                    </div>
                    <div class="step" data-step="6">
                        <div class="step-icon">6</div>
                        <div class="step-title">放入水果</div>
                        <div class="step-desc">新鲜果味</div>
                    </div>
                    <div class="step" data-step="7">
                        <div class="step-icon">7</div>
                        <div class="step-title">加入配料</div>
                        <div class="step-desc">椰果花生</div>
                    </div>
                    <div class="step" data-step="8">
                        <div class="step-icon">8</div>
                        <div class="step-title">最后点缀</div>
                        <div class="step-desc">完成制作</div>
                    </div>
                </div>
            </div>
            
            <div class="demo-area">
                <div class="gif-container">
                    <img src="https://media.giphy.com/media/3o7TKt41vcwZzJdQ9y/giphy.gif" class="step-gif" id="gif-1">
                    <img src="https://media.giphy.com/media/l0HlGSD6Q0eaeQvI4/giphy.gif" class="step-gif" id="gif-2">
                    <img src="https://media.giphy.com/media/3o7abGQa0aRsohveX6/giphy.gif" class="step-gif" id="gif-3">
                    <img src="https://media.giphy.com/media/l0HlGSD6Q0eaeQvI4/giphy.gif" class="step-gif" id="gif-4">
                    <img src="https://media.giphy.com/media/3o7abGQa0aRsohveX6/giphy.gif" class="step-gif" id="gif-5">
                    <img src="https://media.giphy.com/media/l0HlGSD6Q0eaeQvI4/giphy.gif" class="step-gif" id="gif-6">
                    <img src="https://media.giphy.com/media/3o7abGQa0aRsohveX6/giphy.gif" class="step-gif" id="gif-7">
                    <img src="https://media.giphy.com/media/26gJ1g1GQaJ9hQlKM/giphy.gif" class="step-gif" id="gif-8">
                </div>
                
                <div class="button-group">
                    <button class="action-btn" id="action-btn"></button>
                    <button class="action-btn complete-btn" id="complete-btn" style="display:none;">完成</button>
                </div>
            </div>
        </div>
    </div>

    <div class="fab-container">
        <button class="fab-main" id="fabMain">
            <i class="fas fa-exchange-alt"></i>
        </button>
        <div class="fab-menu" id="fabMenu">
            <a href="page0.html" class="fab-item">菜单</a>
            <a href="page8.html" class="fab-item">下页</a>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <h2>恭喜！制作完成！</h2>
            <p>一碗地道的海南清补凉已完成，享受这夏日清凉吧！</p>
            <button class="modal-btn" id="modal-close-btn">确定</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const steps = document.querySelectorAll('.step');
            const actionBtn = document.getElementById('action-btn');
            const completeBtn = document.getElementById('complete-btn');
            const progressBar = document.getElementById('progress');
            const gifs = document.querySelectorAll('.step-gif');
            const modalOverlay = document.getElementById('modal-overlay');
            const modalCloseBtn = document.getElementById('modal-close-btn');
            const fabMain = document.getElementById('fabMain');
            const fabMenu = document.getElementById('fabMenu');
            
            let currentStep = 0;
            const totalSteps = 8;
            
            updateAll();
            
            steps.forEach(step => {
                step.addEventListener('click', function() {
                    const num = parseInt(this.dataset.step);
                    if(num <= currentStep + 1){
                        currentStep = num - 1;
                        updateAll();
                    }
                });
            });
            
            actionBtn.addEventListener('click', function() {
                if(currentStep < totalSteps){
                    currentStep++;
                }else{
                    currentStep = 0;
                }
                updateAll();
            });
            
            completeBtn.addEventListener('click', () => modalOverlay.style.display = 'flex');
            modalCloseBtn.addEventListener('click', () => modalOverlay.style.display = 'none');
            modalOverlay.addEventListener('click', e => e.target === modalOverlay && (modalOverlay.style.display = 'none'));
            
            fabMain.addEventListener('click', () => fabMenu.classList.toggle('open'));
            document.addEventListener('click', e => {
                if(!fabMain.contains(e.target) && !fabMenu.contains(e.target)){
                    fabMenu.classList.remove('open');
                }
            });
            
            function updateAll(){
                updateProgress();
                updateGIF();
                updateActionButton();
            }
            
            function updateProgress(){
                const per = (currentStep / totalSteps) * 100;
                progressBar.style.width = per + '%';
                steps.forEach((s,i) => {
                    const n = i+1;
                    s.classList.remove('active','completed');
                    if(n < currentStep+1) s.classList.add('completed');
                    else if(n === currentStep+1) s.classList.add('active');
                });
            }
            
            function updateGIF(){
                gifs.forEach(g => g.classList.remove('active'));
                if(currentStep > 0 && currentStep <= totalSteps){
                    document.getElementById(`gif-${currentStep}`).classList.add('active');
                }
            }
            
            function updateActionButton(){
                if(currentStep === 0){
                    actionBtn.textContent = '开始制作';
                    completeBtn.style.display = 'none';
                }else if(currentStep < totalSteps){
                    actionBtn.textContent = '下一步';
                    completeBtn.style.display = 'none';
                }else{
                    actionBtn.textContent = '重新开始';
                    completeBtn.style.display = 'block';
                }
            }
        });
    </script>
</body>
</html>
