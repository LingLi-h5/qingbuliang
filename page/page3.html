<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>清补凉第一产业 - 乡村振兴就业分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-brown: #8B4513;
            --secondary-brown: #D2691E;
            --light-brown: #CD853F;
            --text-dark: #5a4a42;
            --text-light: #666;
            --background-gradient: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            --card-gradient: linear-gradient(135deg, #f8f4e9 0%, #f0e6d2 100%);
            --header-gradient: linear-gradient(135deg, #8B4513 0%, #D2691E 100%);
            --income-gradient: linear-gradient(90deg, #ffd666 0%, #ffa940 100%);
            
            --header-font-size: 1.2rem;
            --subtitle-font-size: 0.85rem;
            --info-title-size: 1rem;
            --detail-font-size: 0.8rem;
            --small-font-size: 0.75rem;
            
            --container-padding: 8px;
            --header-padding: 15px 12px;
            --chart-padding: 15px 12px;
            --info-padding: 12px 12px 15px;
            --detail-padding: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }

        body {
            background: var(--background-gradient);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--container-padding);
            touch-action: manipulation;
        }

        .container {
            width: 100%;
            height: calc(100vh - 16px);
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--header-gradient);
            color: white;
            padding: var(--header-padding);
            text-align: center;
            position: relative;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(139, 69, 19, 0.2);
            min-height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1) 2%, transparent 10%);
            pointer-events: none;
        }

        .header h1 {
            font-size: var(--header-font-size);
            margin-bottom: 6px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2);
            position: relative;
            font-weight: 600;
            line-height: 1.3;
            z-index: 1;
        }

        .header .subtitle {
            font-size: var(--subtitle-font-size);
            opacity: 0.95;
            position: relative;
            line-height: 1.3;
            z-index: 1;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .chart-container {
            flex: 1.5;
            min-height: 0;
            padding: var(--chart-padding);
            position: relative;
            overflow: hidden;
        }

        /* 图片背景容器 - 移除了遮罩层相关样式 */
        .chart-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            border-radius: 12px;
            /* 移除了透明度，保留图片原有效果 */
        }

        .chart-background img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            /* 移除了滤镜效果，保留原图 */
        }

        #sunburst-chart {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
        }

        .info-panel {
            flex-shrink: 0;
            padding: var(--info-padding);
            background: var(--card-gradient);
            border-top: 3px solid var(--secondary-brown);
            max-height: 40vh;
        }

        .info-title {
            font-size: var(--info-title-size);
            color: var(--primary-brown);
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--light-brown);
            text-align: center;
            font-weight: 600;
        }

        .detail-item {
            margin-bottom: 10px;
            padding: var(--detail-padding);
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.06);
            border-left: 4px solid var(--light-brown);
            transition: transform 0.2s ease;
            overflow-y: auto;
            max-height: 30vh;
        }

        .detail-item:active {
            transform: translateX(3px);
        }

        .detail-item h3 {
            color: var(--primary-brown);
            font-size: 0.95rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        .income-bar {
            height: 8px;
            background: #f5e8c8;
            border-radius: 5px;
            overflow: hidden;
            margin: 6px 0;
        }

        .income-fill {
            height: 100%;
            background: var(--income-gradient);
            border-radius: 5px;
            transition: width 0.8s ease-out;
        }

        .income-text {
            font-size: 0.8rem;
            color: var(--text-dark);
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            line-height: 1.3;
        }

        .highlight {
            color: #d46b08;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .comparison {
            color: #d46b08;
            font-weight: bold;
            background: rgba(212, 107, 8, 0.1);
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
        }

        /* 浮动操作按钮 */
        .fab-container {
            position: fixed;
            bottom: 15px;
            right: 15px;
            z-index: 100;
        }

        .fab-main {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-brown), var(--secondary-brown));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 20px;
            position: relative;
            z-index: 101;
        }

        .fab-main:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(139, 69, 19, 0.3);
        }

        .fab-menu {
            position: absolute;
            bottom: 60px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .fab-menu.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .fab-item {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: white;
            color: var(--primary-brown);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            position: relative;
            text-align: center;
            padding: 5px;
        }

        .fab-item:active {
            transform: scale(0.95);
            background: #f5e3d4;
        }

        .fab-label {
            position: absolute;
            right: 65px;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .fab-item:hover .fab-label {
            opacity: 1;
        }

        /* 交互提示 */
        .interaction-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            animation: pulse 2s infinite;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* 响应式调整 */
        @media (orientation: landscape) {
            :root {
                --header-font-size: 1.1rem;
                --subtitle-font-size: 0.8rem;
                --header-padding: 12px;
                --chart-padding: 12px;
                --info-padding: 12px;
            }
            
            .container {
                height: calc(100vh - 15px);
            }
            
            .info-panel {
                max-height: 35vh;
            }
        }

        @media (max-height: 700px) {
            :root {
                --header-font-size: 1.1rem;
                --subtitle-font-size: 0.8rem;
                --header-padding: 12px 10px;
                --detail-padding: 10px;
            }
            
            .header {
                min-height: 65px;
            }
        }

        @media (max-height: 600px) {
            :root {
                --header-font-size: 1rem;
                --subtitle-font-size: 0.75rem;
                --header-padding: 10px 8px;
                --chart-padding: 10px 8px;
                --info-padding: 10px 8px 12px;
                --info-title-size: 0.95rem;
            }
            
            .header {
                min-height: 60px;
            }
            
            .info-panel {
                max-height: 35vh;
            }
            
            .detail-item {
                margin-bottom: 8px;
                max-height: 28vh;
            }
        }

        @media (max-height: 500px) {
            :root {
                --header-font-size: 0.9rem;
                --subtitle-font-size: 0.7rem;
                --header-padding: 8px;
                --chart-padding: 8px;
                --info-padding: 8px;
                --detail-font-size: 0.75rem;
            }
            
            .container {
                height: calc(100vh - 12px);
            }
            
            .header {
                min-height: 55px;
            }
            
            .info-panel {
                max-height: 30vh;
            }
            
            .detail-item {
                padding: 8px;
                max-height: 25vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌱 清补凉第一产业就业分析</h1>
            <div class="subtitle">乡村振兴 · 农业带动 · 农民增收</div>
        </div>

        <div class="content">
            <div class="chart-container">
                <!-- 图片背景容器 -->
                <div class="chart-background" id="chartBackground">
                    <!-- 在这里替换成你的图片URL -->
                    <img src="../assets/images/555.png" alt="农业背景" id="backgroundImage">
                </div>
                
                <!-- ECharts图表 -->
                <div id="sunburst-chart"></div>
                <div class="interaction-hint">点击图表查看详情</div>
            </div>
            <div class="info-panel">
                <div class="info-title">📊 农业就业详情</div>
                <div id="detail-content">
                    <div class="detail-item">
                        <h3><span>👆</span>互动指南</h3>
                        <p style="font-size: var(--detail-font-size); line-height: 1.4; color: var(--text-light);">
                            点击旭日图的各个区域，查看不同农业岗位的就业和收入详细信息，了解清补凉产业如何带动乡村振兴。
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 浮动操作按钮 -->
    <div class="fab-container">
        <button class="fab-main" id="fabMain" aria-label="菜单">
            <i class="fas fa-exchange-alt"></i>
        </button>
        <div class="fab-menu" id="fabMenu">
            <a href="page0.html" class="fab-item" id="menuBtn">
                菜单
                <span class="fab-label">返回菜单</span>
            </a>
        </div>
    </div>

    <script>
        // 初始化ECharts实例
        const chartDom = document.getElementById('sunburst-chart');
        const myChart = echarts.init(chartDom, null, {
            renderer: 'canvas',
            useDirtyRect: false,
            devicePixelRatio: Math.min(window.devicePixelRatio, 2)
        });
        
        // 农业数据
        const agricultureData = {
            name: '第一产业',
            itemStyle: {
                color: '#8B4513'
            },
            children: [
                {
                    name: '椰农',
                    value: 3200,
                    income: 3850,
                    localRate: '95%',
                    detail: '主要负责椰子种植和采收，采用生态种植技术，工作地点主要在海南、广东等热带乡村地区。',
                    comparison: '较传统种植收入提升45%',
                    icon: '🥥',
                    itemStyle: { color: '#CD853F' }
                },
                {
                    name: '豆类种植',
                    value: 2800,
                    income: 4200,
                    localRate: '92%',
                    detail: '种植红豆、绿豆等核心原料，采用"公司+合作社+农户"模式，统一技术标准和收购。',
                    comparison: '较传统种植收入提升55%',
                    icon: '🫘',
                    itemStyle: { color: '#D2691E' }
                },
                {
                    name: '杂粮种植',
                    value: 1800,
                    income: 4000,
                    localRate: '90%',
                    detail: '种植薏米、西米等特色杂粮，产品附加值高，带动山区农民增收致富。',
                    comparison: '较传统种植收入提升60%',
                    icon: '🌾',
                    itemStyle: { color: '#B8860B' }
                },
                {
                    name: '水果种植',
                    value: 1500,
                    income: 4800,
                    localRate: '88%',
                    detail: '种植西瓜、菠萝、芒果等搭配水果，实现四季轮作，提高土地利用率。',
                    comparison: '较传统种植收入提升65%',
                    icon: '🍉',
                    itemStyle: { color: '#DA8A67' }
                }
            ]
        };

        // 图表配置
        const option = {
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'item',
                formatter: (params) => {
                    if (!params.data.value) return `<div style="font-weight: bold; font-size: 12px; color: #8B4513;">${params.name}</div>`;
                    
                    return `
                        <div style="font-weight: bold; color: #8B4513; margin-bottom: 5px; font-size: 12px;">
                            ${params.data.icon || '🌱'} ${params.name}
                        </div>
                        <div style="font-size: 11px;">👥 就业人数: ${params.data.value.toLocaleString()}人</div>
                        <div style="font-size: 11px;">💰 月均收入: ${params.data.income}元</div>
                        <div style="font-size: 11px;">🏠 本地就业率: ${params.data.localRate}</div>
                    `;
                },
                confine: true,
                textStyle: { fontSize: 11 }
            },
            series: {
                type: 'sunburst',
                data: [agricultureData],
                radius: ['15%', '80%'],
                itemStyle: {
                    borderWidth: 2,
                    borderColor: 'white',
                    opacity: 0.9
                },
                label: {
                    rotate: 'radial',
                    color: '#333',
                    fontSize: 10,
                    fontWeight: 'bold',
                    textBorderColor: 'white',
                    textBorderWidth: 2,
                    overflow: 'truncate',
                    width: 60
                },
                emphasis: {
                    focus: 'ancestor',
                    itemStyle: {
                        shadowBlur: 8,
                        shadowColor: 'rgba(0, 0, 0, 0.2)',
                        opacity: 1
                    }
                },
                levels: [
                    {},
                    {
                        r0: '15%',
                        r: '40%',
                        itemStyle: { borderWidth: 3 },
                        label: {
                            rotate: 'tangential',
                            fontSize: 12,
                            color: 'white',
                            fontWeight: 'bold'
                        }
                    },
                    {
                        r0: '40%',
                        r: '80%',
                        label: { align: 'right', fontSize: 10 }
                    }
                ]
            }
        };

        // 图表点击事件
        myChart.on('click', function(params) {
            const detailContent = document.getElementById('detail-content');
            
            if (params.data.value) {
                const incomePercent = Math.min(100, (params.data.income / 6000) * 100);
                
                detailContent.innerHTML = `
                    <div class="detail-item">
                        <h3><span>${params.data.icon}</span>${params.name}</h3>
                        <div class="income-text">
                            <span>就业人数:</span>
                            <span class="highlight">${params.data.value.toLocaleString()}人</span>
                        </div>
                        <div class="income-text">
                            <span>月均收入:</span>
                            <span class="highlight">${params.data.income}元</span>
                        </div>
                        <div class="income-bar">
                            <div class="income-fill" style="width: ${incomePercent}%"></div>
                        </div>
                        <div class="income-text">
                            <span>本地就业率:</span>
                            <span class="highlight">${params.data.localRate}</span>
                        </div>
                        <div class="income-text">
                            <span>收入提升:</span>
                            <span class="comparison">${params.data.comparison}</span>
                        </div>
                        <p style="margin-top: 8px; font-size: var(--small-font-size); color: var(--text-light); line-height: 1.4;">
                            ${params.data.detail}
                        </p>
                    </div>
                `;
            } else if (params.data.children) {
                const totalEmployment = params.data.children.reduce((sum, child) => sum + child.value, 0);
                const avgIncome = Math.round(params.data.children.reduce((sum, child) => sum + child.income * child.value, 0) / totalEmployment);
                
                detailContent.innerHTML = `
                    <div class="detail-item">
                        <h3><span>🌱</span>第一产业就业概况</h3>
                        <div class="income-text">
                            <span>总就业人数:</span>
                            <span class="highlight">${totalEmployment.toLocaleString()}人</span>
                        </div>
                        <div class="income-text">
                            <span>平均月收入:</span>
                            <span class="highlight">${avgIncome}元</span>
                        </div>
                        <div class="income-text" style="margin-top: 8px; font-weight: bold; font-size: 0.8rem;">主要农业岗位:</div>
                        <div style="margin-top: 6px;">
                            ${params.data.children.map(child => `
                                <div style="display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #f0f0f0; font-size: var(--small-font-size);">
                                    <span>${child.icon} ${child.name}</span>
                                    <span style="color: #8B4513; font-weight: bold;">${child.value}人</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
        });

        // 应用配置
        myChart.setOption(option);

        // 浮动操作按钮功能
        const fabMain = document.getElementById('fabMain');
        const fabMenu = document.getElementById('fabMenu');
        
        fabMain.addEventListener('click', function(e) {
            e.stopPropagation();
            fabMenu.classList.toggle('open');
        });

        document.addEventListener('click', function(e) {
            if (!fabMain.contains(e.target) && !fabMenu.contains(e.target)) {
                fabMenu.classList.remove('open');
            }
        });

        // 响应式调整
        function resizeChart() {
            myChart.resize();
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化图表大小
            setTimeout(resizeChart, 100);
            window.addEventListener('resize', resizeChart);
            
            // 防缩放处理
            let lastTouchEnd = 0;
            document.addEventListener('touchend', function(e) {
                const now = Date.now();
                if (now - lastTouchEnd < 300) e.preventDefault();
                lastTouchEnd = now;
            }, { passive: false });
            
            // 加载自定义背景图片
            loadCustomBackground();
        });

        // 加载自定义背景图片函数
        function loadCustomBackground() {
            // 在这里设置你的图片URL
            const customImageUrl = "../assets/images/888.png";
            
            // 你也可以使用本地图片，将图片放在同一目录下，使用相对路径：
            // const customImageUrl = './my-background.jpg';
            
            const backgroundImage = document.getElementById('backgroundImage');
            
            // 创建一个新的图片对象来预加载
            const img = new Image();
            
            img.onload = function() {
                // 图片加载成功后设置到页面
                backgroundImage.src = customImageUrl;
                console.log('背景图片加载成功');
            };
            
            img.onerror = function() {
                console.warn('自定义背景图片加载失败，使用默认图片');
                // 可以在这里设置一个备用图片URL
                backgroundImage.src = 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=600&q=80';
            };
            
            img.src = customImageUrl;
        }
    </script>
</body>
</html>
