<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="x5-orientation" content="portrait">
    <meta name="screen-orientation" content="portrait">
    <title>清补凉文化探索</title>
    <style>
        :root {
            --primary-brown: #8B4513;
            --secondary-brown: #654321;
            --accent-1: #A0522D;
            --accent-2: #D2691E;
            --accent-3: #CD853F;
            --accent-4: #DEB887;
            --light-beige: #ffecd2;
            --white: #ffffff;
            --shadow-color: rgba(139, 69, 19, 0.15);
            --shadow-active: rgba(139, 69, 19, 0.2);
            --overlay-bg: rgba(0,0,0,0.7);
            --card-gap: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-image: url('../assets/images/100.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: var(--light-beige);
            
            position: fixed;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            touch-action: manipulation;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .header {
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
        }

        .header h1 {
            color: var(--primary-brown);
            font-size: 2.4rem;
            margin-bottom: 12px;
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(139, 69, 19, 0.1);
        }

        .header p {
            color: var(--secondary-brown);
            font-size: 1.1rem;
            font-weight: 400;
            opacity: 0.9;
        }

        .menu-cards {
            display: flex;
            flex-direction: column;
            gap: var(--card-gap);
            margin-bottom: 30px;
        }

        .card {
            background: var(--white);
            border-radius: 24px;
            padding: 0;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 12px 40px var(--shadow-color);
            border: 1px solid #e0e0e0;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            animation: fadeInUp 0.8s ease;
            animation-fill-mode: both;
        }

        .card:active {
            transform: scale(0.96);
            box-shadow: 0 6px 20px var(--shadow-active);
        }

        .card-content {
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 2;
        }

        .card-icon {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(139, 69, 19, 0.2);
            padding: 8px;
        }

        .icon-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: all 0.3s ease;
        }

        .card:active .icon-img {
            transform: scale(0.95);
        }

        .card-icon.history {
            background: linear-gradient(135deg, var(--primary-brown), var(--accent-1));
            color: white;
        }

        .card-icon.ingredients {
            background: linear-gradient(135deg, var(--accent-2), var(--accent-3));
            color: white;
        }

        .card-icon.experience {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-4));
            color: white;
        }

        .card-icon.share {
            background: linear-gradient(135deg, var(--accent-3), #F4A460);
            color: white;
        }

        .card-text {
            flex: 1;
            text-align: left;
        }

        .card-text h3 {
            color: var(--primary-brown);
            font-size: 1.3rem;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .card-text p {
            color: var(--secondary-brown);
            font-size: 0.9rem;
            line-height: 1.4;
            opacity: 0.8;
        }

        .footer {
            color: var(--primary-brown);
            font-size: 0.85rem;
            font-weight: 400;
            opacity: 0.7;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-button {
            position: fixed;
            top: 25px;
            left: 25px;
            background: var(--white);
            color: var(--primary-brown);
            width: 55px;
            height: 55px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.3rem;
            box-shadow: 0 8px 25px var(--shadow-color);
            z-index: 1000;
            transition: all 0.3s ease;
            border: 1px solid #e0e0e0;
        }

        .menu-button:active {
            transform: scale(0.9);
            background: #f5f5f5;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: clamp(1.8rem, 5vw, 2.4rem);
            }
            .header p {
                font-size: clamp(0.9rem, 3vw, 1.1rem);
            }
            .card-content {
                padding: clamp(15px, 4vw, 25px);
            }
            .card-icon {
                width: clamp(50px, 10vw, 70px);
                height: clamp(50px, 10vw, 70px);
            }
        }

        @media (max-width: 320px) {
            .card-content {
                padding: 20px;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>清补凉文化</h1>
            <p>开启您的探索之旅</p>
        </div>
        
        <div class="menu-cards">
            <a href="page1.html" class="card">
                <div class="card-content">
                    <div class="card-icon history">
                        <img src="../assets/images/书本.png" alt="文化溯源" class="icon-img">
                    </div>
                    <div class="card-text">
                        <h3>文化溯源</h3>
                        <p>探索清补凉的历史传承与文化故事</p>
                    </div>
                </div>
            </a>
            
            <a href="page4.html" class="card">
                <div class="card-content">
                    <div class="card-icon ingredients">
                        <img src="../assets/images/清补凉.png" alt="食材百科" class="icon-img">
                    </div>
                    <div class="card-text">
                        <h3>食材百科</h3>
                        <p>了解食材成分与营养科学</p>
                    </div>
                </div>
            </a>
            
            <a href="page7.html" class="card">
                <div class="card-content">
                    <div class="card-icon experience">
                        <img src="../assets/images/椰子树.png" alt="沉浸体验" class="icon-img">
                    </div>
                    <div class="card-text">
                        <h3>沉浸体验</h3>
                        <p>3D交互感受清补凉魅力</p>
                    </div>
                </div>
            </a>
            
            <a href="page10.html" class="card">
                <div class="card-content">
                    <div class="card-icon share">
                        <img src="../assets/images/贝壳.png" alt="分享探索" class="icon-img">
                    </div>
                    <div class="card-text">
                        <h3>分享探索</h3>
                        <p>分享清补凉文化给朋友</p>
                    </div>
                </div>
            </a>
        </div>
        
        <div class="footer">
            <p>自由探索 · 随时返回</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 卡片动画
            const cards = document.querySelectorAll('.card');
            cards.forEach((card, i) => {
                card.style.animationDelay = `${i * 0.1}s`;
            });

            // 图标失败兜底
            document.querySelectorAll('.icon-img').forEach(img => {
                img.onerror = function() {
                    const p = this.parentElement;
                    p.innerHTML = '<span style="color:white; font-size:22px; font-weight:bold">图</span>';
                };
            });

            // 锁定竖屏
            try {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('portrait');
                }
            } catch (e) {}
        });
    </script>
</body>
</html>
