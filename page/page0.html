<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>清补凉文化探索</title>
    <style>
        :root {
            --primary-brown: #8B4513;
            --secondary-brown: #654321;
            --accent-1: #A0522D;
            --accent-2: #D2691E;
            --accent-3: #CD853F;
            --accent-4: #DEB887;
            --light-beige: #ffecd2;
            --white: #ffffff;
            --shadow-color: rgba(139, 69, 19, 0.12);
            --shadow-active: rgba(139, 69, 19, 0.18);
            --overlay-bg: rgba(0,0,0,0.7);
            --card-gap: 18px;
            --bounce-spring: cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-image: url('../assets/images/100.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: var(--light-beige);
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* 背景大幅度微动，超级明显 */
            animation: bgFloat 12s ease-in-out infinite alternate;
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .header {
            margin-bottom: 12px;
            animation: fadeInDown 0.7s var(--bounce-spring);
        }

        .header h1 {
            color: var(--primary-brown);
            font-size: 2.4rem;
            margin-bottom: 8px;
            font-weight: 700;
            text-shadow: 0 1px 6px rgba(139, 69, 19, 0.08);
            letter-spacing: 1px;
            /* 标题大幅度浮动！一眼可见 */
            animation: titleFloat 2.5s ease-in-out infinite alternate;
        }

        .header p {
            color: var(--secondary-brown);
            font-size: 1.1rem;
            font-weight: 400;
            opacity: 0.85;
            letter-spacing: 0.3px;
        }

        .menu-cards {
            display: flex;
            flex-direction: column;
            gap: var(--card-gap);
            margin-bottom: 12px;
        }

        .card {
            background: var(--white);
            border-radius: 26px;
            padding: 0;
            text-decoration: none;
            transition: all 0.4s var(--bounce-spring);
            box-shadow: 0 8px 24px var(--shadow-color);
            overflow: hidden;
            position: relative;
            cursor: pointer;
            animation: fadeInUp 0.7s var(--bounce-spring);
            animation-fill-mode: both;
            transform: translateY(0);
        }

        /* 卡片悬浮：超级明显！上浮 + 放大 + 强阴影 */
        .card:hover {
            transform: translateY(-14px) scale(1.06);
            box-shadow: 0 22px 50px rgba(139, 69, 19, 0.25);
        }

        .card:active {
            transform: translateY(-2px) scale(0.94);
            box-shadow: 0 6px 16px var(--shadow-active);
        }

        .card-content {
            padding: 24px 26px;
            display: flex;
            align-items: center;
            gap: 18px;
            position: relative;
            z-index: 2;
        }

        .card-icon {
            width: 68px;
            height: 68px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s var(--bounce-spring);
            box-shadow: 0 3px 10px rgba(139, 69, 19, 0.15);
            padding: 10px;
        }

        .icon-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: all 0.3s var(--bounce-spring);
        }

        /* 点击图标：旋转+缩放超级明显！超活泼 */
        .card:active .icon-img {
            transform: scale(0.75) rotate(18deg);
        }

        .card-icon.history {
            background: linear-gradient(135deg, var(--primary-brown), var(--accent-1));
            color: white;
        }

        .card-icon.ingredients {
            background: linear-gradient(135deg, var(--accent-2), var(--accent-3));
            color: white;
        }

        .card-icon.experience {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-4));
            color: white;
        }

        .card-icon.share {
            background: linear-gradient(135deg, var(--accent-3), #F4A460);
            color: white;
        }

        .card-text {
            flex: 1;
            text-align: left;
        }

        .card-text h3 {
            color: var(--primary-brown);
            font-size: 1.28rem;
            margin-bottom: 5px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .card-text p {
            color: var(--secondary-brown);
            font-size: 0.9rem;
            line-height: 1.45;
            opacity: 0.78;
        }

        .footer {
            color: var(--primary-brown);
            font-size: 0.85rem;
            font-weight: 400;
            opacity: 0.65;
            animation: fadeInUp 0.7s var(--bounce-spring) 0.2s both;
            padding: 10px 0;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 标题浮动：强化版 */
        @keyframes titleFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        /* 背景流动：强化版 */
        @keyframes bgFloat {
            0% { background-position: center 0%; }
            100% { background-position: center 15%; }
        }

        .menu-button {
            position: fixed;
            top: 22px;
            left: 22px;
            background: var(--white);
            color: var(--primary-brown);
            width: 52px;
            height: 52px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.25rem;
            box-shadow: 0 6px 20px var(--shadow-color);
            z-index: 1000;
            transition: all 0.3s var(--bounce-spring);
        }

        .menu-button:active {
            transform: scale(0.92);
            background: #f8f8f8;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: clamp(1.8rem, 5vw, 2.4rem);
            }
            .header p {
                font-size: clamp(0.9rem, 3vw, 1.1rem);
            }
            .card-content {
                padding: clamp(20px, 4vw, 24px);
            }
            .card-icon {
                width: clamp(52px, 10vw, 68px);
                height: clamp(52px, 10vw, 68px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>清补凉文化</h1>
            <p>开启您的探索之旅</p>
        </div>
        
        <div class="menu-cards">
            <a href="page1.html" class="card">
                <div class="card-content">
                    <div class="card-icon history">
                        <img src="../assets/images/书本.png" alt="文化溯源" class="icon-img">
                    </div>
                    <div class="card-text">
                        <h3>文化溯源</h3>
                        <p>探索清补凉的历史传承与文化故事</p>
                    </div>
                </div>
            </a>
            
            <a href="page4.html" class="card">
                <div class="card-content">
                    <div class="card-icon ingredients">
                        <img src="../assets/images/清补凉.png" alt="食材百科" class="icon-img">
                    </div>
                    <div class="card-text">
                        <h3>食材百科</h3>
                        <p>了解食材成分与营养科学</p>
                    </div>
                </div>
            </a>
            
            <a href="page7.html" class="card">
                <div class="card-content">
                    <div class="card-icon experience">
                        <img src="../assets/images/椰子树.png" alt="沉浸体验" class="icon-img">
                    </div>
                    <div class="card-text">
                        <h3>沉浸体验</h3>
                        <p>3D交互感受清补凉魅力</p>
                    </div>
                </div>
            </a>
            
            <a href="page10.html" class="card">
                <div class="card-content">
                    <div class="card-icon share">
                        <img src="../assets/images/贝壳.png" alt="分享探索" class="icon-img">
                    </div>
                    <div class="card-text">
                        <h3>分享探索</h3>
                        <p>分享清补凉文化给朋友</p>
                    </div>
                </div>
            </a>
        </div>
        
        <div class="footer">
            <p>自由探索 · 随时返回</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const cards = document.querySelectorAll('.card');
            cards.forEach((card, i) => {
                card.style.animationDelay = `${i * 0.1}s`;
            });

            document.querySelectorAll('.icon-img').forEach(img => {
                img.onerror = function() {
                    const p = this.parentElement;
                    p.innerHTML = '<span style="color:white; font-size:22px; font-weight:bold">图</span>';
                };
            });
        });
    </script>
</body>
</html>
