<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清补凉文化探索</title>
	<script src="../js/bj-music.js"></script>	
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        a, a:focus, a:active {
            outline: none;
            text-decoration: none;
        }

        body {
            background-image: url('../assets/images/鹿背景.png');
            background-size: cover;
            background-attachment: fixed;
            background-color: #ffecd2;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;

            opacity: 0;
            animation: pageFadeIn 0.8s ease forwards;
        }

        @keyframes pageFadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .header {
            margin-bottom: 20px;
        }

        .header h1 {
            color: #8B4513;
            font-size: 2.4rem;
            margin-bottom: 8px;
        }

        .header p {
            color: #654321;
            font-size: 1.1rem;
            opacity: 0.85;
        }

        .menu-cards {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 26px;
            text-decoration: none;
            /* 加强阴影，明显立体感 */
            box-shadow: 0 12px 28px rgba(139, 69, 19, 0.18);
            overflow: hidden;

            opacity: 0;
            transform: translateY(30px);
            animation: cardFadeIn 0.6s ease forwards;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes cardFadeIn {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-content {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .card-icon {
            width: 68px;
            height: 68px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .icon-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .card-icon.history {
            background: linear-gradient(135deg, #8B4513, #A0522D);
        }

        .card-icon.ingredients {
            background: linear-gradient(135deg, #D2691E, #CD853F);
        }

        .card-icon.experience {
            background: linear-gradient(135deg, #A0522D, #DEB887);
        }

        .card-icon.share {
            background: linear-gradient(135deg, #CD853F, #F4A460);
        }

        .card-text {
            flex: 1;
            text-align: left;
        }

        .card-text h3 {
            color: #8B4513;
            font-size: 1.28rem;
            margin-bottom: 5px;
        }

        .card-text p {
            color: #654321;
            font-size: 0.9rem;
            opacity: 0.78;
        }

        .footer {
            color: #8B4513;
            font-size: 0.85rem;
            opacity: 0.65;
            padding: 10px 0;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            .card-icon {
                width: 55px;
                height: 55px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>清补凉文化</h1>
            <p>开启您的探索之旅</p>
        </div>
        
        <div class="menu-cards">
            <a href="page1.html" class="card">
                <div class="card-content">
                    <div class="card-icon history">
                        <img src="../assets/images/书本.png" alt="文化溯源" class="icon-img">
                    </div>
                    <div class="card-text">
                        <h3>文化溯源</h3>
                        <p>探索清补凉的历史传承与文化故事</p>
                    </div>
                </div>
            </a>
            
            <a href="page4.html" class="card">
                <div class="card-content">
                    <div class="card-icon ingredients">
                        <img src="../assets/images/清补凉.png" alt="食材百科" class="icon-img">
                    </div>
                    <div class="card-text">
                        <h3>食材百科</h3>
                        <p>了解食材成分与营养科学</p>
                    </div>
                </div>
            </a>
            
            <a href="page7.html" class="card">
                <div class="card-content">
                    <div class="card-icon experience">
                        <img src="../assets/images/椰子树.png" alt="沉浸体验" class="icon-img">
                    </div>
                    <div class="card-text">
                        <h3>沉浸体验</h3>
                        <p>3D交互感受清补凉魅力</p>
                    </div>
                </div>
            </a>
            
            <a href="page10.html" class="card">
                <div class="card-content">
                    <div class="card-icon share">
                        <img src="../assets/images/贝壳.png" alt="分享探索" class="icon-img">
                    </div>
                    <div class="card-text">
                        <h3>分享探索</h3>
                        <p>分享清补凉文化给朋友</p>
                    </div>
                </div>
            </a>
        </div>
        
        <div class="footer">
            <p>自由探索 · 随时返回</p>
        </div>
    </div>

</body>
</html>
