<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>清补凉食材互动展示</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, rgba(255, 236, 210, 0.7) 0%, rgba(252, 182, 159, 0.7) 100%);
            background-image: url('../assets/images/333.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: scroll;
            background-blend-mode: normal;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            touch-action: manipulation;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
            padding: 10px;
            background-color: #ffffff; /* 改为实色白色 */
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.1);
            border: 1px solid #e0e0e0; /* 与index一致的边框 */
            position: relative;
            z-index: 1;
        }

        .header h1 {
            color: #8B4513;
            font-size: 1.8rem;
            margin-bottom: 8px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            font-weight: 600;
        }

        .header p {
            color: #654321;
            font-size: 0.95rem;
            max-width: 100%;
            line-height: 1.5;
        }

        .container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .bowl-container {
            position: relative;
            width: 100%;
            height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            background-color: #ffffff; /* 改为实色白色 */
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 8px 25px rgba(139, 69, 19, 0.15);
            border: 1px solid #e0e0e0; /* 与index一致的边框 */
            /* 保障碗容器基础层级 */
            z-index: 1;
        }

        .bowl-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 碗的层级低于食材 */
            z-index: 2;
            overflow: visible !important; /* 关键：允许食材超出碗容器 */
        }

        .custom-bowl {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            filter: drop-shadow(0 5px 15px rgba(139, 69, 19, 0.2));
            /* 碗图片层级最低 */
            z-index: 2;
            position: relative;
        }

        .ingredients-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            /* 食材容器层级高于碗 */
            z-index: 99;
            pointer-events: auto;
        }

        .ingredient {
            position: absolute;
            width: 65px;
            height: 65px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 25px rgba(139, 69, 19, 0.2);
            /* 食材图标最高层级 */
            z-index: 100;
            border: 2px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
            /* 确保点击穿透 */
            pointer-events: auto;
        }

        .ingredient:active {
            transform: scale(0.95);
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.3);
        }

        .ingredient.selected {
            border: 3px solid #8B4513;
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(139, 69, 19, 0.4);
        }

        .ingredient img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            border-radius: 15px;
        }

        .ingredient-in-bowl {
            position: absolute;
            width: 65px;
            height: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 碗内食材层级低于外部食材 */
            z-index: 3;
            opacity: 0;
            transition: opacity 0.3s;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(139, 69, 19, 0.3);
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: white;
        }

        .ingredient-in-bowl.active {
            opacity: 1;
        }

        .ingredient-in-bowl img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            border-radius: 15px;
        }

        .info-card {
            width: 100%;
            background-color: #ffffff; /* 改为实色白色 */
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s, transform 0.5s;
            position: relative;
            z-index: 5;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0; /* 与index一致的边框 */
        }

        .info-card.active {
            opacity: 1;
            transform: translateY(0);
        }

        .info-card h2 {
            color: #8B4513;
            margin-bottom: 12px;
            font-size: 1.5rem;
            border-bottom: 2px solid #f0c9a6;
            padding-bottom: 8px;
            font-weight: 600;
        }

        .info-card h3 {
            color: #8B4513;
            margin: 12px 0 8px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .info-card p {
            color: #654321;
            line-height: 1.6;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .info-card ul {
            padding-left: 18px;
            color: #654321;
            margin-bottom: 12px;
        }

        .info-card li {
            margin-bottom: 6px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        @keyframes flyToBowl {
            0% {
                transform: scale(1);
                opacity: 1;
                z-index: 100;
            }
            50% {
                transform: scale(1.3) translate(var(--tx), var(--ty));
                opacity: 0.8;
                z-index: 100;
            }
            100% {
                transform: scale(1) translate(0, 0);
                opacity: 0;
                z-index: 100;
            }
        }

        .flying {
            animation: flyToBowl 1s forwards;
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            color: #654321;
            font-size: 0.9rem;
            width: 100%;
            padding: 12px;
            background-color: #ffffff; /* 改为实色白色 */
            border-radius: 15px;
            line-height: 1.5;
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.1);
            border: 1px solid #e0e0e0; /* 与index一致的边框 */
            position: relative;
            z-index: 1;
        }

        .mung-bean { 
            background: linear-gradient(135deg, #8B4513, #D2691E);
            top: 10%; 
            left: 5%; 
        }
        .coconut { 
            background: linear-gradient(135deg, #DC143C, #B22222);
            top: 15%; 
            right: 5%; 
        }
        .jobstears { 
            background: linear-gradient(135deg, #A0522D, #CD853F);
            bottom: 20%; 
            left: 10%; 
        }
        .macaroni { 
            background: linear-gradient(135deg, #D2691E, #CD853F);
            bottom: 5%; 
            right: 50%; 
        }
        .red-date { 
            background: linear-gradient(135deg, #8B4513, #A0522D);
            top: 30%; 
            left: 20%; 
        }
        .taro-ball { 
            background: linear-gradient(135deg, #8B0000, #A52A2A);
            top: 40%; 
            right: 15%; 
        }
        .mango { 
            background: linear-gradient(135deg, #A0522D, #DEB887);
            bottom: 10%; 
            right: 25%; 
        }

        .ingredient:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(139, 69, 19, 0.3);
        }

        .fab-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 200; /* 悬浮按钮层级高于食材 */
        }

        .fab-main {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 25px rgba(139, 69, 19, 0.5);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: none;
            font-size: 26px;
            position: relative;
            z-index: 201;
        }

        .fab-main:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 8px 30px rgba(139, 69, 19, 0.7);
        }

        .fab-menu {
            position: absolute;
            bottom: 75px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 18px;
            opacity: 0;
            transform: translateY(25px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            pointer-events: none;
            z-index: 200;
        }

        .fab-menu.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .fab-item {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: #ffffff; /* 改为实色白色 */
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            position: relative;
            text-align: center;
            padding: 5px;
            border: 1px solid #e0e0e0; /* 与index一致的边框 */
            z-index: 200;
        }

        .fab-item:hover {
            transform: scale(1.15);
            background: rgba(245, 227, 212, 0.9);
            box-shadow: 0 6px 22px rgba(0, 0, 0, 0.3);
        }

        .fab-label {
            position: absolute;
            right: 80px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            font-weight: 500;
            z-index: 201;
        }

        .fab-item:hover .fab-label {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .fab-container {
                bottom: 25px;
                right: 25px;
            }
            
            .fab-main {
                width: 58px;
                height: 58px;
                font-size: 24px;
            }
            
            .fab-item {
                width: 60px;
                height: 60px;
                font-size: 14px;
            }
            
            .ingredient {
                width: 60px;
                height: 60px;
                border-radius: 18px;
            }
            
            .ingredient-in-bowl {
                width: 60px;
                height: 60px;
                border-radius: 18px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px 10px;
                background-attachment: scroll;
            }
            
            .header {
                margin-bottom: 15px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .header p {
                font-size: 1rem;
            }
            
            .bowl-container {
                height: 260px;
                padding: 10px;
            }
            
            .bowl-wrapper {
                width: 200px;
                height: 200px;
            }
            
            .ingredient {
                width: 55px;
                height: 55px;
                border-radius: 16px;
            }
            
            .ingredient-in-bowl {
                width: 55px;
                height: 55px;
                border-radius: 16px;
            }
            
            .fab-container {
                bottom: 20px;
                right: 20px;
            }
            
            .fab-main {
                width: 52px;
                height: 52px;
                font-size: 22px;
            }
            
            .fab-item {
                width: 55px;
                height: 55px;
                font-size: 13px;
            }
        }

        @media (max-width: 380px) {
            .bowl-container {
                height: 240px;
            }
            
            .bowl-wrapper {
                width: 180px;
                height: 180px;
            }
            
            .ingredient {
                width: 50px;
                height: 50px;
                border-radius: 14px;
            }
            
            .ingredient-in-bowl {
                width: 50px;
                height: 50px;
                border-radius: 14px;
            }
            
            .header h1 {
                font-size: 1.6rem;
            }
            
            .header p {
                font-size: 0.9rem;
            }
            
            .info-card {
                padding: 15px;
            }
        }

        @media (max-width: 340px) {
            .ingredient {
                width: 45px;
                height: 45px;
                border-radius: 12px;
            }
            
            .bowl-wrapper {
                width: 160px;
                height: 160px;
            }
            
            .ingredient-in-bowl {
                width: 45px;
                height: 45px;
                border-radius: 12px;
            }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            body {
                padding: 10px;
            }
            
            .container {
                max-width: 100%;
                flex-direction: row;
                gap: 20px;
            }
            
            .bowl-container {
                width: 50%;
                height: 200px;
                margin-bottom: 0;
            }
            
            .info-card {
                width: 50%;
                margin-bottom: 0;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>清补凉食材互动展示</h1>
        <p>点击食材图标，了解各种养生食材的功效与作用</p>
    </div>

    <div class="container">
        <div class="bowl-container">
            <div class="bowl-wrapper" id="bowlWrapper">
                <img src="../assets/images/椰子碗.png" class="custom-bowl">
            </div>
            
            <div class="ingredients-container">
                <div class="ingredient mung-bean" data-id="mung-bean">
                    <img src="../assets/images/绿豆.png" alt="绿豆">
                </div>
                <div class="ingredient coconut" data-id="coconut">
                    <img src="../assets/images/椰子.png" alt="椰子">
                </div>
                <div class="ingredient jobstears" data-id="jobstears">
                    <img src="../assets/images/薏米.png" alt="薏米">
                </div>
                <div class="ingredient macaroni" data-id="macaroni">
                    <img src="../assets/images/通心粉.png" alt="通心粉">
                </div>
                <div class="ingredient red-date" data-id="red-date">
                    <img src="../assets/images/红枣.png" alt="红枣">
                </div>
                <div class="ingredient taro-ball" data-id="taro-ball">
                    <img src="../assets/images/芋圆.png" alt="芋圆">
                </div>
                <div class="ingredient mango" data-id="mango">
                    <img src="../assets/images/芒果.png" alt="芒果">
                </div>
            </div>
        </div>

        <div class="info-card" id="info-card">
            <h2>选择一种食材</h2>
            <p>点击上方的食材图标，了解其营养功效和食用方法。</p>
        </div>
    </div>

    <div class="instructions">
        <p>👆 点击任意食材开始探索</p>
    </div>

    <div class="fab-container">
        <button class="fab-main" id="fabMain">
            <i class="fas fa-exchange-alt"></i>
        </button>
        <div class="fab-menu" id="fabMenu">
            <a href="page0.html" class="fab-item" id="menuBtn">
                菜单
                <span class="fab-label">返回菜单</span>
            </a>
            <a href="page5.html" class="fab-item">
                下页
                <span class="fab-label">下一页</span>
            </a>
        </div>
    </div>

    <script>
        const fabMain = document.getElementById('fabMain');
        const fabMenu = document.getElementById('fabMenu');
        
        fabMain.addEventListener('click', function() {
            fabMenu.classList.toggle('open');
        });

        document.addEventListener('click', function(e) {
            if (!fabMain.contains(e.target) && !fabMenu.contains(e.target)) {
                fabMenu.classList.remove('open');
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            const ingredients = document.querySelectorAll('.ingredient');
            const infoCard = document.getElementById('info-card');
            const bowlWrapper = document.getElementById('bowlWrapper');
            
            const ingredientData = {
                'mung-bean': {
                    name: '绿豆',
                    description: '绿豆是一种常见的豆类食材，富含蛋白质、膳食纤维和多种维生素。',
                    benefits: [
                        '清热解毒，消暑止渴',
                        '降低血脂和胆固醇',
                        '促进肠道蠕动，改善便秘',
                        '富含抗氧化物质，延缓衰老'
                    ],
                    usage: '可煮粥、做汤、制作绿豆沙等甜品。夏季常用来制作绿豆汤解暑。'
                },
                'coconut': {
                    name: '椰子',
                    description: '椰子是清补凉的核心食材，椰肉和椰汁都富含营养，是热带特色食材。',
                    benefits: [
                        '生津止渴，清凉解暑',
                        '补充电解质，缓解脱水',
                        '富含中链脂肪酸，易被人体吸收',
                        '椰肉富含膳食纤维，促进肠道健康'
                    ],
                    usage: '椰汁可直接饮用，椰肉可切块加入清补凉，也可制作椰奶、椰蓉等。'
                },
                'jobstears': {
                    name: '薏米',
                    description: '薏米又称薏苡仁，是传统的药食同源食材，具有很高的营养价值。',
                    benefits: [
                        '利水渗湿，健脾止泻',
                        '美白肌肤，减少色斑',
                        '增强免疫力，抗肿瘤',
                        '降血糖，适合糖尿病患者'
                    ],
                    usage: '可煮粥、炖汤，或与其它谷物一起烹饪，是清补凉的经典配料。'
                },
                'macaroni': {
                    name: '通心粉',
                    description: '通心粉是清补凉的特色配料之一，由小麦粉制成，口感Q弹有嚼劲。',
                    benefits: [
                        '提供碳水化合物，补充能量',
                        '含有蛋白质和少量维生素',
                        '易于消化，适合肠胃虚弱者',
                        '增加清补凉的口感层次'
                    ],
                    usage: '提前煮熟后加入清补凉中，搭配椰汁食用口感更佳。'
                },
                'red-date': {
                    name: '红枣',
                    description: '红枣是鼠李科植物枣的成熟果实，营养丰富，被誉为"天然维生素丸"。',
                    benefits: [
                        '补中益气，养血安神',
                        '富含维生素C，增强免疫力',
                        '改善贫血，提升血色',
                        '中和清补凉的凉性，调和性味'
                    ],
                    usage: '去核后加入清补凉，可增加甜味，无需额外加糖。'
                },
                'taro-ball': {
                    name: '芋圆',
                    description: '芋圆由芋头和红薯粉制成，是清补凉的经典甜品配料，口感软糯Q弹。',
                    benefits: [
                        '提供丰富的膳食纤维',
                        '芋头富含黏液蛋白，增强免疫力',
                        '低脂肪低热量，饱腹感强',
                        '富含钾元素，调节体内电解质'
                    ],
                    usage: '煮熟后加入清补凉，冷藏后食用口感更佳，是清补凉的颜值担当。'
                },
                'mango': {
                    name: '芒果',
                    description: '芒果是热带水果之王，果肉香甜多汁，是清补凉的热门水果配料。',
                    benefits: [
                        '富含维生素A和C，保护视力',
                        '芒果酮酸具有抗氧化作用',
                        '促进肠道蠕动，帮助消化',
                        '补充水分和多种矿物质'
                    ],
                    usage: '去皮切块后加入清补凉，与椰汁搭配风味独特，果香浓郁。'
                }
            };

            let currentIngredient = null;

            ingredients.forEach(ingredient => {
                ingredient.addEventListener('click', function(e) {
                    // 阻止事件冒泡，确保食材点击优先
                    e.stopPropagation();
                    const ingredientId = this.getAttribute('data-id');
                    
                    if (currentIngredient === ingredientId) return;
                    
                    currentIngredient = ingredientId;
                    
                    const data = ingredientData[ingredientId];
                    
                    updateInfoCard(data);
                    
                    flyToBowl(this, ingredientId);
                });
            });

            function updateInfoCard(data) {
                infoCard.innerHTML = `
                    <h2>${data.name}</h2>
                    <p>${data.description}</p>
                    <h3>主要功效：</h3>
                    <ul>
                        ${data.benefits.map(benefit => `<li>${benefit}</li>`).join('')}
                    </ul>
                    <h3>食用方法：</h3>
                    <p>${data.usage}</p>
                `;
                
                infoCard.classList.add('active');
            }

            function flyToBowl(element, ingredientId) {
                ingredients.forEach(ing => ing.classList.remove('selected'));
                element.classList.add('selected');
                
                const bowlRect = bowlWrapper.getBoundingClientRect();
                const ingredientRect = element.getBoundingClientRect();
                
                const deltaX = bowlRect.left + bowlRect.width/2 - ingredientRect.left - ingredientRect.width/2;
                const deltaY = bowlRect.top + bowlRect.height/2 - ingredientRect.top - ingredientRect.height/2;
                
                element.style.setProperty('--tx', `${deltaX}px`);
                element.style.setProperty('--ty', `${deltaY}px`);
                
                element.classList.add('flying');
                
                setTimeout(() => {
                    const existingIngredient = bowlWrapper.querySelector('.ingredient-in-bowl');
                    if (existingIngredient) {
                        existingIngredient.remove();
                    }
                    
                    const ingredientInBowl = document.createElement('div');
                    ingredientInBowl.className = `ingredient-in-bowl active`;
                    ingredientInBowl.innerHTML = `<img src="${element.querySelector('img').src}" alt="${ingredientData[ingredientId].name}">`;
                    
                    bowlWrapper.appendChild(ingredientInBowl);
                    
                    element.classList.remove('flying');
                    element.style.removeProperty('--tx');
                    element.style.removeProperty('--ty');
                }, 1000);
            }

            const bgImg = new Image();
            bgImg.onload = () => console.log('背景图片加载完成');
            bgImg.onerror = () => {
                console.log('背景图片加载失败，使用纯色背景');
                document.body.style.backgroundImage = 'none';
                document.body.style.background = 'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)';
            };
            bgImg.src = '../assets/images/进入页面.png';
        });
    </script>
</body>
</html>
