<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>清补凉食材互动展示</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            background-image: url('../assets/images/2.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            touch-action: manipulation;
            position: relative;
        }

        .card {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 12px rgba(139, 69, 19, 0.1);
            border: 1px solid #e0e0e0;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 12px;
            width: 100%;
            padding: 12px;
        }

        .header h1 {
            color: #8B4513;
            font-size: 1.7rem;
            margin-bottom: 6px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            font-weight: 600;
        }

        .header p {
            color: #654321;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 480px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .bowl-container {
            position: relative;
            width: 100%;
            height: 270px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px;
            box-shadow: 0 6px 18px rgba(139, 69, 19, 0.15);
        }

        .bowl-wrapper {
            position: relative;
            width: 210px;
            height: 210px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .custom-bowl {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            filter: drop-shadow(0 4px 12px rgba(139, 69, 19, 0.2));
            z-index: 2;
            position: relative;
        }

        .ingredients-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 99;
        }

        .ingredient {
            position: absolute;
            width: 62px;
            height: 62px;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 18px rgba(139, 69, 19, 0.2);
            z-index: 100;
            border: 2px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
            user-select: none;
        }

        .ingredient.selected {
            transform: scale(1.3);
            border: 3px solid #fff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.8);
        }

        .ingredient img {
            width: 82%;
            height: 82%;
            object-fit: contain;
            border-radius: 14px;
        }

        .ingredient-in-bowl {
            position: absolute;
            width: 85px;
            height: 85px;
            z-index: 3;
            top: 40%;
            left: 50%;
            border-radius: 24px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.4);
            border: 3px solid #fff;
            background: #fff;
            transform: translate(-50%, -50%) scale(0);
        }

        .ingredient-in-bowl.active {
            transform: translate(-50%, -50%) scale(1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }

        .ingredient-in-bowl img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
        }

        @keyframes flyToBowl {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0.1); opacity: 0; }
        }

        .flying {
            animation: flyToBowl 0.8s forwards ease-out;
        }

        .info-card {
            width: 100%;
            padding: 18px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            z-index: 5;
            margin-bottom: 16px;
        }

        .info-card.active {
            opacity: 1;
            transform: translateY(0);
        }

        .info-card h2 {
            color: #8B4513;
            margin-bottom: 10px;
            font-size: 1.4rem;
            border-bottom: 2px solid #f0c9a6;
            padding-bottom: 6px;
            font-weight: 600;
        }

        .info-card h3 {
            color: #8B4513;
            margin: 10px 0 6px;
            font-size: 1.05rem;
            font-weight: 600;
        }

        .info-card p {
            color: #654321;
            line-height: 1.5;
            margin-bottom: 10px;
            font-size: 0.92rem;
        }

        .info-card ul {
            padding-left: 16px;
            color: #654321;
            margin-bottom: 10px;
        }

        .info-card li {
            margin-bottom: 5px;
            font-size: 0.9rem;
            line-height: 1.45;
        }

        .instructions {
            margin-top: 12px;
            text-align: center;
            color: #654321;
            font-size: 0.88rem;
            width: 100%;
            padding: 10px;
            line-height: 1.4;
        }

        .mung-bean { background: linear-gradient(135deg, #8B4513, #D2691E); top: 10%; left: 5%; }
        .coconut { background: linear-gradient(135deg, #DC143C, #B22222); top: 15%; right: 5%; }
        .jobstears { background: linear-gradient(135deg, #A0522D, #CD853F); bottom: 20%; left: 10%; }
        .macaroni { background: linear-gradient(135deg, #D2691E, #CD853F); bottom: 5%; right: 50%; }
        .red-date { background: linear-gradient(135deg, #8B4513, #A0522D); top: 30%; left: 20%; }
        .taro-ball { background: linear-gradient(135deg, #8B0000, #A52A2A); top: 40%; right: 15%; }
        .mango { background: linear-gradient(135deg, #A0522D, #DEB887); bottom: 10%; right: 25%; }

        .fab-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 200;
        }

        .fab-main {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.5);
            cursor: pointer;
            transition: all 0.35s ease;
            border: none;
            font-size: 24px;
            z-index: 201;
        }

        .fab-menu {
            position: absolute;
            bottom: 70px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
            opacity: 0;
            transform: translateY(20px) scale(0.9);
            transition: all 0.35s ease;
            pointer-events: none;
            z-index: 200;
        }

        .fab-menu.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .fab-item {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background-color: #ffffff;
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            padding: 4px;
            border: 1px solid #e0e0e0;
            text-align: center;
            z-index: 200;
        }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .bowl-container { height: 250px; }
            .bowl-wrapper { width: 190px; height: 190px; }
            .ingredient { width: 56px; height: 56px; border-radius: 16px; }
            .ingredient-in-bowl { width: 75px; height: 75px; }
            .fab-container { bottom: 20px; right: 20px; }
            .fab-main { width: 56px; height: 56px; font-size: 22px; }
            .fab-item { width: 58px; height: 58px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="header card">
        <h1>清补凉食材互动展示</h1>
        <p>点击食材图标，了解各种养生食材的功效与作用</p>
    </div>

    <div class="container">
        <div class="bowl-container card">
            <div class="bowl-wrapper" id="bowlWrapper">
                <img src="../assets/images/椰子碗.png" class="custom-bowl">
            </div>
            
            <div class="ingredients-container">
                <div class="ingredient mung-bean" data-id="mung-bean">
                    <img src="../assets/images/绿豆.png" alt="绿豆">
                </div>
                <div class="ingredient coconut" data-id="coconut">
                    <img src="../assets/images/椰子.png" alt="椰子">
                </div>
                <div class="ingredient jobstears" data-id="jobstears">
                    <img src="../assets/images/薏米.png" alt="薏米">
                </div>
                <div class="ingredient macaroni" data-id="macaroni">
                    <img src="../assets/images/通心粉.png" alt="通心粉">
                </div>
                <div class="ingredient red-date" data-id="red-date">
                    <img src="../assets/images/红枣.png" alt="红枣">
                </div>
                <div class="ingredient taro-ball" data-id="taro-ball">
                    <img src="../assets/images/芋圆.png" alt="芋圆">
                </div>
                <div class="ingredient mango" data-id="mango">
                    <img src="../assets/images/芒果.png" alt="芒果">
                </div>
            </div>
        </div>

        <div class="info-card card" id="info-card">
            <h2>选择一种食材</h2>
            <p>点击上方的食材图标，了解其营养功效和食用方法。</p>
        </div>
    </div>

    <div class="instructions card">
        <p>👆 点击任意食材开始探索</p>
    </div>

    <div class="fab-container">
        <button class="fab-main" id="fabMain">
            <i class="fas fa-exchange-alt"></i>
        </button>
        <div class="fab-menu" id="fabMenu">
            <a href="page0.html" class="fab-item">菜单</a>
            <a href="page5.html" class="fab-item">下页</a>
        </div>
    </div>

    <script>
        const fabMain = document.getElementById('fabMain');
        const fabMenu = document.getElementById('fabMenu');
        const ingredients = document.querySelectorAll('.ingredient');
        const infoCard = document.getElementById('info-card');
        const bowlWrapper = document.getElementById('bowlWrapper');

        ingredients.forEach(ingredient => {
            ingredient.addEventListener('touchstart', function(e) {
                e.preventDefault();
                const ingredientId = this.dataset.id;
                
                ingredients.forEach(i => i.classList.remove('selected'));
                this.classList.add('selected');

                infoCard.classList.remove('active');
                setTimeout(() => {
                    updateInfoCard({
                        'mung-bean': {name:'绿豆',description:'绿豆是常见豆类食材，富含蛋白质、膳食纤维和多种维生素。',benefits:['清热解毒，消暑止渴','降低血脂和胆固醇','促进肠道蠕动，改善便秘','延缓衰老'],usage:'可煮粥、做汤、制作绿豆沙等甜品。'},
                        'coconut': {name:'椰子',description:'椰子是清补凉核心食材，椰肉和椰汁营养丰富，热带特色食材。',benefits:['生津止渴，清凉解暑','补充电解质','富含易吸收脂肪酸','促进肠道健康'],usage:'椰汁可直接饮用，椰肉可切块加入清补凉。'},
                        'jobstears': {name:'薏米',description:'薏米又称薏苡仁，传统药食同源食材，营养价值高。',benefits:['利水渗湿，健脾止泻','美白肌肤','增强免疫力','降血糖'],usage:'可煮粥、炖汤，是清补凉经典配料。'},
                        'macaroni': {name:'通心粉',description:'清补凉特色配料，小麦粉制成，口感Q弹。',benefits:['补充能量','含蛋白质维生素','易于消化','增加口感层次'],usage:'煮熟后加入清补凉，搭配椰汁食用。'},
                        'red-date': {name:'红枣',description:'红枣营养丰富，被誉为天然维生素丸。',benefits:['补中益气，养血安神','增强免疫力','改善贫血','调和性味'],usage:'去核加入清补凉，增加自然甜味。'},
                        'taro-ball': {name:'芋圆',description:'芋头+红薯粉制成，口感软糯Q弹。',benefits:['膳食纤维丰富','增强免疫力','低热量饱腹感强','调节电解质'],usage:'煮熟冷藏后加入清补凉，口感最佳。'},
                        'mango': {name:'芒果',description:'热带水果之王，香甜多汁。',benefits:['保护视力','抗氧化','促进消化','补充矿物质'],usage:'切块加入清补凉，果香浓郁。'}
                    }[ingredientId]);
                }, 350);
                
                flyToBowl(this, ingredientId);
            });
        });

        function updateInfoCard(data) {
            infoCard.innerHTML = `<h2>${data.name}</h2><p>${data.description}</p><h3>主要功效：</h3><ul>${data.benefits.map(b => `<li>${b}</li>`).join('')}</ul><h3>食用方法：</h3><p>${data.usage}</p>`;
            setTimeout(() => {
                infoCard.classList.add('active');
            }, 250);
        }

        function flyToBowl(element, id) {
            const bowlRect = bowlWrapper.getBoundingClientRect();
            const ingRect = element.getBoundingClientRect();
            const tx = bowlRect.left + bowlRect.width/2 - ingRect.left - ingRect.width/2;
            const ty = bowlRect.top + bowlRect.height/2 - ingRect.top - ingRect.height/2;
            
            element.style.setProperty('--tx', tx + 'px');
            element.style.setProperty('--ty', ty + 'px');
            element.classList.add('flying');
            
            setTimeout(() => {
                bowlWrapper.querySelector('.ingredient-in-bowl')?.remove();
                const el = document.createElement('div');
                el.className = 'ingredient-in-bowl active';
                el.innerHTML = `<img src="${element.querySelector('img').src}" alt="">`;
                bowlWrapper.appendChild(el);
                element.classList.remove('flying');
            }, 700);
        }

        fabMain.addEventListener('touchstart', e => {
            e.preventDefault();
            fabMenu.classList.toggle('open');
        });
    </script>
</body>
</html>
