<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分享美好，传承清补凉文化</title>
	<script src="../js/bj-music.js"></script>	
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
			-webkit-tap-highlight-color: transparent;
			outline: none;
        }

        html, body {
            height: 100%;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            /* 页面默认隐藏，上滑入场（从上方下来） */
            opacity: 0;
            animation: pageIn 1s ease forwards;
        }
        
        /* 整页上滑入场：从上方 -30px 滑入到原位 */
        @keyframes pageIn {
            0% {
                opacity: 0;
                transform: translateY(-30px); /* 上方开始 */
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 容器 */
        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 10px 15px 80px;
            /* 内容延迟上滑入场 */
            opacity: 0;
            animation: cardIn 0.8s 0.3s ease forwards;
        }

        @keyframes cardIn {
            0% {
                opacity: 0;
                transform: translateY(-20px); /* 上方开始 */
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 背景图 */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../assets/images/云洞图书馆背景.png');
            background-size: cover;
            background-position: center;
            z-index: 0;
            opacity: 1;
        }

        /* 标题区域 */
        .title {
            position: relative;
            z-index: 10;
            text-align: center;
            color: #333;
            margin: 10px 0 25px;
        }

        .title h1 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: #8B4513;
        }

        .title p {
            font-size: 1rem;
            color: #666;
            line-height: 1.6;
        }

        /* 点击提示 */
        .tip-text {
            position: relative;
            z-index: 10;
            text-align: center;
            color: #8B4513;
            font-size: 0.95rem;
            margin-bottom: 20px;
            font-weight: bold;
            animation: fadeIn 1s 0.5s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 卡片区域 */
        .core-values {
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* 卡片样式 */
        .value-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 16px;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: flex-start;
            gap: 15px;
            transition: 0.2s;
        }

        /* 可点击卡片才有手型和点击效果 */
        .value-card.clickable {
            cursor: pointer;
        }
        .value-card.clickable:active {
            transform: scale(0.95);
        }

        /* 图标 */
        .value-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .value-icon i {
            color: white;
            font-size: 22px;
        }

        /* 卡片文字 */
        .value-content h3 {
            font-size: 1.15rem;
            color: #8B4513;
            margin-bottom: 6px;
        }

        .value-content p {
            font-size: 0.92rem;
            color: #555;
            line-height: 1.55;
        }

        /* 悬浮按钮 */
        .fab-container {
            position: fixed;
            bottom: 25px;
            right: 20px;
            z-index: 100;
            opacity: 0;
            animation: btnIn 0.6s 0.6s ease forwards;
        }

        @keyframes btnIn {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .fab-main {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(139, 69, 19, 0.35);
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
        }

        .fab-main.active {
            transform: rotate(45deg);
        }

        /* 菜单 */
        .fab-menu {
            position: absolute;
            bottom: 70px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
        }

        .fab-menu.open {
            opacity: 1;
            pointer-events: all;
        }

        .fab-item {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: white;
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
            text-decoration: none;
            font-weight: 600;
        }

        /* 视频弹窗 */
        .video-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            display: none;
        }
        .video-modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .video-modal video {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 12px;
        }
        .video-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 46px;
            height: 46px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #8B4513;
            cursor: pointer;
        }

        /* 手机适配 */
        @media (max-width: 480px) {
            .title h1 { font-size: 1.3rem; }
            .value-card { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">
        <h1>分享美好，传承清补凉文化</h1>
        <p>每一份分享，都是文化的传递。清补凉不仅仅是一碗甜品，更是千年食疗智慧、地域人文与舌尖记忆的凝结。通过分享，我们可以：</p>
    </div>

    <!-- 点击提示文字 -->
    <div class="tip-text">👇 点击卡片观看介绍视频</div>

    <div class="core-values">
        <div class="value-card clickable" data-video="../assets/images/视频1.mp4">
            <div class="value-icon">
                <i class="fas fa-leaf"></i>
            </div>
            <div class="value-content">
                <h3>传递养生智慧</h3>
                <p>让更多人了解食材的药用价值与搭配理念，延续“药食同源”的中华饮食哲学。</p>
            </div>
        </div>

        <div class="value-card clickable" data-video="../assets/images/视频2.mp4">
            <div class="value-icon">
                <i class="fas fa-map-marked-alt"></i>
            </div>
            <div class="value-content">
                <h3>推广地域文化</h3>
                <p>将海南的清补凉故事带到更远的地方，成为一张行走的“文化名片”。</p>
            </div>
        </div>

        <div class="value-card clickable" data-video="../assets/images/视频3.mp4">
            <div class="value-icon">
                <i class="fas fa-heart"></i>
            </div>
            <div class="value-content">
                <h3>联结情感记忆</h3>
                <p>一碗清补凉，承载的是夏日的清凉、家乡的滋味与共享的温情。</p>
            </div>
        </div>

        <!-- 第四张卡片：纯展示，无点击无视频 -->
        <div class="value-card">
            <div class="value-icon">
                <i class="fas fa-users"></i>
            </div>
            <div class="value-content">
                <h3>激发互动探索</h3>
                <p>邀请朋友一起体验H5中的制作、游戏与历史，共同感受数字文化的魅力。</p>
            </div>
        </div>
    </div>
</div>

<!-- 视频弹窗 -->
<div class="video-modal" id="videoModal">
    <div class="video-close" id="videoClose">
        <i class="fas fa-times"></i>
    </div>
    <video id="videoPlayer" controls></video>
</div>

<!-- 悬浮菜单 -->
<div class="fab-container">
    <button class="fab-main" id="fabMain">
        <i class="fas fa-exchange-alt"></i>
    </button>
    <div class="fab-menu" id="fabMenu">
        <a href="page0.html" class="fab-item">菜单</a>
        <a href="page11.html" class="fab-item">下页</a>
    </div>
</div>

<script>
    // 悬浮菜单功能
    const fabMain = document.getElementById('fabMain');
    const fabMenu = document.getElementById('fabMenu');
    
    fabMain.onclick = function(e) {
        e.stopPropagation();
        fabMenu.classList.toggle('open');
        fabMain.classList.toggle('active');
    };
    
    document.onclick = function() {
        fabMenu.classList.remove('open');
        fabMain.classList.remove('active');
    };

    // 视频播放功能
    const videoModal = document.getElementById('videoModal');
    const videoPlayer = document.getElementById('videoPlayer');
    const videoClose = document.getElementById('videoClose');
    const cards = document.querySelectorAll('.value-card.clickable');

    // 点击卡片播放视频
    cards.forEach(card => {
        card.onclick = function() {
            let videoSrc = this.dataset.video;
            videoPlayer.src = videoSrc;
            videoModal.classList.add('show');
            videoPlayer.play();
        };
    });

    // 关闭视频
    function closeVideo() {
        videoModal.classList.remove('show');
        videoPlayer.pause();
        videoPlayer.src = '';
    }

    videoClose.onclick = closeVideo;
    
    videoModal.onclick = function(e) {
        if(e.target === videoModal) closeVideo();
    };
</script>
</body>
</html>
