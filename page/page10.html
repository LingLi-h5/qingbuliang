<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分享美好，传承清补凉文化</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }
        
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 10px 15px 80px;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../assets/images/77.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
            pointer-events: none;
            opacity:1;
        }

        .title {
            position: relative;
            z-index: 10;
            text-align: center;
            color: #333;
            text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.8);
            margin: 10px 0 25px;
            /* 更强的入场动画：弹跳+淡入 */
            animation: fadeInBounce 1.2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        .title h1 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            font-weight: 600;
            color: #8B4513;
        }

        .title p {
            font-size: 1rem;
            color: #666;
            line-height: 1.6;
            max-width: 95%;
            margin: 0 auto;
        }

        .core-values {
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 30px;
        }

        .value-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 16px;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: flex-start;
            gap: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            opacity: 0;
            /* 卡片更强入场：放大+滑入 */
            transform: translateY(80px) scale(0.8);
            animation: zoomSlideUp 1.1s cubic-bezier(0.17, 0.67, 0.23, 0.99) forwards;
        }

        .value-card:nth-child(1){animation-delay: 0.2s;}
        .value-card:nth-child(2){animation-delay: 0.4s;}
        .value-card:nth-child(3){animation-delay: 0.6s;}
        .value-card:nth-child(4){animation-delay: 0.8s;}

        /* 点击动态效果 超强版 */
        .value-card:active {
            transform: scale(0.92) !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15) !important;
            background: rgba(255,248,240,0.98) !important;
            border-color: #8B4513;
        }

        /* 悬浮效果（手机触摸也生效） */
        .value-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 28px rgba(139, 69, 19, 0.15);
        }

        .value-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(139, 69, 19, 0.25);
            transition: transform 0.2s ease;
        }

        /* 点击时图标也动 */
        .value-card:active .value-icon {
            transform: scale(0.9);
        }

        .value-icon i {
            color: white;
            font-size: 22px;
        }

        .value-content h3 {
            font-size: 1.15rem;
            color: #8B4513;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .value-content p {
            font-size: 0.92rem;
            color: #555;
            line-height: 1.55;
        }

        .fab-container {
            position: fixed;
            bottom: 25px;
            right: 20px;
            z-index: 100;
            opacity: 0;
            animation: fadeIn 1s ease 1.2s forwards;
        }

        .fab-main {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(139, 69, 19, 0.35);
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 24px;
            position: relative;
            z-index: 101;
        }

        .fab-main.active {
            transform: rotate(45deg);
        }

        .fab-menu {
            position: absolute;
            bottom: 70px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .fab-menu.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .fab-item {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: white;
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
            transition: all 0.2s ease;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        .fab-item:active {
            transform: scale(0.95);
        }

        .video-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            display: none;
        }
        .video-modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .video-modal video {
            max-width: 100%;
            max-height: 80vh;
            outline: none;
            border-radius: 12px;
        }
        .video-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 46px;
            height: 46px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #8B4513;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* 更强的标题动画：弹跳淡入 */
        @keyframes fadeInBounce {
            0% {
                opacity: 0;
                transform: translateY(-60px) scale(0.9);
            }
            60% {
                opacity: 1;
                transform: translateY(10px) scale(1.03);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 卡片超强动画：放大 + 滑上 + 弹性结束 */
        @keyframes zoomSlideUp {
            0% {
                opacity: 0;
                transform: translateY(80px) scale(0.8);
            }
            80% {
                transform: translateY(-5px) scale(1.05);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 480px) {
            .title h1 { font-size: 1.3rem; }
            .title p { font-size: 0.95rem; }
            .value-card { padding: 16px 14px; }
            .value-icon { width: 46px; height: 46px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">
        <h1>分享美好，传承清补凉文化</h1>
        <p>每一份分享，都是文化的传递。清补凉不仅仅是一碗甜品，更是千年食疗智慧、地域人文与舌尖记忆的凝结。通过分享，我们可以：</p>
    </div>

    <div class="core-values">
        <div class="value-card" data-video="../assets/images/视频1.mp4">
            <div class="value-icon">
                <i class="fas fa-leaf"></i>
            </div>
            <div class="value-content">
                <h3>传递养生智慧</h3>
                <p>让更多人了解食材的药用价值与搭配理念，延续“药食同源”的中华饮食哲学。</p>
            </div>
        </div>

        <div class="value-card" data-video="../assets/images/视频2.mp4">
            <div class="value-icon">
                <i class="fas fa-map-marked-alt"></i>
            </div>
            <div class="value-content">
                <h3>推广地域文化</h3>
                <p>将海南的清补凉故事带到更远的地方，成为一张行走的“文化名片”。</p>
            </div>
        </div>

        <div class="value-card" data-video="../assets/images/视频3.mp4">
            <div class="value-icon">
                <i class="fas fa-heart"></i>
            </div>
            <div class="value-content">
                <h3>联结情感记忆</h3>
                <p>一碗清补凉，承载的是夏日的清凉、家乡的滋味与共享的温情。</p>
            </div>
        </div>

        <div class="value-card" data-video="video4.mp4">
            <div class="value-icon">
                <i class="fas fa-users"></i>
            </div>
            <div class="value-content">
                <h3>激发互动探索</h3>
                <p>邀请朋友一起体验H5中的制作、游戏与历史，共同感受数字文化的魅力。</p>
            </div>
        </div>
    </div>
</div>

<div class="video-modal" id="videoModal">
    <div class="video-close" id="videoClose">
        <i class="fas fa-times"></i>
    </div>
    <video id="videoPlayer" controls></video>
</div>

<div class="fab-container">
    <button class="fab-main" id="fabMain">
        <i class="fas fa-exchange-alt"></i>
    </button>
    <div class="fab-menu" id="fabMenu">
        <a href="page0.html" class="fab-item">菜单</a>
        <a href="page11.html" class="fab-item">下页</a>
    </div>
</div>

<script>
    const fabMain = document.getElementById('fabMain');
    const fabMenu = document.getElementById('fabMenu');
    fabMain.addEventListener('click', (e) => {
        e.stopPropagation();
        fabMenu.classList.toggle('open');
        fabMain.classList.toggle('active');
    });
    document.addEventListener('click', () => {
        fabMenu.classList.remove('open');
        fabMain.classList.remove('active');
    });

    const videoModal = document.getElementById('videoModal');
    const videoPlayer = document.getElementById('videoPlayer');
    const videoClose = document.getElementById('videoClose');
    const cards = document.querySelectorAll('.value-card');

    cards.forEach(card => {
        card.addEventListener('click', () => {
            const src = card.dataset.video;
            
            setTimeout(() => {
                videoPlayer.src = src;
                videoModal.classList.add('show');
                videoPlayer.play();
            }, 200);
        });
    });

    function closeModal() {
        videoModal.classList.remove('show');
        videoPlayer.pause();
        videoPlayer.src = '';
    }

    videoClose.addEventListener('click', closeModal);
    videoModal.addEventListener('click', (e) => {
        if (e.target === videoModal) closeModal();
    });
</script>
</body>
</html>
