<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分享美好，传承清补凉文化</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }
        
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 10px 15px 80px;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../assets/images/77.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
            pointer-events: none;
        }

        .title {
            position: relative;
            z-index: 10;
            text-align: center;
            color: #333;
            text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.8);
            margin: 10px 0 25px;
        }

        .title h1 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .title p {
            font-size: 1rem;
            color: #666;
            line-height: 1.6;
            max-width: 95%;
            margin: 0 auto;
        }

        .core-values {
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 30px;
        }

        .value-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 16px;
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.12);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: flex-start;
            gap: 15px;
            transition: transform 0.2s ease;
        }

        .value-card:active {
            transform: scale(0.98);
        }

        .value-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 3px 10px rgba(139, 69, 19, 0.25);
        }

        .value-icon i {
            color: white;
            font-size: 20px;
        }

        .value-content {
            flex: 1;
        }

        .value-content h3 {
            font-size: 1.1rem;
            color: #8B4513;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .value-content p {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.5;
        }

        .fab-container {
            position: fixed;
            bottom: 25px;
            right: 20px;
            z-index: 100;
        }

        .fab-main {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 24px;
            position: relative;
            z-index: 101;
        }

        .fab-main.active {
            transform: rotate(45deg);
        }

        .fab-menu {
            position: absolute;
            bottom: 70px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .fab-menu.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .fab-item {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: white;
            color: #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        .fab-item:active {
            transform: scale(0.95);
        }

        @media (max-width: 480px) {
            .title h1 { font-size: 1.3rem; }
            .title p { font-size: 0.95rem; }
            .value-card { padding: 16px 14px; }
            .value-icon { width: 44px; height: 44px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>分享美好，传承清补凉文化</h1>
            <p>每一份分享，都是文化的传递。清补凉不仅仅是一碗甜品，更是千年食疗智慧、地域人文与舌尖记忆的凝结。通过分享，我们可以：</p>
        </div>

        <div class="core-values">
            <div class="value-card">
                <div class="value-icon">
                    <i class="fas fa-leaf"></i>
                </div>
                <div class="value-content">
                    <h3>传递养生智慧</h3>
                    <p>让更多人了解食材的药用价值与搭配理念，延续“药食同源”的中华饮食哲学。</p>
                </div>
            </div>

            <div class="value-card">
                <div class="value-icon">
                    <i class="fas fa-map-marked-alt"></i>
                </div>
                <div class="value-content">
                    <h3>推广地域文化</h3>
                    <p>将海南的清补凉故事带到更远的地方，成为一张行走的“文化名片”。</p>
                </div>
            </div>

            <div class="value-card">
                <div class="value-icon">
                    <i class="fas fa-heart"></i>
                </div>
                <div class="value-content">
                    <h3>联结情感记忆</h3>
                    <p>一碗清补凉，承载的是夏日的清凉、家乡的滋味与共享的温情。</p>
                </div>
            </div>

            <div class="value-card">
                <div class="value-icon">
                    <i class="fas fa-users"></i>
                </div>
                <div class="value-content">
                    <h3>激发互动探索</h3>
                    <p>邀请朋友一起体验H5中的制作、游戏与历史，共同感受数字文化的魅力。</p>
                </div>
            </div>
        </div>
    </div>

    <div class="fab-container">
        <button class="fab-main" id="fabMain">
            <i class="fas fa-exchange-alt"></i>
        </button>
        <div class="fab-menu" id="fabMenu">
            <a href="page0.html" class="fab-item">菜单</a>
            <a href="page11.html" class="fab-item">下页</a>
        </div>
    </div>

    <script>
        const fabMain = document.getElementById('fabMain');
        const fabMenu = document.getElementById('fabMenu');
        
        fabMain.addEventListener('click', (e) => {
            e.stopPropagation();
            fabMenu.classList.toggle('open');
            fabMain.classList.toggle('active');
        });

        document.addEventListener('click', () => {
            fabMenu.classList.remove('open');
            fabMain.classList.remove('active');
        });
    </script>
</body>
</html>
